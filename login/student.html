<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Student Login</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {

      background: linear-gradient(
        135deg,
        #6c63ff,
        #4f46e5
      );

      min-height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      padding: 20px;

    }

    .container {

      width: 100%;
      max-width: 450px;

      background: white;

      border-radius: 20px;

      padding: 30px;

      box-shadow:
        0 10px 30px rgba(0,0,0,0.2);

    }

    h1 {

      text-align: center;
      margin-bottom: 10px;
      color: #222;

    }

    .subtitle {

      text-align: center;
      color: #666;
      margin-bottom: 25px;
      line-height: 1.5;

    }

    form {

      display: flex;
      flex-direction: column;
      gap: 15px;

    }

    input {

      padding: 14px;

      border-radius: 12px;

      border: 1px solid #ccc;

      font-size: 15px;

    }

    button {

      padding: 14px;

      border: none;

      border-radius: 12px;

      background: #4f46e5;

      color: white;

      font-size: 16px;

      font-weight: bold;

      cursor: pointer;

      transition: 0.2s;

    }

    button:hover {

      background: #4338ca;

    }

    .message {

      margin-top: 18px;

      text-align: center;

      font-size: 14px;

    }

    .error {
      color: red;
    }

    .success {
      color: green;
    }

    .footer {

      margin-top: 20px;

      text-align: center;

      font-size: 14px;

      color: #666;

    }

    .footer a {

      color: #4f46e5;
      text-decoration: none;
      font-weight: bold;

    }

  </style>
</head>
<body>

  <div class="container">

    <h1>
      🎓 Student Login
    </h1>

    <p class="subtitle">
      Login to access your educational
      resources and assignments.
    </p>

    <form id="loginForm">

      <!-- EMAIL -->

      <input
        type="email"
        id="email"
        placeholder="School Email"
        required
      />

      <!-- PASSWORD -->

      <input
        type="password"
        id="password"
        placeholder="Password"
        required
      />

      <!-- LOGIN BUTTON -->

      <button type="submit">
        Login
      </button>

    </form>

    <!-- MESSAGE -->

    <div
      id="message"
      class="message"
    ></div>

    <!-- FOOTER -->

    <div class="footer">

      Need help logging in?
      Contact your teacher.

    </div>

  </div>

  <script>

    // ==================================================
    // 🔑 STUDENT SUPABASE
    // ==================================================

    const STUDENT_SUPABASE_URL =
      "https://ebzcflngssljyqieizws.supabase.co";

    const STUDENT_SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViemNmbG5nc3NsanlxaWVpendzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MDQ3NDEsImV4cCI6MjA5Mzk4MDc0MX0.ZnPi4jKEtkr0iUN_ymVrhUI7A_OMkhWjRn3shA2D9yk";

    // ==================================================
    // CREATE CLIENT
    // ==================================================

    const studentSupabase =
      supabase.createClient(
        STUDENT_SUPABASE_URL,
        STUDENT_SUPABASE_ANON_KEY,
        {
          auth: {

            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true

          }
        }
      );

    // ==================================================
    // ELEMENTS
    // ==================================================

    const loginForm =
      document.getElementById(
        "loginForm"
      );

    const message =
      document.getElementById(
        "message"
      );

    // ==================================================
    // LOGIN
    // ==================================================

    loginForm.addEventListener(
      "submit",
      async (e) => {

        e.preventDefault();

        message.textContent =
          "Logging in...";

        message.className =
          "message";

        const email =
          document.getElementById(
            "email"
          ).value;

        const password =
          document.getElementById(
            "password"
          ).value;

        // LOGIN REQUEST

        const {
          data,
          error
        } = await studentSupabase
          .auth
          .signInWithPassword({

            email,
            password

          });

        // ERROR

        if (error) {

          message.textContent =
            error.message;

          message.className =
            "message error";

          console.error(error);

          return;

        }

        // SUCCESS

        message.textContent =
          "Login successful! Redirecting...";

        message.className =
          "message success";

        console.log(
          "Student logged in:",
          data
        );

        // REDIRECT

        setTimeout(() => {

          window.location.href =
            "/dashboard/student";

        }, 1500);

      }
    );

    // ==================================================
    // AUTO LOGIN CHECK
    // ==================================================

    async function checkSession() {

      const {
        data
      } = await studentSupabase
        .auth
        .getUser();

      if (data?.user) {

        window.location.href =
          "/dashboard/student";

      }

    }

    // ==================================================
    // START
    // ==================================================

    window.addEventListener(
      "load",
      () => {

        checkSession();

      }
    );

  </script>

</body>
</html>
