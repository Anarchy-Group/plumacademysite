<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Reset Student Password
  </title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {

      background: linear-gradient(
        135deg,
        #6c63ff,
        #4f46e5
      );

      min-height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      padding: 20px;

    }

    .container {

      width: 100%;
      max-width: 450px;

      background: white;

      border-radius: 20px;

      padding: 30px;

      box-shadow:
        0 10px 30px rgba(0,0,0,0.2);

    }

    h1 {

      text-align: center;
      margin-bottom: 10px;

      color: #222;

    }

    .subtitle {

      text-align: center;

      color: #666;

      margin-bottom: 25px;

      line-height: 1.5;

    }

    form {

      display: flex;
      flex-direction: column;
      gap: 15px;

    }

    input {

      padding: 14px;

      border-radius: 12px;

      border: 1px solid #ccc;

      font-size: 15px;

    }

    button {

      padding: 14px;

      border: none;

      border-radius: 12px;

      background: #4f46e5;

      color: white;

      font-size: 16px;

      font-weight: bold;

      cursor: pointer;

      transition: 0.2s;

    }

    button:hover {

      background: #4338ca;

    }

    /* PASSWORD STRENGTH */

    .strength-container {

      width: 100%;

      height: 10px;

      background: #e5e7eb;

      border-radius: 999px;

      overflow: hidden;

      margin-top: -5px;

    }

    .strength-bar {

      height: 100%;

      width: 0%;

      transition: 0.3s;

      border-radius: 999px;

    }

    .strength-text {

      font-size: 13px;

      margin-top: 5px;

      color: #666;

    }

    .message {

      margin-top: 18px;

      text-align: center;

      font-size: 14px;

    }

    .error {
      color: red;
    }

    .success {
      color: green;
    }

  </style>
</head>
<body>

  <div class="container">

    <h1>
      🔒 Reset Password
    </h1>

    <p class="subtitle">
      Enter your new password below.
    </p>

    <form id="resetForm">

      <!-- NEW PASSWORD -->

      <input
        type="password"
        id="password"
        placeholder="New Password"
        required
      />

      <!-- STRENGTH BAR -->

      <div class="strength-container">

        <div
          class="strength-bar"
          id="strengthBar"
        ></div>

      </div>

      <div
        class="strength-text"
        id="strengthText"
      >
        Password Strength
      </div>

      <!-- CONFIRM PASSWORD -->

      <input
        type="password"
        id="confirmPassword"
        placeholder="Confirm Password"
        required
      />

      <!-- SUBMIT -->

      <button type="submit">
        Update Password
      </button>

    </form>

    <!-- MESSAGE -->

    <div
      id="message"
      class="message"
    ></div>

  </div>

  <script>

    // ==================================================
    // 🔑 STUDENT SUPABASE
    // ==================================================

    const STUDENT_SUPABASE_URL =
      "https://ebzcflngssljyqieizws.supabase.co";

    const STUDENT_SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViemNmbG5nc3NsanlxaWVpendzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MDQ3NDEsImV4cCI6MjA5Mzk4MDc0MX0.ZnPi4jKEtkr0iUN_ymVrhUI7A_OMkhWjRn3shA2D9yk";

    // ==================================================
    // CREATE CLIENT
    // ==================================================

    const studentSupabase =
      supabase.createClient(
        STUDENT_SUPABASE_URL,
        STUDENT_SUPABASE_ANON_KEY,
        {
          auth: {

            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true

          }
        }
      );

    // ==================================================
    // ELEMENTS
    // ==================================================

    const resetForm =
      document.getElementById(
        "resetForm"
      );

    const passwordInput =
      document.getElementById(
        "password"
      );

    const confirmPasswordInput =
      document.getElementById(
        "confirmPassword"
      );

    const message =
      document.getElementById(
        "message"
      );

    const strengthBar =
      document.getElementById(
        "strengthBar"
      );

    const strengthText =
      document.getElementById(
        "strengthText"
      );

    // ==================================================
    // PASSWORD STRENGTH
    // ==================================================

    passwordInput.addEventListener(
      "input",
      () => {

        const password =
          passwordInput.value;

        let strength = 0;

        if (password.length >= 8)
          strength++;

        if (/[A-Z]/.test(password))
          strength++;

        if (/[0-9]/.test(password))
          strength++;

        if (/[^A-Za-z0-9]/.test(password))
          strength++;

        // VERY WEAK

        if (strength === 0) {

          strengthBar.style.width =
            "0%";

          strengthBar.style.background =
            "transparent";

          strengthText.textContent =
            "Password Strength";

        }

        // WEAK

        else if (strength === 1) {

          strengthBar.style.width =
            "25%";

          strengthBar.style.background =
            "#ef4444";

          strengthText.textContent =
            "Weak Password";

        }

        // MEDIUM

        else if (strength === 2) {

          strengthBar.style.width =
            "50%";

          strengthBar.style.background =
            "#f59e0b";

          strengthText.textContent =
            "Medium Password";

        }

        // GOOD

        else if (strength === 3) {

          strengthBar.style.width =
            "75%";

          strengthBar.style.background =
            "#3b82f6";

          strengthText.textContent =
            "Strong Password";

        }

        // VERY STRONG

        else {

          strengthBar.style.width =
            "100%";

          strengthBar.style.background =
            "#22c55e";

          strengthText.textContent =
            "Very Strong Password";

        }

      }
    );

    // ==================================================
    // UPDATE PASSWORD
    // ==================================================

    resetForm.addEventListener(
      "submit",
      async (e) => {

        e.preventDefault();

        const password =
          passwordInput.value;

        const confirmPassword =
          confirmPasswordInput.value;

        // PASSWORD CHECK

        if (
          password !== confirmPassword
        ) {

          message.textContent =
            "Passwords do not match.";

          message.className =
            "message error";

          return;

        }

        message.textContent =
          "Updating password...";

        message.className =
          "message";

        // UPDATE PASSWORD

        const {
          error
        } = await studentSupabase
          .auth
          .updateUser({

            password:
              password

          });

        // ERROR

        if (error) {

          console.error(error);

          message.textContent =
            error.message;

          message.className =
            "message error";

          return;

        }

        // SUCCESS

        message.textContent =
          "Password updated successfully! Redirecting...";

        message.className =
          "message success";

        // REDIRECT

        setTimeout(() => {

          window.location.href =
            "/login/student";

        }, 2000);

      }
    );

  </script>

</body>
</html>
