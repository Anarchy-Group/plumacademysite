<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Student Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {

      background: #f4f7fb;

      min-height: 100vh;

      color: #222;

      padding: 30px;

    }

    .topbar {

      display: flex;

      justify-content: space-between;

      align-items: center;

      flex-wrap: wrap;

      gap: 20px;

      margin-bottom: 30px;

    }

    .student-info h1 {

      font-size: 34px;
      margin-bottom: 8px;

    }

    .student-info p {

      color: #666;

    }

    .button-group {

      display: flex;
      gap: 12px;
      flex-wrap: wrap;

    }

    .btn {

      padding: 14px 18px;

      border-radius: 12px;

      border: none;

      background: #4f46e5;

      color: white;

      font-weight: bold;

      cursor: pointer;

      transition: 0.2s;

      text-decoration: none;

      display: inline-flex;
      align-items: center;
      justify-content: center;

    }

    .btn:hover {

      background: #4338ca;

    }

    .logout-btn {

      background: #dc2626;

    }

    .logout-btn:hover {

      background: #b91c1c;

    }

    .card {

      background: white;

      border-radius: 20px;

      padding: 25px;

      box-shadow:
        0 5px 20px rgba(0,0,0,0.06);

      margin-bottom: 25px;

    }

    .card h2 {

      margin-bottom: 12px;

    }

    .card p {

      color: #666;
      line-height: 1.6;

    }

    .grid {

      display: grid;

      grid-template-columns:
        repeat(auto-fit, minmax(280px, 1fr));

      gap: 20px;

      margin-top: 25px;

    }

    .mini-card {

      background: #f9fafb;

      border-radius: 16px;

      padding: 20px;

      border: 1px solid #eee;

    }

    .mini-card h3 {

      margin-bottom: 10px;

      font-size: 18px;

    }

    .mini-card p {

      color: #666;
      font-size: 14px;
      line-height: 1.5;

    }

    /* BUTTON CARDS */

    .dashboard-btn {

      border: none;

      text-align: left;

      cursor: pointer;

      transition: 0.2s;

    }

    .dashboard-btn:hover {

      transform: translateY(-3px);

      background: #f3f4f6;

      box-shadow:
        0 8px 20px rgba(0,0,0,0.08);

    }

    .status {

      display: inline-flex;

      align-items: center;

      gap: 8px;

      margin-top: 10px;

      font-size: 14px;

      color: #059669;

      font-weight: bold;

    }

    .nav-links {

      display: flex;

      gap: 12px;

      margin-bottom: 25px;

      flex-wrap: wrap;

    }

    .nav-link {

      background: white;

      padding: 12px 16px;

      border-radius: 12px;

      text-decoration: none;

      color: #222;

      font-weight: bold;

      box-shadow:
        0 5px 20px rgba(0,0,0,0.06);

      transition: 0.2s;

    }

    .nav-link:hover {

      background: #f2f2f2;

    }

    .nav-link.active {

      background: #4f46e5;
      color: white;

    }

  </style>
</head>
<body>

  <!-- TOPBAR -->

  <div class="topbar">

    <div class="student-info">

      <h1>
        🎓 Student Dashboard
      </h1>

      <p id="studentDetails">
        Checking login session...
      </p>

    </div>

    <div class="button-group">

      <button
        id="logoutBtn"
        class="btn logout-btn"
      >
        Logout
      </button>

    </div>

  </div>

  <!-- NAVIGATION -->

  <div class="nav-links">

    <a
      href="/dashboard/student"
      class="nav-link active"
    >
      Dashboard
    </a>

  </div>

  <!-- WELCOME -->

  <div class="card">

    <h2>
      Welcome Back 👋
    </h2>

    <p>
      This is your student learning dashboard.
      Here you'll eventually be able to:
    </p>

    <div class="grid">

      <!-- ASSIGNMENTS -->

      <button
        class="mini-card dashboard-btn"
        onclick="
          window.location.href =
          '/dashboard/student/assignments'
        "
      >

        <h3>
          📚 Assignments
        </h3>

        <p>
          Access homework and coursework
          assigned by your teacher.
        </p>

      </button>

      <!-- RESOURCES -->

      <button
        class="mini-card dashboard-btn"
        onclick="
          window.location.href =
          '/dashboard/student/resources'
        "
      >

        <h3>
          📝 Resources
        </h3>

        <p>
          View educational materials,
          revision guides and worksheets.
        </p>

      </button>

      <!-- PROGRESS -->

      <button
        class="mini-card dashboard-btn"
        onclick="
          window.location.href =
          '/dashboard/student/progress'
        "
      >

        <h3>
          📊 Progress
        </h3>

        <p>
          Track your learning progress
          and achievements.
        </p>

      </button>

    </div>

  </div>

  <!-- ACCOUNT DETAILS -->

  <div class="card">

    <h2>
      Account Information
    </h2>

    <div class="grid">

      <div class="mini-card">

        <h3>
          👤 Full Name
        </h3>

        <p id="studentName">
          Loading...
        </p>

      </div>

      <div class="mini-card">

        <h3>
          ✉️ Email
        </h3>

        <p id="studentEmail">
          Loading...
        </p>

      </div>

      <div class="mini-card">

        <h3>
          🎯 Keystage
        </h3>

        <p id="studentKeystage">
          Loading...
        </p>

      </div>

    </div>

  </div>

  <!-- STATUS -->

  <div class="card">

    <h2>
      Account Status
    </h2>

    <div class="status">

      ✅ Logged In Successfully

    </div>

  </div>

  <script>

    // ==================================================
    // 🔑 STUDENT SUPABASE
    // ==================================================

    const STUDENT_SUPABASE_URL =
      "https://ebzcflngssljyqieizws.supabase.co";

    const STUDENT_SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViemNmbG5nc3NsanlxaWVpendzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MDQ3NDEsImV4cCI6MjA5Mzk4MDc0MX0.ZnPi4jKEtkr0iUN_ymVrhUI7A_OMkhWjRn3shA2D9yk";

    // ==================================================
    // CREATE CLIENT
    // ==================================================

    const studentSupabase =
      supabase.createClient(
        STUDENT_SUPABASE_URL,
        STUDENT_SUPABASE_ANON_KEY,
        {
          auth: {

            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true

          }
        }
      );

    // ==================================================
    // ELEMENTS
    // ==================================================

    const studentDetails =
      document.getElementById(
        "studentDetails"
      );

    const studentName =
      document.getElementById(
        "studentName"
      );

    const studentEmail =
      document.getElementById(
        "studentEmail"
      );

    const studentKeystage =
      document.getElementById(
        "studentKeystage"
      );

    // ==================================================
    // CHECK LOGIN
    // ==================================================

    async function checkLogin() {

      const {
        data,
        error
      } = await studentSupabase
        .auth
        .getUser();

      const user =
        data?.user;

      // NOT LOGGED IN

      if (!user || error) {

        window.location.href =
          "/login/student";

        return;

      }

      // DISPLAY DATA

      const fullName =
        user.user_metadata.full_name
        || "Student";

      const keystage =
        user.user_metadata.keystage
        || "Unknown";

      studentDetails.textContent =
        `${fullName} • ${keystage}`;

      studentName.textContent =
        fullName;

      studentEmail.textContent =
        user.email;

      studentKeystage.textContent =
        keystage;

    }

    // ==================================================
    // AUTH LISTENER
    // ==================================================

    studentSupabase.auth
      .onAuthStateChange(
        (event) => {

          if (
            event === "SIGNED_OUT"
          ) {

            window.location.href =
              "/login/student";

          }

        }
      );

    // ==================================================
    // LOGOUT
    // ==================================================

    document.getElementById(
      "logoutBtn"
    ).addEventListener(
      "click",
      async () => {

        await studentSupabase
          .auth
          .signOut();

      }
    );

    // ==================================================
    // START
    // ==================================================

    window.addEventListener(
      "load",
      () => {

        checkLogin();

      }
    );

  </script>

</body>
</html>
