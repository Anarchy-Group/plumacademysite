<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Teacher Classes
  </title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    * {

      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, Arial, sans-serif;

    }

    body {

      background: #f5f7fb;

      min-height: 100vh;

      padding: 30px;

      color: #111827;

    }

    .topbar {

      display: flex;

      justify-content: space-between;

      align-items: center;

      flex-wrap: wrap;

      gap: 20px;

      margin-bottom: 30px;

    }

    .topbar h1 {

      font-size: 34px;

      font-weight: 700;

    }

    .topbar p {

      color: #6b7280;

      margin-top: 6px;

    }

    .topbar-buttons {

      display: flex;

      gap: 12px;

      flex-wrap: wrap;

    }

    .btn {

      padding: 13px 18px;

      border-radius: 12px;

      border: 1px solid #dbe1ea;

      background: white;

      color: #111827;

      text-decoration: none;

      cursor: pointer;

      font-weight: 600;

      transition: 0.15s;

    }

    .btn:hover {

      background: #f3f4f6;

    }

    .primary-btn {

      background: #6366f1;

      color: white;

      border: none;

    }

    .primary-btn:hover {

      background: #4f46e5;

    }

    .danger-btn {

      background: #ef4444;

      color: white;

      border: none;

    }

    .danger-btn:hover {

      background: #dc2626;

    }

    .stats-grid {

      display: grid;

      grid-template-columns:
        repeat(
          auto-fit,
          minmax(220px, 1fr)
        );

      gap: 20px;

      margin-bottom: 30px;

    }

    .stat-card {

      background: white;

      border-radius: 18px;

      border: 1px solid #e5e7eb;

      padding: 22px;

    }

    .stat-card h3 {

      color: #6b7280;

      font-size: 15px;

      margin-bottom: 10px;

    }

    .stat-card .number {

      font-size: 32px;

      font-weight: 700;

    }

    .card {

      background: white;

      border-radius: 18px;

      border: 1px solid #e5e7eb;

      padding: 24px;

      margin-bottom: 30px;

    }

    .section-title {

      font-size: 26px;

      font-weight: 700;

      margin-bottom: 20px;

    }

    .filters {

      display: flex;

      gap: 15px;

      flex-wrap: wrap;

      margin-bottom: 25px;

    }

    .filters input,
    .filters select {

      padding: 12px 14px;

      border-radius: 12px;

      border: 1px solid #d1d5db;

      font-size: 14px;

      background: white;

    }

    .class-grid {

      display: grid;

      grid-template-columns:
        repeat(
          auto-fit,
          minmax(330px, 1fr)
        );

      gap: 20px;

    }

    .class-card {

      background: white;

      border-radius: 18px;

      border: 1px solid #e5e7eb;

      overflow: hidden;

      transition: 0.15s;

    }

    .class-card:hover {

      transform: translateY(-2px);

    }

    .class-top {

      height: 8px;

      width: 100%;

    }

    .class-content {

      padding: 22px;

    }

    .class-title {

      font-size: 22px;

      font-weight: 700;

      margin-bottom: 12px;

    }

    .class-meta {

      color: #6b7280;

      line-height: 1.8;

      font-size: 14px;

      margin-bottom: 20px;

    }

    .class-actions {

      display: flex;

      gap: 10px;

      flex-wrap: wrap;

    }

    .modal-overlay {

      position: fixed;

      inset: 0;

      background: rgba(0,0,0,0.4);

      display: none;

      justify-content: center;

      align-items: center;

      z-index: 999;

      padding: 20px;

    }

    .modal {

      background: white;

      width: 100%;

      max-width: 600px;

      border-radius: 22px;

      padding: 30px;

      max-height: 90vh;

      overflow-y: auto;

    }

    .modal h2 {

      font-size: 28px;

      margin-bottom: 20px;

    }

    .form-group {

      margin-bottom: 18px;

    }

    .form-group label {

      display: block;

      margin-bottom: 8px;

      font-weight: 600;

    }

    .form-group input,
    .form-group textarea,
    .form-group select {

      width: 100%;

      padding: 14px;

      border-radius: 12px;

      border: 1px solid #d1d5db;

      font-size: 14px;

    }

    textarea {

      resize: vertical;

      min-height: 120px;

    }

    .modal-buttons {

      display: flex;

      gap: 12px;

      flex-wrap: wrap;

      margin-top: 25px;

    }

    .loading,
    .empty-state {

      text-align: center;

      padding: 60px 20px;

      color: #6b7280;

    }

    .empty-state h2 {

      color: #111827;

      margin-bottom: 10px;

    }

  </style>

</head>
<body>

  <!-- TOPBAR -->

  <div class="topbar">

    <div>

      <h1>
        🏫 Classes
      </h1>

      <p id="teacherInfo">
        Loading...
      </p>

    </div>

    <div class="topbar-buttons">

      <button
        class="btn primary-btn"
        onclick="openModal()"
      >
        + Add Class
      </button>

      <a
        href="/dashboard/teacher"
        class="btn"
      >
        Dashboard
      </a>

      <button
        id="logoutBtn"
        class="btn danger-btn"
      >
        Logout
      </button>

    </div>

  </div>

  <!-- STATS -->

  <div class="stats-grid">

    <div class="stat-card">

      <h3>
        Total Classes
      </h3>

      <div
        class="number"
        id="classCount"
      >
        0
      </div>

    </div>

    <div class="stat-card">

      <h3>
        Subjects
      </h3>

      <div
        class="number"
        id="subjectCount"
      >
        0
      </div>

    </div>

    <div class="stat-card">

      <h3>
        School
      </h3>

      <div
        class="number"
        style="font-size:20px;"
        id="schoolName"
      >
        Loading...
      </div>

    </div>

  </div>

  <!-- CLASSES -->

  <div class="card">

    <div class="section-title">
      Your School Classes
    </div>

    <!-- FILTERS -->

    <div class="filters">

      <input
        type="text"
        id="searchInput"
        placeholder="Search classes..."
      />

      <select id="subjectFilter">

        <option value="">
          All Subjects
        </option>

      </select>

    </div>

    <!-- CLASSES GRID -->

    <div id="classesContainer">

      <div class="loading">
        Loading classes...
      </div>

    </div>

  </div>

  <!-- MODAL -->

  <div
    class="modal-overlay"
    id="modalOverlay"
  >

    <div class="modal">

      <h2>
        Create Class
      </h2>

      <!-- SUBJECT -->

      <div class="form-group">

        <label>
          Subject
        </label>

        <input
          type="text"
          id="subjectInput"
          placeholder="English"
        />

      </div>

      <!-- CLASS NAME -->

      <div class="form-group">

        <label>
          Class Name
        </label>

        <input
          type="text"
          id="classNameInput"
          placeholder="Year 10 English"
        />

      </div>

      <!-- CLASS CODE -->

      <div class="form-group">

        <label>
          Class Code
        </label>

        <input
          type="text"
          id="classCodeInput"
          placeholder="ENG-104"
        />

      </div>

      <!-- TEACHER -->

      <div class="form-group">

        <label>
          Teacher
        </label>

        <select id="teacherSelect">

          <option value="">
            Loading teachers...
          </option>

        </select>

      </div>

      <!-- DESCRIPTION -->

      <div class="form-group">

        <label>
          Description
        </label>

        <textarea
          id="descriptionInput"
          placeholder="Brief class description..."
        ></textarea>

      </div>

      <!-- COLOUR -->

      <div class="form-group">

        <label>
          Theme Colour
        </label>

        <input
          type="color"
          id="themeColorInput"
          value="#6366f1"
        />

      </div>

      <!-- BUTTONS -->

      <div class="modal-buttons">

        <button
          class="btn primary-btn"
          onclick="createClass()"
        >
          Create Class
        </button>

        <button
          class="btn"
          onclick="closeModal()"
        >
          Cancel
        </button>

      </div>

    </div>

  </div>

  <script>

    // ==================================================
    // TEACHER SUPABASE
    // ==================================================

    const TEACHER_SUPABASE_URL =
      "https://uzbhtvaorqqmzhivmlpx.supabase.co";

    const TEACHER_SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6Ymh0dmFvcnFxbXpoaXZtbHB4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzOTYzMDEsImV4cCI6MjA5Mzk3MjMwMX0._BWxANGJgvvJZKxvuC_LWMpP4mgTh3Chr3WqIQuLRn0";

    // ==================================================
    // CLIENT
    // ==================================================

    const teacherSupabase =
      supabase.createClient(
        TEACHER_SUPABASE_URL,
        TEACHER_SUPABASE_ANON_KEY,
        {
          auth: {

            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true

          }
        }
      );

    // ==================================================
    // ELEMENTS
    // ==================================================

    const classesContainer =
      document.getElementById(
        "classesContainer"
      );

    const teacherInfo =
      document.getElementById(
        "teacherInfo"
      );

    const classCount =
      document.getElementById(
        "classCount"
      );

    const subjectCount =
      document.getElementById(
        "subjectCount"
      );

    const schoolName =
      document.getElementById(
        "schoolName"
      );

    const subjectFilter =
      document.getElementById(
        "subjectFilter"
      );

    const searchInput =
      document.getElementById(
        "searchInput"
      );

    let currentTeacher = null;

    let allClasses = [];

    // ==================================================
    // AUTH
    // ==================================================

    async function initializeAuth() {

      const {
        data: {
          session
        }
      } = await teacherSupabase
        .auth
        .getSession();

      if (!session) {

        window.location.href =
          "/login/teacher";

        return;

      }

      currentTeacher =
        session.user;

      // UI

      teacherInfo.textContent =
        `${currentTeacher.email}`;

      schoolName.textContent =
        currentTeacher.user_metadata
        .school_name
        || "Unknown School";

      // LOAD

      await loadTeachers();

      await loadClasses();

    }

    // ==================================================
    // LOAD TEACHERS
    // ==================================================

    async function loadTeachers() {

      const {
        data,
        error
      } = await teacherSupabase
        .from("teacher_profiles")
        .select("*")
        .eq(
          "school_id",
          currentTeacher.user_metadata
          .school_id
        );

      if (error) {

        console.error(error);

        return;

      }

      const teacherSelect =
        document.getElementById(
          "teacherSelect"
        );

      teacherSelect.innerHTML = "";

      data.forEach(teacher => {

        teacherSelect.innerHTML += `

          <option value="${teacher.id}">

            ${teacher.full_name}

          </option>

        `;

      });

    }

    // ==================================================
    // LOAD CLASSES
    // ==================================================

    async function loadClasses() {

      const {
        data,
        error
      } = await teacherSupabase
        .from("classes")
        .select("*")
        .eq(
          "school_id",
          currentTeacher.user_metadata
          .school_id
        )
        .order(
          "created_at",
          {
            ascending: false
          }
        );

      if (error) {

        console.error(error);

        return;

      }

      allClasses =
        data || [];

      renderClasses();

      updateStats();

      updateSubjectFilter();

    }

    // ==================================================
    // RENDER CLASSES
    // ==================================================

    function renderClasses() {

      const search =
        searchInput.value
        .toLowerCase();

      const subject =
        subjectFilter.value;

      let filtered =
        allClasses.filter(cls => {

          const matchesSearch =

            cls.class_name
            .toLowerCase()
            .includes(search)

            ||

            cls.subject
            .toLowerCase()
            .includes(search);

          const matchesSubject =

            !subject
            ||

            cls.subject === subject;

          return (
            matchesSearch &&
            matchesSubject
          );

        });

      // EMPTY

      if (filtered.length === 0) {

        classesContainer.innerHTML = `
          <div class="empty-state">

            <h2>
              No Classes Found
            </h2>

            <p>
              Create your first class
              to get started.
            </p>

          </div>
        `;

        return;

      }

      // GRID

      let html =
        `<div class="class-grid">`;

      filtered.forEach(cls => {

        html += `

          <div class="class-card">

            <div
              class="class-top"
              style="
                background:
                ${cls.theme_color};
              "
            ></div>

            <div class="class-content">

              <div class="class-title">

                ${cls.class_name}

              </div>

              <div class="class-meta">

                📘
                ${cls.subject}

                <br>

                🏷️
                ${cls.class_code}

                <br>

                👨‍🏫
                ${cls.teacher_email}

                <br><br>

                ${cls.description || "No description."}

              </div>

              <div class="class-actions">

                <button
                  class="btn primary-btn"
                >
                  Open
                </button>

                <button
                  class="btn"
                >
                  Students
                </button>

                <button
                  class="btn"
                >
                  Documents
                </button>

              </div>

            </div>

          </div>

        `;

      });

      html += `</div>`;

      classesContainer.innerHTML =
        html;

    }

    // ==================================================
    // STATS
    // ==================================================

    function updateStats() {

      classCount.textContent =
        allClasses.length;

      const subjects =
        new Set(
          allClasses.map(
            c => c.subject
          )
        );

      subjectCount.textContent =
        subjects.size;

    }

    // ==================================================
    // SUBJECT FILTER
    // ==================================================

    function updateSubjectFilter() {

      const subjects =
        [
          ...new Set(
            allClasses.map(
              c => c.subject
            )
          )
        ];

      subjectFilter.innerHTML = `
        <option value="">
          All Subjects
        </option>
      `;

      subjects.forEach(subject => {

        subjectFilter.innerHTML += `
          <option value="${subject}">
            ${subject}
          </option>
        `;

      });

    }

    // ==================================================
    // CREATE CLASS
    // ==================================================

    async function createClass() {

      const subject =
        document.getElementById(
          "subjectInput"
        ).value.trim();

      const className =
        document.getElementById(
          "classNameInput"
        ).value.trim();

      const classCode =
        document.getElementById(
          "classCodeInput"
        ).value.trim();

      const teacherId =
        document.getElementById(
          "teacherSelect"
        ).value;

      const description =
        document.getElementById(
          "descriptionInput"
        ).value.trim();

      const themeColor =
        document.getElementById(
          "themeColorInput"
        ).value;

      // VALIDATION

      if (
        !subject ||
        !className ||
        !classCode ||
        !teacherId
      ) {

        alert(
          "Please complete all required fields."
        );

        return;

      }

      // GET TEACHER

      const {
        data: teacherData
      } = await teacherSupabase
        .from("teacher_profiles")
        .select("*")
        .eq(
          "id",
          teacherId
        )
        .single();

      // INSERT

      const {
        error
      } = await teacherSupabase
        .from("classes")
        .insert([{

          school_id:
            currentTeacher.user_metadata
            .school_id,

          teacher_id:
            teacherId,

          teacher_email:
            teacherData.email,

          class_name:
            className,

          subject:
            subject,

          class_code:
            classCode,

          description:
            description,

          theme_color:
            themeColor

        }]);

      if (error) {

        console.error(error);

        alert(
          error.message
        );

        return;

      }

      closeModal();

      await loadClasses();

    }

    // ==================================================
    // MODAL
    // ==================================================

    function openModal() {

      document.getElementById(
        "modalOverlay"
      ).style.display =
        "flex";

    }

    function closeModal() {

      document.getElementById(
        "modalOverlay"
      ).style.display =
        "none";

    }

    // ==================================================
    // FILTERS
    // ==================================================

    searchInput.addEventListener(
      "input",
      renderClasses
    );

    subjectFilter.addEventListener(
      "change",
      renderClasses
    );

    // ==================================================
    // LOGOUT
    // ==================================================

    document.getElementById(
      "logoutBtn"
    ).addEventListener(
      "click",
      async () => {

        await teacherSupabase
          .auth
          .signOut();

        window.location.href =
          "/login/teacher";

      }
    );

    // ==================================================
    // START
    // ==================================================

    window.addEventListener(
      "load",
      () => {

        setTimeout(() => {

          initializeAuth();

        }, 500);

      }
    );

  </script>

</body>
</html>
