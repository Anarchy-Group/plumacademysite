<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Teacher Documents
  </title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    * {

      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, Arial, sans-serif;

    }

    body {

      background: #f5f7fb;

      min-height: 100vh;

      padding: 30px;

      color: #111827;

    }

    /* TOPBAR */

    .topbar {

      display: flex;

      justify-content: space-between;

      align-items: center;

      flex-wrap: wrap;

      gap: 20px;

      margin-bottom: 30px;

    }

    .topbar h1 {

      font-size: 34px;

      margin-bottom: 8px;

    }

    .topbar p {

      color: #6b7280;

    }

    .topbar-buttons {

      display: flex;

      gap: 12px;

      flex-wrap: wrap;

    }

    /* BUTTONS */

    .btn {

      padding: 13px 18px;

      border-radius: 12px;

      border: none;

      cursor: pointer;

      font-weight: 600;

      text-decoration: none;

      transition: 0.15s;

      display: inline-flex;

      align-items: center;

      justify-content: center;

    }

    .primary-btn {

      background: #6366f1;

      color: white;

    }

    .primary-btn:hover {

      background: #4f46e5;

    }

    .secondary-btn {

      background: white;

      border: 1px solid #dbe1ea;

      color: #111827;

    }

    .secondary-btn:hover {

      background: #f3f4f6;

    }

    .danger-btn {

      background: #ef4444;

      color: white;

    }

    .danger-btn:hover {

      background: #dc2626;

    }

    /* HERO */

    .hero-card {

      background: white;

      border-radius: 24px;

      border: 1px solid #e5e7eb;

      padding: 30px;

      margin-bottom: 30px;

    }

    .hero-card h2 {

      font-size: 32px;

      margin-bottom: 12px;

    }

    .hero-card p {

      color: #6b7280;

      line-height: 1.8;

      max-width: 900px;

    }

    /* STATS */

    .stats {

      display: grid;

      grid-template-columns:
        repeat(
          auto-fit,
          minmax(220px, 1fr)
        );

      gap: 20px;

      margin-bottom: 30px;

    }

    .stat-box {

      background: white;

      border-radius: 20px;

      border: 1px solid #e5e7eb;

      padding: 24px;

    }

    .stat-box h3 {

      font-size: 36px;

      margin-bottom: 8px;

    }

    .stat-box p {

      color: #6b7280;

    }

    /* FILTERS */

    .filters {

      background: white;

      border-radius: 20px;

      border: 1px solid #e5e7eb;

      padding: 24px;

      margin-bottom: 30px;

      display: flex;

      gap: 15px;

      flex-wrap: wrap;

      align-items: center;

    }

    .filters input {

      padding: 14px;

      border-radius: 12px;

      border: 1px solid #d1d5db;

      font-size: 14px;

      min-width: 260px;

    }

    /* GRID */

    .document-grid {

      display: grid;

      grid-template-columns:
        repeat(
          auto-fit,
          minmax(360px, 1fr)
        );

      gap: 24px;

    }

    .document-card {

      background: white;

      border-radius: 22px;

      border: 1px solid #e5e7eb;

      padding: 24px;

      transition: 0.15s;

    }

    .document-card:hover {

      transform: translateY(-3px);

    }

    .document-title {

      font-size: 26px;

      font-weight: 700;

      margin-bottom: 15px;

      line-height: 1.3;

    }

    .document-meta {

      color: #6b7280;

      line-height: 1.9;

      font-size: 14px;

      margin-bottom: 22px;

    }

    .document-actions {

      display: flex;

      gap: 12px;

      flex-wrap: wrap;

    }

    .empty-state {

      text-align: center;

      padding: 80px 20px;

      color: #6b7280;

    }

    .empty-state h2 {

      color: #111827;

      margin-bottom: 10px;

      font-size: 30px;

    }

    .hidden {

      display: none;

    }

  </style>

</head>
<body>

  <!-- TOPBAR -->

  <div class="topbar">

    <div>

      <h1>
        ✨ Plum Academy Writer
      </h1>

      <p id="teacherInfo">
        Loading...
      </p>

    </div>

    <div class="topbar-buttons">

      <a
        href="/dashboard/teacher"
        class="btn secondary-btn"
      >
        Dashboard
      </a>

      <!-- STUDENT DOCUMENTS -->

      <a
        href="/dashboard/teacher/apps/plum-academy-writer/student-documents"
        class="btn secondary-btn"
      >
        👨‍🎓 Student Documents
      </a>

      <!-- CREATE -->

      <button
        class="btn primary-btn"
        onclick="createDocument()"
      >
        + Create New Document
      </button>

      <!-- IMPORT -->

      <button
        class="btn secondary-btn"
        onclick="
          document
          .getElementById(
            'pawdocxInput'
          )
          .click()
        "
      >
        📂 Open .pawdocx
      </button>

      <!-- HIDDEN INPUT -->

      <input
        type="file"
        id="pawdocxInput"
        class="hidden"
        accept=".pawdocx"
      />

      <!-- LOGOUT -->

      <button
        id="logoutBtn"
        class="btn danger-btn"
      >
        Logout
      </button>

    </div>

  </div>

  <!-- HERO -->

  <div class="hero-card">

    <h2>
      📄 Plum Academy Writer
    </h2>

    <p>

      Create, edit and manage your teacher
      resources, lesson plans, worksheets,
      assignments and educational content
      using Plum Academy Writer.

    </p>

  </div>

  <!-- STATS -->

  <div class="stats">

    <div class="stat-box">

      <h3 id="documentCount">
        0
      </h3>

      <p>
        Teacher Documents
      </p>

    </div>

    <div class="stat-box">

      <h3 id="resourceCount">
        0
      </h3>

      <p>
        Educational Resources
      </p>

    </div>

    <div class="stat-box">

      <h3 id="recentCount">
        0
      </h3>

      <p>
        Recently Updated
      </p>

    </div>

  </div>

  <!-- FILTERS -->

  <div class="filters">

    <input
      type="text"
      id="searchInput"
      placeholder="Search documents..."
    />

  </div>

  <!-- DOCUMENT GRID -->

  <div
    id="documentsContainer"
    class="document-grid"
  ></div>

  <script>

    // ==================================================
    // TEACHER SUPABASE
    // ==================================================

    const TEACHER_SUPABASE_URL =
      "https://uzbhtvaorqqmzhivmlpx.supabase.co";

    const TEACHER_SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6Ymh0dmFvcnFxbXpoaXZtbHB4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzOTYzMDEsImV4cCI6MjA5Mzk3MjMwMX0._BWxANGJgvvJZKxvuC_LWMpP4mgTh3Chr3WqIQuLRn0";

    // ==================================================
    // CLIENT
    // ==================================================

    const teacherSupabase =
      supabase.createClient(
        TEACHER_SUPABASE_URL,
        TEACHER_SUPABASE_ANON_KEY,
        {
          auth: {

            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true

          }
        }
      );

    // ==================================================
    // ELEMENTS
    // ==================================================

    const teacherInfo =
      document.getElementById(
        "teacherInfo"
      );

    const documentsContainer =
      document.getElementById(
        "documentsContainer"
      );

    const searchInput =
      document.getElementById(
        "searchInput"
      );

    const pawdocxInput =
      document.getElementById(
        "pawdocxInput"
      );

    let currentTeacher = null;

    let allDocuments = [];

    // ==================================================
    // AUTH
    // ==================================================

    async function initializeAuth() {

      const {
        data: {
          session
        }
      } = await teacherSupabase
        .auth
        .getSession();

      // NO SESSION

      if (!session) {

        window.location.href =
          "/login/teacher";

        return;

      }

      currentTeacher =
        session.user;

      teacherInfo.textContent =
        `${currentTeacher.user_metadata.full_name} • ${currentTeacher.email}`;

      // LOAD DOCUMENTS

      await loadDocuments();

    }

    // ==================================================
    // LOAD DOCUMENTS
    // ==================================================

    async function loadDocuments() {

      const {
        data,
        error
      } = await teacherSupabase
        .from("teacher_documents")
        .select("*")
        .eq(
          "teacher_id",
          currentTeacher.id
        )
        .order(
          "updated_at",
          {
            ascending: false
          }
        );

      console.log(
        "Teacher Documents:",
        data
      );

      console.error(error);

      allDocuments =
        data || [];

      // STATS

      document.getElementById(
        "documentCount"
      ).textContent =
        allDocuments.length;

      document.getElementById(
        "resourceCount"
      ).textContent =
        allDocuments.filter(
          doc =>
            doc.document_type
            === "resource"
        ).length;

      // RECENT

      const recentDocuments =
        allDocuments.filter(doc => {

          const updated =
            new Date(
              doc.updated_at
            );

          const now =
            new Date();

          const diff =
            now - updated;

          const days =
            diff /
            (
              1000
              * 60
              * 60
              * 24
            );

          return days <= 7;

        });

      document.getElementById(
        "recentCount"
      ).textContent =
        recentDocuments.length;

      // RENDER

      renderDocuments();

    }

    // ==================================================
    // RENDER DOCUMENTS
    // ==================================================

    function renderDocuments() {

      const search =
        searchInput.value
        .toLowerCase();

      const filtered =
        allDocuments.filter(doc => {

          return (

            doc.title
            .toLowerCase()
            .includes(search)

          );

        });

      // EMPTY

      if (filtered.length === 0) {

        documentsContainer.innerHTML = `

          <div class="empty-state">

            <h2>
              No Documents Found
            </h2>

            <p>
              Create your first teacher
              document to get started.
            </p>

          </div>

        `;

        return;

      }

      // GRID

      let html = "";

      filtered.forEach(doc => {

        html += `

          <div class="document-card">

            <div class="document-title">

              ${doc.title}

            </div>

            <div class="document-meta">

              📄 Type:
              ${doc.document_type || "Document"}

              <br>

              📅 Last Updated:
              ${new Date(
                doc.updated_at
              ).toLocaleString()}

              <br>

              👨‍🏫 ${doc.teacher_name}

            </div>

            <div class="document-actions">

              <!-- OPEN -->

              <button
                class="btn primary-btn"
                onclick="
                  openDocument(
                    '${doc.id}'
                  )
                "
              >
                Open
              </button>

              <!-- EXPORT -->

              <button
                class="btn secondary-btn"
                onclick="
                  exportDocument(
                    '${doc.id}'
                  )
                "
              >
                Export
              </button>

              <!-- DELETE -->

              <button
                class="btn danger-btn"
                onclick="
                  deleteDocument(
                    '${doc.id}'
                  )
                "
              >
                Delete
              </button>

            </div>

          </div>

        `;

      });

      documentsContainer.innerHTML =
        html;

    }

    // ==================================================
    // CREATE DOCUMENT
    // ==================================================

    async function createDocument() {

      const {
        data,
        error
      } = await teacherSupabase
        .from("teacher_documents")
        .insert([{

          teacher_id:
            currentTeacher.id,

          teacher_email:
            currentTeacher.email,

          teacher_name:
            currentTeacher.user_metadata
            .full_name,

          school_name:
            currentTeacher.user_metadata
            .school_name,

          title:
            "Untitled Document",

          content:
            "",

          document_type:
            "document",

          created_at:
            new Date().toISOString(),

          updated_at:
            new Date().toISOString()

        }])
        .select()
        .single();

      console.log(data);

      console.error(error);

      // ERROR

      if (error || !data) {

        alert(
          "Failed to create document."
        );

        return;

      }

      // OPEN

      window.location.href =
        `/dashboard/teacher/apps/plum-academy-writer/document?id=${data.id}`;

    }

    // ==================================================
    // OPEN DOCUMENT
    // ==================================================

    function openDocument(id) {

      window.location.href =
        `/dashboard/teacher/apps/plum-academy-writer/document?id=${id}`;

    }

    // ==================================================
    // EXPORT
    // ==================================================

    function exportDocument(id) {

      const doc =
        allDocuments.find(
          d => d.id === id
        );

      if (!doc) {
        return;
      }

      const pawdocx = {

        title:
          doc.title,

        teacher_name:
          doc.teacher_name,

        teacher_email:
          doc.teacher_email,

        school_name:
          doc.school_name,

        content:
          doc.content,

        exported_at:
          new Date().toISOString()

      };

      const blob =
        new Blob(
          [
            JSON.stringify(
              pawdocx,
              null,
              2
            )
          ],
          {
            type:
              "application/pawdocx"
          }
        );

      const url =
        URL.createObjectURL(
          blob
        );

      const a =
        document.createElement(
          "a"
        );

      a.href = url;

      a.download =
        `${doc.title}.pawdocx`;

      a.click();

      URL.revokeObjectURL(
        url
      );

    }

    // ==================================================
    // IMPORT .PAWDOCX
    // ==================================================

    pawdocxInput.addEventListener(
      "change",
      async (event) => {

        const file =
          event.target.files[0];

        if (!file) {
          return;
        }

        try {

          const text =
            await file.text();

          const pawdocx =
            JSON.parse(text);

          // CREATE IMPORTED DOC

          const {
            data,
            error
          } = await teacherSupabase
            .from("teacher_documents")
            .insert([{

              teacher_id:
                currentTeacher.id,

              teacher_email:
                currentTeacher.email,

              teacher_name:
                currentTeacher.user_metadata
                .full_name,

              school_name:
                currentTeacher.user_metadata
                .school_name,

              title:
                pawdocx.title
                || "Imported Document",

              content:
                pawdocx.content
                || "",

              document_type:
                "imported",

              created_at:
                new Date().toISOString(),

              updated_at:
                new Date().toISOString()

            }])
            .select()
            .single();

          console.log(data);

          console.error(error);

          // ERROR

          if (error || !data) {

            alert(
              "Failed to import document."
            );

            return;

          }

          // OPEN

          window.location.href =
            `/dashboard/teacher/apps/plum-academy-writer/document?id=${data.id}`;

        }

        catch (err) {

          console.error(err);

          alert(
            "Invalid .pawdocx file."
          );

        }

      }
    );

    // ==================================================
    // DELETE
    // ==================================================

    async function deleteDocument(id) {

      const confirmed =
        confirm(
          "Delete this document?"
        );

      if (!confirmed) {
        return;
      }

      const {
        error
      } = await teacherSupabase
        .from("teacher_documents")
        .delete()
        .eq(
          "id",
          id
        );

      console.error(error);

      await loadDocuments();

    }

    // ==================================================
    // FILTERS
    // ==================================================

    searchInput.addEventListener(
      "input",
      renderDocuments
    );

    // ==================================================
    // LOGOUT
    // ==================================================

    document.getElementById(
      "logoutBtn"
    ).addEventListener(
      "click",
      async () => {

        await teacherSupabase
          .auth
          .signOut();

        window.location.href =
          "/login/teacher";

      }
    );

    // ==================================================
    // START
    // ==================================================

    window.addEventListener(
      "load",
      () => {

        initializeAuth();

      }
    );

  </script>

</body>
</html>
