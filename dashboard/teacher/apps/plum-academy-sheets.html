<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Teacher Plum Academy Sheets
  </title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, Arial, sans-serif;
    }

    body {
      background: #f3f6fb;
      min-height: 100vh;
      color: #111827;
    }

    /* HEADER */

    .topbar {

      background: white;

      border-bottom:
        1px solid #e5e7eb;

      padding: 24px;

      display: flex;

      justify-content: space-between;

      align-items: center;

      flex-wrap: wrap;

      gap: 20px;

      position: sticky;

      top: 0;

      z-index: 999;

    }

    .topbar-left h1 {

      font-size: 42px;

      color: #15803d;

      margin-bottom: 6px;

    }

    .topbar-left p {

      color: #6b7280;

      font-size: 15px;

    }

    .topbar-buttons {

      display: flex;

      gap: 12px;

      flex-wrap: wrap;

    }

    /* BUTTONS */

    .btn {

      padding: 12px 18px;

      border-radius: 14px;

      border: none;

      cursor: pointer;

      font-weight: 700;

      font-size: 14px;

      transition: 0.15s;

      text-decoration: none;

      display: inline-flex;

      align-items: center;

      gap: 8px;

    }

    .primary-btn {

      background: #22c55e;

      color: white;

    }

    .primary-btn:hover {

      background: #16a34a;

    }

    .secondary-btn {

      background: white;

      border:
        1px solid #d1d5db;

      color: #111827;

    }

    .secondary-btn:hover {

      background: #f3f4f6;

    }

    /* MAIN */

    .container {

      padding: 30px;

    }

    /* STATS */

    .stats-grid {

      display: grid;

      grid-template-columns:
        repeat(auto-fit, minmax(220px, 1fr));

      gap: 20px;

      margin-bottom: 30px;

    }

    .stat-card {

      background: white;

      border-radius: 22px;

      padding: 24px;

      box-shadow:
        0 6px 24px rgba(0,0,0,0.05);

    }

    .stat-card h2 {

      font-size: 34px;

      color: #15803d;

      margin-bottom: 8px;

    }

    .stat-card p {

      color: #6b7280;

      font-size: 14px;

    }

    /* DOCUMENTS */

    .documents-section {

      background: white;

      border-radius: 24px;

      padding: 28px;

      box-shadow:
        0 6px 24px rgba(0,0,0,0.05);

    }

    .documents-header {

      display: flex;

      justify-content: space-between;

      align-items: center;

      flex-wrap: wrap;

      gap: 20px;

      margin-bottom: 25px;

    }

    .documents-header h2 {

      font-size: 32px;

    }

    .search-box {

      width: 320px;

      max-width: 100%;

      padding: 12px 14px;

      border-radius: 14px;

      border:
        1px solid #d1d5db;

      font-size: 14px;

    }

    /* GRID */

    .documents-grid {

      display: grid;

      grid-template-columns:
        repeat(auto-fit, minmax(320px, 1fr));

      gap: 20px;

    }

    .document-card {

      border:
        1px solid #e5e7eb;

      border-radius: 22px;

      padding: 22px;

      transition: 0.15s;

      background: #fafafa;

    }

    .document-card:hover {

      transform:
        translateY(-2px);

      box-shadow:
        0 8px 24px rgba(0,0,0,0.06);

    }

    .document-title {

      font-size: 24px;

      font-weight: 700;

      margin-bottom: 12px;

      color: #111827;

      word-break: break-word;

    }

    .document-meta {

      color: #6b7280;

      font-size: 14px;

      line-height: 1.7;

      margin-bottom: 18px;

    }

    .document-actions {

      display: flex;

      gap: 10px;

      flex-wrap: wrap;

    }

    .hidden {
      display: none;
    }

  </style>

</head>
<body>

  <!-- HEADER -->

  <div class="topbar">

    <div class="topbar-left">

      <h1>
        📊 Plum Academy Sheets
      </h1>

      <p id="teacherInfo">
        Loading...
      </p>

    </div>

    <div class="topbar-buttons">

      <button
        class="btn primary-btn"
        onclick="createSpreadsheet()"
      >
        ➕ New Spreadsheet
      </button>

      <button
        class="btn secondary-btn"
        onclick="
          document
          .getElementById(
            'importFile'
          )
          .click()
        "
      >
        📂 Open .pasxlsx
      </button>

      <a
        href="/dashboard/teacher/apps/plum-academy-sheets/students"
        class="btn secondary-btn"
      >
        👨‍🎓 Student Spreadsheets
      </a>

      <a
        href="/dashboard/teacher"
        class="btn secondary-btn"
      >
        ⬅ Dashboard
      </a>

    </div>

  </div>

  <!-- MAIN -->

  <div class="container">

    <!-- STATS -->

    <div class="stats-grid">

      <div class="stat-card">

        <h2 id="sheetCount">
          0
        </h2>

        <p>
          Teacher Spreadsheets
        </p>

      </div>

      <div class="stat-card">

        <h2 id="lastEdited">
          --
        </h2>

        <p>
          Last Edited
        </p>

      </div>

    </div>

    <!-- DOCUMENTS -->

    <div class="documents-section">

      <div class="documents-header">

        <h2>
          My Spreadsheets
        </h2>

        <input
          type="text"
          class="search-box"
          placeholder="Search spreadsheets..."
          id="searchInput"
        />

      </div>

      <div
        class="documents-grid"
        id="documentsGrid"
      ></div>

    </div>

  </div>

  <!-- IMPORT -->

  <input
    type="file"
    id="importFile"
    class="hidden"
    accept=".pasxlsx"
  />

  <script>

    // ==================================================
    // SUPABASE
    // ==================================================

    const TEACHER_SUPABASE_URL =
      "https://uzbhtvaorqqmzhivmlpx.supabase.co";

    const TEACHER_SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6Ymh0dmFvcnFxbXpoaXZtbHB4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzOTYzMDEsImV4cCI6MjA5Mzk3MjMwMX0._BWxANGJgvvJZKxvuC_LWMpP4mgTh3Chr3WqIQuLRn0";

    const teacherSupabase =
      supabase.createClient(
        TEACHER_SUPABASE_URL,
        TEACHER_SUPABASE_ANON_KEY
      );

    // ==================================================
    // GLOBALS
    // ==================================================

    let currentTeacher = null;

    let spreadsheets = [];

    // ==================================================
    // AUTH
    // ==================================================

    async function initializeAuth() {

      const {

        data: {
          session
        }

      } = await teacherSupabase
        .auth
        .getSession();

      if (!session) {

        window.location.href =
          "/login/teacher";

        return;

      }

      currentTeacher =
        session.user;

      document.getElementById(
        "teacherInfo"
      ).textContent =

        `${currentTeacher.user_metadata.full_name} • ${currentTeacher.email}`;

      loadSpreadsheets();

    }

    // ==================================================
    // LOAD
    // ==================================================

    async function loadSpreadsheets() {

      const {

        data,
        error

      } = await teacherSupabase

        .from("teacher_sheets")

        .select("*")

        .eq(
          "teacher_id",
          currentTeacher.id
        )

        .order(
          "updated_at",
          {
            ascending: false
          }
        );

      if (error) {

        console.error(error);

        return;

      }

      spreadsheets =
        data || [];

      renderSpreadsheets();

    }

    // ==================================================
    // RENDER
    // ==================================================

    function renderSpreadsheets() {

      const grid =
        document.getElementById(
          "documentsGrid"
        );

      grid.innerHTML = "";

      document.getElementById(
        "sheetCount"
      ).textContent =
        spreadsheets.length;

      if (
        spreadsheets.length
      ) {

        document.getElementById(
          "lastEdited"
        ).textContent =

          new Date(
            spreadsheets[0]
            .updated_at
          ).toLocaleDateString();

      }

      else {

        document.getElementById(
          "lastEdited"
        ).textContent =
          "--";

      }

      spreadsheets.forEach(doc => {

        const card =
          document.createElement(
            "div"
          );

        card.className =
          "document-card";

        card.innerHTML = `

          <div class="document-title">
            ${doc.title || "Untitled Spreadsheet"}
          </div>

          <div class="document-meta">

            📅 Updated:
            ${new Date(
              doc.updated_at
            ).toLocaleString()}

            <br><br>

            👨‍🏫 ${doc.teacher_name}

          </div>

          <div class="document-actions">

            <button
              class="btn primary-btn"
              onclick="openSpreadsheet('${doc.id}')"
            >
              Open
            </button>

            <button
              class="btn secondary-btn"
              onclick="downloadSpreadsheet('${doc.id}')"
            >
              Export
            </button>

            <button
              class="btn secondary-btn"
              onclick="deleteSpreadsheet('${doc.id}')"
            >
              Delete
            </button>

          </div>

        `;

        grid.appendChild(card);

      });

    }

    // ==================================================
    // CREATE
    // ==================================================

    function createSpreadsheet() {

      window.location.href =
        "/dashboard/teacher/apps/plum-academy-sheets/document";

    }

    // ==================================================
    // OPEN
    // ==================================================

    function openSpreadsheet(id) {

      window.location.href =

        `/dashboard/teacher/apps/plum-academy-sheets/document?id=${id}`;

    }

    // ==================================================
    // EXPORT
    // ==================================================

    function downloadSpreadsheet(id) {

      const spreadsheet =
        spreadsheets.find(
          s => s.id === id
        );

      if (!spreadsheet) {
        return;
      }

      const blob =
        new Blob(

          [
            JSON.stringify(
              spreadsheet,
              null,
              2
            )
          ],

          {
            type:
              "application/pasxlsx"
          }

        );

      const url =
        URL.createObjectURL(blob);

      const a =
        document.createElement("a");

      a.href = url;

      a.download =
        `${spreadsheet.title || "spreadsheet"}.pawsheets`;

      a.click();

      URL.revokeObjectURL(url);

    }

    // ==================================================
    // DELETE
    // ==================================================

    async function deleteSpreadsheet(id) {

      const confirmed =
        confirm(
          "Delete this spreadsheet?"
        );

      if (!confirmed) {
        return;
      }

      await teacherSupabase

        .from("teacher_sheets")

        .delete()

        .eq(
          "id",
          id
        );

      loadSpreadsheets();

    }

    // ==================================================
    // IMPORT
    // ==================================================

    document.getElementById(
      "importFile"
    ).addEventListener(
      "change",
      async (event) => {

        const file =
          event.target.files[0];

        if (!file) {
          return;
        }

        try {

          const text =
            await file.text();

          const imported =
            JSON.parse(text);

          const {

            error

          } = await teacherSupabase

            .from("teacher_sheets")

            .insert([{

              teacher_id:
                currentTeacher.id,

              teacher_name:
                currentTeacher
                .user_metadata
                .full_name,

              teacher_email:
                currentTeacher.email,

              title:
                imported.title
                || "Imported Spreadsheet",

              workbook:
                imported.workbook,

              updated_at:
                new Date()
                .toISOString()

            }]);

          if (error) {

            console.error(error);

            alert(
              "Failed to import spreadsheet."
            );

            return;

          }

          loadSpreadsheets();

          alert(
            "Spreadsheet imported successfully!"
          );

        }

        catch {

          alert(
            "Invalid .pasxlsx file."
          );

        }

      }
    );

    // ==================================================
    // SEARCH
    // ==================================================

    document.getElementById(
      "searchInput"
    ).addEventListener(
      "input",
      (e) => {

        const value =
          e.target.value
          .toLowerCase();

        document
          .querySelectorAll(
            ".document-card"
          )
          .forEach(card => {

            const title =
              card
              .querySelector(
                ".document-title"
              )
              .textContent
              .toLowerCase();

            card.style.display =

              title.includes(value)
              ? "block"
              : "none";

          });

      }
    );

    // ==================================================
    // START
    // ==================================================

    window.addEventListener(
      "load",
      () => {

        initializeAuth();

      }
    );

  </script>

</body>
</html>
