<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Plum Academy Sheets
  </title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, Arial, sans-serif;
    }

    body {
      background: #f3f6fb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: #111827;
      padding-bottom: 140px;
    }

    /* TOPBAR */

    .topbar {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 999;
    }

    .topbar h1 {
      font-size: 30px;
      color: #15803d;
      margin-bottom: 4px;
    }

    .topbar p {
      color: #6b7280;
      font-size: 14px;
    }

    .topbar-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* BUTTONS */

    .btn {
      padding: 10px 16px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: 0.15s;
      text-decoration: none;
      font-size: 14px;
    }

    .primary-btn {
      background: #22c55e;
      color: white;
    }

    .primary-btn:hover {
      background: #16a34a;
    }

    .secondary-btn {
      background: white;
      border: 1px solid #d1d5db;
      color: #111827;
    }

    .secondary-btn:hover {
      background: #f3f4f6;
    }

    /* TOOLBAR */

    .toolbar {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      padding: 16px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      position: sticky;
      top: 76px;
      z-index: 998;
    }

    .toolbar button,
    .toolbar input {
      padding: 9px 12px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      background: white;
      font-size: 13px;
    }

    .toolbar button {
      cursor: pointer;
      font-weight: 600;
    }

    .toolbar button:hover {
      background: #f3f4f6;
    }

    /* SHEET */

    .sheet-wrapper {
      flex: 1;
      overflow: auto;
      padding: 24px;
    }

    .sheet {
      background: white;
      border-radius: 20px;
      border: 1px solid #e5e7eb;
      overflow: auto;
      box-shadow:
        0 6px 24px rgba(0,0,0,0.05);
    }

    table {
      border-collapse: collapse;
      width: max-content;
    }

    th {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      min-width: 90px;
      width: 90px;
      height: 32px;
      text-align: center;
      color: #6b7280;
      font-size: 12px;
      position: sticky;
      top: 0;
      z-index: 2;
      user-select: none;
    }

    td {
      border: 1px solid #e5e7eb;
      min-width: 90px;
      width: 90px;
      height: 28px;
      min-height: 28px;
      padding: 4px 6px;
      outline: none;
      cursor: text;
      position: relative;
      font-size: 13px;
      overflow: hidden;
      background: white;
    }

    td.selected {
      background: #dbeafe;
      outline: 2px solid #3b82f6;
      z-index: 1;
    }

    .row-number {
      position: sticky;
      left: 0;
      z-index: 1;
      background: #f9fafb;
      min-width: 45px;
      width: 45px;
      font-size: 12px;
      color: #6b7280;
    }

    .resize-handle {
      position: absolute;
      right: 0;
      top: 0;
      width: 5px;
      height: 100%;
      cursor: col-resize;
      z-index: 10;
    }

    /* TABS */

    .sheet-tabs {
      position: fixed;
      bottom: 52px;
      left: 0;
      width: 100%;
      display: flex;
      gap: 10px;
      padding: 12px 24px;
      background: white;
      border-top: 1px solid #e5e7eb;
      overflow-x: auto;
      z-index: 9998;
    }

    .sheet-tab {
      padding: 9px 14px;
      border-radius: 10px;
      background: #f3f4f6;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
      font-size: 13px;
    }

    .sheet-tab.active {
      background: #22c55e;
      color: white;
    }

    /* FOOTER */

    .statusbar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: white;
      border-top: 1px solid #e5e7eb;
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      color: #6b7280;
      font-size: 13px;
      z-index: 9999;
    }

    /* POPUP */

    .chart-popup {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10000;
    }

    .chart-popup-content {
      background: white;
      width: 90%;
      max-width: 900px;
      border-radius: 24px;
      padding: 25px;
    }

    .hidden {
      display: none;
    }

  </style>

</head>
<body>

  <!-- TOPBAR -->

  <div class="topbar">

    <div>

      <h1>
        📊 Teacher Plum Academy Sheets
      </h1>

      <p id="teacherInfo">
        Loading...
      </p>

    </div>

    <div class="topbar-buttons">

      <button
        class="btn secondary-btn"
        onclick="newSheet()"
      >
        + New Sheet
      </button>

      <button
        class="btn secondary-btn"
        onclick="
          document
          .getElementById(
            'importFile'
          )
          .click()
        "
      >
        Open .pasxlsx
      </button>

      <button
        class="btn secondary-btn"
        onclick="exportSheet()"
      >
        Export
      </button>

      <button
        class="btn primary-btn"
        onclick="saveWorkbook()"
      >
        Save Workbook
      </button>

    </div>

  </div>

  <!-- TOOLBAR -->

  <div class="toolbar">

    <input
      type="text"
      id="sheetTitle"
      placeholder="Spreadsheet Title"
    />

    <input
      type="color"
      id="bgColor"
    />

    <button onclick="applyBackground()">
      Fill
    </button>

    <input
      type="color"
      id="textColor"
    />

    <button onclick="applyTextColor()">
      Text
    </button>

    <button onclick="toggleBold()">
      Bold
    </button>

    <button onclick="mergeCells()">
      Merge / Unmerge
    </button>

    <button onclick="generateChart()">
      Chart
    </button>

  </div>

  <!-- SHEET -->

  <div class="sheet-wrapper">

    <div class="sheet">

      <table id="spreadsheet"></table>

    </div>

  </div>

  <!-- TABS -->

  <div
    class="sheet-tabs"
    id="sheetTabs"
  ></div>

  <!-- FOOTER -->

  <div class="statusbar">

    <div id="saveStatus">
      Ready
    </div>

    <div id="currentSheetInfo">
      Current Sheet: Sheet1
    </div>

  </div>

  <!-- CHART POPUP -->

  <div
    class="chart-popup"
    id="chartPopup"
  >

    <div class="chart-popup-content">

      <canvas id="chartCanvas"></canvas>

    </div>

  </div>

  <!-- IMPORT -->

  <input
    type="file"
    id="importFile"
    class="hidden"
    accept=".pawsheets"
  />

  <script>

    // ==================================================
    // SUPABASE
    // ==================================================

    const TEACHER_SUPABASE_URL =
      "https://uzbhtvaorqqmzhivmlpx.supabase.co";

    const TEACHER_SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6Ymh0dmFvcnFxbXpoaXZtbHB4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzOTYzMDEsImV4cCI6MjA5Mzk3MjMwMX0._BWxANGJgvvJZKxvuC_LWMpP4mgTh3Chr3WqIQuLRn0";

    const teacherSupabase =
      supabase.createClient(
        TEACHER_SUPABASE_URL,
        TEACHER_SUPABASE_ANON_KEY
      );

    // ==================================================
    // URL PARAMS
    // ==================================================

    const urlParams =
      new URLSearchParams(
        window.location.search
      );

    const spreadsheetId =
      urlParams.get("id");

    // ==================================================
    // GLOBALS
    // ==================================================

    let currentTeacher = null;

    let workbook = {

      sheets: {

        Sheet1: {

          cells: {},
          merges: {}

        }

      }

    };

    let currentSheet = "Sheet1";

    let selectedCells = [];

    let chart = null;

    // ==================================================
    // AUTH
    // ==================================================

    async function initializeAuth() {

      const {
        data: {
          session
        }
      } = await teacherSupabase
        .auth
        .getSession();

      if (!session) {

        window.location.href =
          "/login/teacher";

        return;

      }

      currentTeacher =
        session.user;

      document.getElementById(
        "teacherInfo"
      ).textContent =

        `${currentTeacher.user_metadata.full_name} • ${currentTeacher.email}`;

      if (spreadsheetId) {

        await loadSpreadsheet(
          spreadsheetId
        );

      }

      renderTabs();

      renderSheet();

    }

    // ==================================================
    // LOAD
    // ==================================================

    async function loadSpreadsheet(id) {

      const {

        data,
        error

      } = await teacherSupabase

        .from("teacher_sheets")

        .select("*")

        .eq(
          "id",
          id
        )

        .single();

      if (error) {

        console.error(error);

        return;

      }

      workbook =
        data.workbook;

      document.getElementById(
        "sheetTitle"
      ).value =
        data.title || "";

      currentSheet =
        Object.keys(
          workbook.sheets
        )[0];

    }

  </script>

</body>
</html>
