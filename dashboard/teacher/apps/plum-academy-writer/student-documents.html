<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Student Documents
  </title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    * {

      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, Arial, sans-serif;

    }

    body {

      background: #f5f7fb;

      min-height: 100vh;

      padding: 30px;

      color: #111827;

    }

    .topbar {

      display: flex;

      justify-content: space-between;

      align-items: center;

      flex-wrap: wrap;

      gap: 20px;

      margin-bottom: 30px;

    }

    .topbar h1 {

      font-size: 34px;

      font-weight: 700;

    }

    .topbar p {

      color: #6b7280;

      margin-top: 6px;

    }

    .topbar-buttons {

      display: flex;

      gap: 12px;

      flex-wrap: wrap;

    }

    .btn {

      padding: 13px 18px;

      border-radius: 12px;

      border: 1px solid #dbe1ea;

      background: white;

      color: #111827;

      font-weight: 600;

      cursor: pointer;

      text-decoration: none;

      transition: 0.15s;

    }

    .btn:hover {

      background: #f3f4f6;

    }

    .primary-btn {

      background: #6366f1;

      color: white;

      border: none;

    }

    .primary-btn:hover {

      background: #4f46e5;

    }

    .danger-btn {

      background: #ef4444;

      color: white;

      border: none;

    }

    .danger-btn:hover {

      background: #dc2626;

    }

    .stats-grid {

      display: grid;

      grid-template-columns:
        repeat(
          auto-fit,
          minmax(220px, 1fr)
        );

      gap: 20px;

      margin-bottom: 30px;

    }

    .stat-card {

      background: white;

      border: 1px solid #e5e7eb;

      border-radius: 18px;

      padding: 22px;

    }

    .stat-card h3 {

      font-size: 15px;

      color: #6b7280;

      margin-bottom: 10px;

    }

    .stat-card .number {

      font-size: 32px;

      font-weight: 700;

    }

    .card {

      background: white;

      border: 1px solid #e5e7eb;

      border-radius: 18px;

      padding: 24px;

    }

    .section-title {

      font-size: 26px;

      font-weight: 700;

      margin-bottom: 20px;

    }

    .document-grid {

      display: grid;

      grid-template-columns:
        repeat(
          auto-fit,
          minmax(330px, 1fr)
        );

      gap: 20px;

    }

    .document-card {

      border: 1px solid #e5e7eb;

      border-radius: 18px;

      padding: 22px;

      background: #fff;

      transition: 0.15s;

    }

    .document-card:hover {

      border-color: #c7d2fe;

      transform: translateY(-2px);

    }

    .document-title {

      font-size: 22px;

      font-weight: 700;

      margin-bottom: 14px;

    }

    .document-meta {

      color: #6b7280;

      line-height: 1.8;

      font-size: 14px;

      margin-bottom: 20px;

    }

    .document-actions {

      display: flex;

      gap: 10px;

      flex-wrap: wrap;

    }

    .loading {

      text-align: center;

      color: #6b7280;

      padding: 50px;

    }

    .empty-state {

      text-align: center;

      padding: 70px 20px;

      color: #6b7280;

    }

    .empty-state h2 {

      color: #111827;

      margin-bottom: 12px;

      font-size: 28px;

    }

  </style>

</head>
<body>

  <!-- TOPBAR -->

  <div class="topbar">

    <div>

      <h1>
        📄 Student Documents
      </h1>

      <p id="teacherInfo">
        Loading...
      </p>

    </div>

    <div class="topbar-buttons">

      <a
        href="/dashboard/teacher"
        class="btn"
      >
        Teacher Dashboard
      </a>

      <button
        id="logoutBtn"
        class="btn danger-btn"
      >
        Logout
      </button>

    </div>

  </div>

  <!-- STATS -->

  <div class="stats-grid">

    <div class="stat-card">

      <h3>
        Total Documents
      </h3>

      <div
        class="number"
        id="documentCount"
      >
        0
      </div>

    </div>

    <div class="stat-card">

      <h3>
        Students
      </h3>

      <div
        class="number"
        id="studentCount"
      >
        0
      </div>

    </div>

    <div class="stat-card">

      <h3>
        Latest Activity
      </h3>

      <div
        class="number"
        style="font-size:18px;"
        id="latestActivity"
      >
        None
      </div>

    </div>

  </div>

  <!-- DOCUMENTS -->

  <div class="card">

    <div class="section-title">
      Student Work
    </div>

    <div id="documentsContainer">

      <div class="loading">
        Loading student documents...
      </div>

    </div>

  </div>

  <script>

    // ==================================================
    // TEACHER SUPABASE
    // ==================================================

    const TEACHER_SUPABASE_URL =
      "https://uzbhtvaorqqmzhivmlpx.supabase.co";

    const TEACHER_SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6Ymh0dmFvcnFxbXpoaXZtbHB4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzOTYzMDEsImV4cCI6MjA5Mzk3MjMwMX0._BWxANGJgvvJZKxvuC_LWMpP4mgTh3Chr3WqIQuLRn0";

    // ==================================================
    // STUDENT SUPABASE
    // ==================================================

    const STUDENT_SUPABASE_URL =
      "https://ebzcflngssljyqieizws.supabase.co";

    const STUDENT_SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViemNmbG5nc3NsanlxaWVpendzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MDQ3NDEsImV4cCI6MjA5Mzk4MDc0MX0.ZnPi4jKEtkr0iUN_ymVrhUI7A_OMkhWjRn3shA2D9yk";

    // ==================================================
    // CLIENTS
    // ==================================================

    const teacherSupabase =
      supabase.createClient(
        TEACHER_SUPABASE_URL,
        TEACHER_SUPABASE_ANON_KEY,
        {
          auth: {

            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true

          }
        }
      );

    const studentSupabase =
      supabase.createClient(
        STUDENT_SUPABASE_URL,
        STUDENT_SUPABASE_ANON_KEY
      );

    // ==================================================
    // ELEMENTS
    // ==================================================

    const documentsContainer =
      document.getElementById(
        "documentsContainer"
      );

    const teacherInfo =
      document.getElementById(
        "teacherInfo"
      );

    const documentCount =
      document.getElementById(
        "documentCount"
      );

    const studentCount =
      document.getElementById(
        "studentCount"
      );

    const latestActivity =
      document.getElementById(
        "latestActivity"
      );

    let currentTeacher = null;

    // ==================================================
    // AUTH
    // ==================================================

    async function initializeAuth() {

      try {

        const {
          data: {
            session
          }
        } = await teacherSupabase
          .auth
          .getSession();

        console.log(
          "Teacher Session:",
          session
        );

        // NO SESSION

        if (!session) {

          window.location.href =
            "/login/teacher";

          return;

        }

        currentTeacher =
          session.user;

        // UPDATE UI

        teacherInfo.textContent =
          `${currentTeacher.email}`;

        // LOAD DOCUMENTS

        await loadDocuments();

      }

      catch (error) {

        console.error(error);

        documentsContainer.innerHTML = `
          <div class="empty-state">

            <h2>
              Authentication Failed
            </h2>

            <p>
              ${error.message}
            </p>

          </div>
        `;

      }

    }

    // ==================================================
    // LOAD DOCUMENTS
    // ==================================================

    async function loadDocuments() {

      try {

        const response =
          await studentSupabase
            .from("student_documents")
            .select("*")
            .eq(
              "teacher_id",
              currentTeacher.id
            )
            .order(
              "updated_at",
              {
                ascending: false
              }
            );

        console.log(
          "Document Response:",
          response
        );

        // ERROR

        if (response.error) {

          console.error(
            response.error
          );

          documentsContainer.innerHTML = `
            <div class="empty-state">

              <h2>
                Failed To Load Documents
              </h2>

              <p>
                ${response.error.message}
              </p>

            </div>
          `;

          return;

        }

        const documents =
          response.data || [];

        // STATS

        documentCount.textContent =
          documents.length;

        const uniqueStudents =
          new Set(
            documents.map(
              doc => doc.student_id
            )
          );

        studentCount.textContent =
          uniqueStudents.size;

        if (documents.length > 0) {

          latestActivity.textContent =
            new Date(
              documents[0].updated_at
            ).toLocaleDateString();

        }

        // EMPTY

        if (documents.length === 0) {

          documentsContainer.innerHTML = `
            <div class="empty-state">

              <h2>
                No Student Work Yet
              </h2>

              <p>
                Student documents will appear
                here automatically once work
                is created and saved.
              </p>

            </div>
          `;

          return;

        }

        // BUILD GRID

        let html =
          `<div class="document-grid">`;

        documents.forEach(doc => {

          html += `

            <div class="document-card">

              <div class="document-title">
                ${doc.title}
              </div>

              <div class="document-meta">

                👤
                ${doc.student_name}

                <br>

                📧
                ${doc.student_email}

                <br>

                🎓
                ${doc.student_keystage || "Unknown"}

                <br>

                🆔
                ${doc.student_id}

                <br><br>

                Updated:
                ${new Date(
                  doc.updated_at
                ).toLocaleString()}

              </div>

              <div class="document-actions">

                <!-- OPEN -->

                <button
                  class="btn primary-btn"
                  onclick="
                    window.location.href=
                    '/dashboard/teacher/apps/plum-academy-writer/student-documents/document?id=${doc.id}'
                  "
                >
                  Open
                </button>

                <!-- EXPORT -->

                <button
                  class="btn"
                  onclick='exportDocument(
                    ${JSON.stringify(doc)}
                  )'
                >
                  Export
                </button>

                <!-- PRINT -->

                <button
                  class="btn"
                  onclick='printDocument(
                    ${JSON.stringify(doc)}
                  )'
                >
                  Print
                </button>

              </div>

            </div>

          `;

        });

        html += `</div>`;

        documentsContainer.innerHTML =
          html;

      }

      catch (error) {

        console.error(error);

      }

    }

    // ==================================================
    // EXPORT PAWDOCX
    // ==================================================

    function exportDocument(doc) {

      const pawdocxData = {

        title:
          doc.title,

        content:
          doc.content,

        student_name:
          doc.student_name,

        student_email:
          doc.student_email,

        student_id:
          doc.student_id,

        keystage:
          doc.student_keystage,

        updated_at:
          doc.updated_at

      };

      const blob =
        new Blob(
          [
            JSON.stringify(
              pawdocxData,
              null,
              2
            )
          ],
          {
            type:
              "application/pawdocx"
          }
        );

      const url =
        URL.createObjectURL(blob);

      const a =
        document.createElement("a");

      a.href = url;

      a.download =
        `${doc.title}.pawdocx`;

      a.click();

      URL.revokeObjectURL(url);

    }

    // ==================================================
    // PRINT DOCUMENT
    // ==================================================

    function printDocument(doc) {

      const printWindow =
        window.open(
          "",
          "_blank"
        );

      printWindow.document.write(`

        <html>

          <head>

            <title>
              ${doc.title}
            </title>

          </head>

          <body>

            <h1>
              ${doc.title}
            </h1>

            <hr>

            <p>

              <strong>
                Student:
              </strong>

              ${doc.student_name}

            </p>

            <p>

              <strong>
                Email:
              </strong>

              ${doc.student_email}

            </p>

            <p>

              <strong>
                Keystage:
              </strong>

              ${doc.student_keystage}

            </p>

            <hr>

            ${doc.content}

          </body>

        </html>

      `);

      printWindow.document.close();

      printWindow.print();

    }

    // ==================================================
    // LOGOUT
    // ==================================================

    document.getElementById(
      "logoutBtn"
    ).addEventListener(
      "click",
      async () => {

        await teacherSupabase
          .auth
          .signOut();

        window.location.href =
          "/login/teacher";

      }
    );

    // ==================================================
    // START
    // ==================================================

    window.addEventListener(
      "load",
      () => {

        setTimeout(() => {

          initializeAuth();

        }, 500);

      }
    );

  </script>

</body>
</html>
