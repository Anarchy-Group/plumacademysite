<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Plum Academy Writer - Teacher
  </title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    * {

      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, Arial, sans-serif;

    }

    body {

      background: #f5f7fb;

      min-height: 100vh;

      color: #111827;

    }

    .layout {

      display: flex;

      min-height: 100vh;

    }

    /* SIDEBAR */

    .sidebar {

      width: 320px;

      background: white;

      border-right: 1px solid #e5e7eb;

      padding: 28px;

      overflow-y: auto;

    }

    .sidebar h1 {

      font-size: 30px;

      margin-bottom: 25px;

    }

    .info-card {

      background: #f9fafb;

      border: 1px solid #e5e7eb;

      border-radius: 18px;

      padding: 18px;

      margin-bottom: 20px;

    }

    .info-card h3 {

      margin-bottom: 12px;

      font-size: 18px;

    }

    .info-card p {

      color: #6b7280;

      line-height: 1.8;

      font-size: 14px;

    }

    .feedback-box {

      width: 100%;

      min-height: 180px;

      border-radius: 14px;

      border: 1px solid #d1d5db;

      padding: 14px;

      resize: vertical;

      font-size: 14px;

      margin-top: 10px;

    }

    .sidebar-buttons {

      display: flex;

      flex-direction: column;

      gap: 12px;

      margin-top: 20px;

    }

    .btn {

      padding: 14px 18px;

      border-radius: 12px;

      border: none;

      cursor: pointer;

      font-weight: 600;

      transition: 0.15s;

      text-decoration: none;

      text-align: center;

    }

    .primary-btn {

      background: #6366f1;

      color: white;

    }

    .primary-btn:hover {

      background: #4f46e5;

    }

    .secondary-btn {

      background: #f3f4f6;

      color: #111827;

    }

    .secondary-btn:hover {

      background: #e5e7eb;

    }

    .danger-btn {

      background: #ef4444;

      color: white;

    }

    .danger-btn:hover {

      background: #dc2626;

    }

    /* MAIN */

    .main {

      flex: 1;

      display: flex;

      flex-direction: column;

    }

    /* TOPBAR */

    .topbar {

      background: white;

      border-bottom: 1px solid #e5e7eb;

      padding: 18px 28px;

      display: flex;

      justify-content: space-between;

      align-items: center;

      flex-wrap: wrap;

      gap: 15px;

    }

    .topbar-left h2 {

      font-size: 24px;

      margin-bottom: 4px;

    }

    .topbar-left p {

      color: #6b7280;

      font-size: 14px;

    }

    .topbar-actions {

      display: flex;

      gap: 12px;

      flex-wrap: wrap;

    }

    /* TOOLBAR */

    .toolbar {

      background: white;

      padding: 16px 28px;

      border-bottom: 1px solid #e5e7eb;

      display: flex;

      gap: 10px;

      flex-wrap: wrap;

    }

    .toolbar button,
    .toolbar select {

      padding: 11px 14px;

      border-radius: 10px;

      border: 1px solid #d1d5db;

      background: white;

      cursor: pointer;

      font-weight: 600;

    }

    .toolbar button:hover {

      background: #f3f4f6;

    }

    /* EDITOR */

    .editor-wrapper {

      flex: 1;

      overflow-y: auto;

      padding: 30px;

    }

    .editor-container {

      max-width: 1000px;

      margin: auto;

      background: white;

      border-radius: 22px;

      border: 1px solid #e5e7eb;

      overflow: hidden;

    }

    .document-header {

      padding: 22px;

      border-bottom: 1px solid #e5e7eb;

      background: #f9fafb;

    }

    .document-header input {

      width: 100%;

      border: none;

      outline: none;

      font-size: 32px;

      font-weight: 700;

      background: transparent;

    }

    .document-meta {

      margin-top: 10px;

      color: #6b7280;

      line-height: 1.8;

      font-size: 14px;

    }

    #editor {

      min-height: 900px;

      padding: 35px;

      outline: none;

      line-height: 1.9;

      font-size: 16px;

    }

    .status {

      padding: 14px 28px;

      background: white;

      border-top: 1px solid #e5e7eb;

      color: #6b7280;

      font-size: 14px;

    }

    @media print {

      .sidebar,
      .toolbar,
      .topbar,
      .status {

        display: none;

      }

      body {

        background: white;

      }

      .editor-container {

        border: none;

      }

    }

  </style>

</head>
<body>

  <div class="layout">

    <!-- SIDEBAR -->

    <aside class="sidebar">

      <h1>
        ✨ Teacher Writer
      </h1>

      <!-- STUDENT -->

      <div class="info-card">

        <h3>
          👨‍🎓 Student
        </h3>

        <p id="studentInfo">
          Loading...
        </p>

      </div>

      <!-- CLASS -->

      <div class="info-card">

        <h3>
          🏫 Class
        </h3>

        <p id="classInfo">
          Loading...
        </p>

      </div>

      <!-- DOCUMENT -->

      <div class="info-card">

        <h3>
          📄 Document
        </h3>

        <p id="documentInfo">
          Loading...
        </p>

      </div>

      <!-- FEEDBACK -->

      <div class="info-card">

        <h3>
          📝 Teacher Feedback
        </h3>

        <textarea
          id="teacherFeedback"
          class="feedback-box"
          placeholder="Leave feedback..."
        ></textarea>

      </div>

      <!-- BUTTONS -->

      <div class="sidebar-buttons">

        <button
          class="btn primary-btn"
          onclick="saveDocument()"
        >
          Save Changes
        </button>

        <button
          class="btn secondary-btn"
          onclick="downloadPawdocx()"
        >
          Export .pawdocx
        </button>

        <button
          class="btn secondary-btn"
          onclick="window.print()"
        >
          Print
        </button>

        <a
          href="/dashboard/teacher/classes"
          class="btn secondary-btn"
        >
          Back To Classes
        </a>

        <button
          class="btn danger-btn"
          id="logoutBtn"
        >
          Logout
        </button>

      </div>

    </aside>

    <!-- MAIN -->

    <main class="main">

      <!-- TOPBAR -->

      <div class="topbar">

        <div class="topbar-left">

          <h2>
            Reviewing Student Work
          </h2>

          <p id="teacherInfo">
            Loading...
          </p>

        </div>

        <div class="topbar-actions">

          <button
            class="btn primary-btn"
            onclick="saveDocument()"
          >
            Save
          </button>

        </div>

      </div>

      <!-- TOOLBAR -->

      <div class="toolbar">

        <button onclick="format('bold')">
          Bold
        </button>

        <button onclick="format('italic')">
          Italic
        </button>

        <button onclick="format('underline')">
          Underline
        </button>

        <button onclick="format('insertUnorderedList')">
          Bullet List
        </button>

        <button onclick="format('justifyLeft')">
          Left
        </button>

        <button onclick="format('justifyCenter')">
          Center
        </button>

        <button onclick="format('justifyRight')">
          Right
        </button>

        <select onchange="changeFont(this.value)">

          <option value="Arial">
            Arial
          </option>

          <option value="Georgia">
            Georgia
          </option>

          <option value="Verdana">
            Verdana
          </option>

          <option value="Courier New">
            Courier New
          </option>

        </select>

      </div>

      <!-- EDITOR -->

      <div class="editor-wrapper">

        <div class="editor-container">

          <!-- HEADER -->

          <div class="document-header">

            <input
              type="text"
              id="documentTitle"
              placeholder="Document Title"
            />

          <p id="studentInfo">
            Loading...
          </p>

          <div class="header-row">

            <strong>
              Email Address:
            </strong>

            <span id="headerStudentEmail">
              Loading...
            </span>

          </div>

          </div>

          <!-- EDITOR -->

          <div
            id="editor"
            contenteditable="true"
          ></div>

        </div>

      </div>

      <!-- STATUS -->

      <div
        class="status"
        id="saveStatus"
      >
        Ready
      </div>

    </main>

  </div>

  <script>

    // ==================================================
    // TEACHER SUPABASE
    // ==================================================

    const TEACHER_SUPABASE_URL =
      "https://uzbhtvaorqqmzhivmlpx.supabase.co";

    const TEACHER_SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6Ymh0dmFvcnFxbXpoaXZtbHB4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzOTYzMDEsImV4cCI6MjA5Mzk3MjMwMX0._BWxANGJgvvJZKxvuC_LWMpP4mgTh3Chr3WqIQuLRn0";

    // ==================================================
    // STUDENT SUPABASE
    // ==================================================

    const STUDENT_SUPABASE_URL =
      "https://ebzcflngssljyqieizws.supabase.co";

    const STUDENT_SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViemNmbG5nc3NsanlxaWVpendzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MDQ3NDEsImV4cCI6MjA5Mzk4MDc0MX0.ZnPi4jKEtkr0iUN_ymVrhUI7A_OMkhWjRn3shA2D9yk";

    // ==================================================
    // CLIENTS
    // ==================================================

    const teacherSupabase =
      supabase.createClient(
        TEACHER_SUPABASE_URL,
        TEACHER_SUPABASE_ANON_KEY,
        {
          auth: {

            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true

          }
        }
      );

    const studentSupabase =
      supabase.createClient(
        STUDENT_SUPABASE_URL,
        STUDENT_SUPABASE_ANON_KEY
      );

    // ==================================================
    // URL PARAMS
    // ==================================================

    const params =
      new URLSearchParams(
        window.location.search
      );

    const documentId =
      params.get("id");

    // ==================================================
    // ELEMENTS
    // ==================================================

    const editor =
      document.getElementById(
        "editor"
      );

    const documentTitle =
      document.getElementById(
        "documentTitle"
      );

    const saveStatus =
      document.getElementById(
        "saveStatus"
      );

    const teacherFeedback =
      document.getElementById(
        "teacherFeedback"
      );

    let currentTeacher = null;

    let currentDocument = null;

    // ==================================================
    // AUTH
    // ==================================================

    async function initializeAuth() {

      const {
        data: {
          session
        }
      } = await teacherSupabase
        .auth
        .getSession();

      // NO SESSION

      if (!session) {

        window.location.href =
          "/login/teacher";

        return;

      }

      currentTeacher =
        session.user;

      // UI

      document.getElementById(
        "teacherInfo"
      ).textContent =
        `${currentTeacher.user_metadata.full_name} • ${currentTeacher.email}`;

      // LOAD DOCUMENT

      await loadDocument();

    }

    // ==================================================
    // LOAD DOCUMENT
    // ==================================================

    async function loadDocument() {

      const {
        data,
        error
      } = await studentSupabase
        .from("student_documents")
        .select("*")
        .eq(
          "id",
          documentId
        )
        .maybeSingle();

      console.log(
        "Document:",
        data
      );

      console.error(error);

      // ERROR

      if (error || !data) {

        alert(
          "Document not found."
        );

        return;

      }

      currentDocument =
        data;

      // LOAD CONTENT

      documentTitle.value =
        currentDocument.title;

      editor.innerHTML =
        currentDocument.content;

      teacherFeedback.value =
        currentDocument.teacher_feedback
        || "";

      // SIDEBAR

      document.getElementById(
        "studentInfo"
      ).innerHTML = `

        ${currentDocument.student_name}

        <br>

        ${currentDocument.student_email}

        <br>

        ${currentDocument.student_id}

      `;

      document.getElementById(
        "classInfo"
      ).innerHTML = `

        Class ID:
        ${currentDocument.class_id || "None"}

      `;

      document.getElementById(
        "documentInfo"
      ).innerHTML = `

        Created:
        ${new Date(
          currentDocument.created_at
        ).toLocaleString()}

        <br><br>

        Last Updated:
        ${new Date(
          currentDocument.updated_at
        ).toLocaleString()}

      `;

      document.getElementById(
        "documentMeta"
      ).innerHTML = `

        👨‍🎓 ${currentDocument.student_name}

        •

        📧 ${currentDocument.student_email}

      `;

    }

    // ==================================================
    // SAVE
    // ==================================================

    async function saveDocument() {

      if (!currentDocument) {
        return;
      }

      saveStatus.textContent =
        "Saving document...";

      const {
        error
      } = await studentSupabase
        .from("student_documents")
        .update({

          title:
            documentTitle.value,

          content:
            editor.innerHTML,

          teacher_feedback:
            teacherFeedback.value,

          teacher_last_editor:
            currentTeacher.email,

          teacher_last_edited_at:
            new Date().toISOString(),

          updated_at:
            new Date().toISOString()

        })
        .eq(
          "id",
          documentId
        );

      // ERROR

      if (error) {

        console.error(error);

        saveStatus.textContent =
          "Failed to save.";

        return;

      }

      saveStatus.textContent =
        "Document saved successfully.";

    }

    // ==================================================
    // EXPORT
    // ==================================================

    function downloadPawdocx() {

      if (!currentDocument) {
        return;
      }

      const pawdocx = {

        title:
          documentTitle.value,

        student_name:
          currentDocument.student_name,

        student_email:
          currentDocument.student_email,

        student_id:
          currentDocument.student_id,

        content:
          editor.innerHTML,

        teacher_feedback:
          teacherFeedback.value,

        exported_at:
          new Date().toISOString()

      };

      const blob =
        new Blob(
          [
            JSON.stringify(
              pawdocx,
              null,
              2
            )
          ],
          {
            type:
              "application/pawdocx"
          }
        );

      const url =
        URL.createObjectURL(
          blob
        );

      const a =
        document.createElement(
          "a"
        );

      a.href = url;

      a.download =
        `${documentTitle.value}.pawdocx`;

      a.click();

      URL.revokeObjectURL(
        url
      );

    }

    // ==================================================
    // FORMATTING
    // ==================================================

    function format(
      command,
      value = null
    ) {

      document.execCommand(
        command,
        false,
        value
      );

      editor.focus();

    }

    // ==================================================
    // FONT
    // ==================================================

    function changeFont(font) {

      document.execCommand(
        "fontName",
        false,
        font
      );

      editor.focus();

    }

    // ==================================================
    // AUTOSAVE
    // ==================================================

    let autosaveTimeout;

    editor.addEventListener(
      "input",
      () => {

        clearTimeout(
          autosaveTimeout
        );

        saveStatus.textContent =
          "Typing...";

        autosaveTimeout =
          setTimeout(() => {

            saveDocument();

          }, 4000);

      }
    );

    // ==================================================
    // LOGOUT
    // ==================================================

    document.getElementById(
      "logoutBtn"
    ).addEventListener(
      "click",
      async () => {

        await teacherSupabase
          .auth
          .signOut();

        window.location.href =
          "/login/teacher";

      }
    );

    // ==================================================
    // START
    // ==================================================

    window.addEventListener(
      "load",
      () => {

        initializeAuth();

      }
    );

  </script>

</body>
</html>
