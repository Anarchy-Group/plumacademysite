<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Student Documents
  </title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    * {

      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, Arial, sans-serif;

    }

    body {

      background: #f5f7fb;

      min-height: 100vh;

      padding: 30px;

      color: #111827;

    }

    .topbar {

      display: flex;

      justify-content: space-between;

      align-items: center;

      flex-wrap: wrap;

      gap: 20px;

      margin-bottom: 30px;

    }

    .topbar h1 {

      font-size: 34px;

      font-weight: 700;

    }

    .topbar p {

      color: #6b7280;

      margin-top: 6px;

    }

    .topbar-buttons {

      display: flex;

      gap: 12px;

      flex-wrap: wrap;

    }

    .btn {

      padding: 13px 18px;

      border-radius: 12px;

      border: 1px solid #dbe1ea;

      background: white;

      color: #111827;

      text-decoration: none;

      cursor: pointer;

      font-weight: 600;

      transition: 0.15s;

    }

    .btn:hover {

      background: #f3f4f6;

    }

    .primary-btn {

      background: #6366f1;

      color: white;

      border: none;

    }

    .primary-btn:hover {

      background: #4f46e5;

    }

    .danger-btn {

      background: #ef4444;

      color: white;

      border: none;

    }

    .danger-btn:hover {

      background: #dc2626;

    }

    .student-banner {

      background: white;

      border-radius: 20px;

      border: 1px solid #e5e7eb;

      padding: 28px;

      margin-bottom: 30px;

    }

    .student-banner h1 {

      font-size: 34px;

      margin-bottom: 10px;

    }

    .student-banner p {

      color: #6b7280;

      line-height: 1.8;

    }

    .card {

      background: white;

      border-radius: 18px;

      border: 1px solid #e5e7eb;

      padding: 24px;

    }

    .section-title {

      font-size: 26px;

      font-weight: 700;

      margin-bottom: 20px;

    }

    .filters {

      display: flex;

      gap: 15px;

      flex-wrap: wrap;

      margin-bottom: 25px;

    }

    .filters input {

      padding: 12px 14px;

      border-radius: 12px;

      border: 1px solid #d1d5db;

      font-size: 14px;

      background: white;

      width: 300px;

    }

    .document-grid {

      display: grid;

      grid-template-columns:
        repeat(
          auto-fit,
          minmax(350px, 1fr)
        );

      gap: 20px;

    }

    .document-card {

      background: white;

      border: 1px solid #e5e7eb;

      border-radius: 18px;

      padding: 24px;

      transition: 0.15s;

    }

    .document-card:hover {

      transform: translateY(-2px);

    }

    .document-title {

      font-size: 26px;

      font-weight: 700;

      margin-bottom: 15px;

    }

    .document-meta {

      color: #6b7280;

      line-height: 1.8;

      font-size: 14px;

      margin-bottom: 22px;

    }

    .document-actions {

      display: flex;

      gap: 12px;

      flex-wrap: wrap;

    }

    .loading,
    .empty-state {

      text-align: center;

      padding: 60px 20px;

      color: #6b7280;

    }

    .empty-state h2 {

      color: #111827;

      margin-bottom: 10px;

    }

  </style>

</head>
<body>

  <!-- TOPBAR -->

  <div class="topbar">

    <div>

      <h1>
        📄 Student Documents
      </h1>

      <p id="teacherInfo">
        Loading...
      </p>

    </div>

    <div class="topbar-buttons">

      <a
        href="/dashboard/teacher/classes"
        class="btn"
      >
        Classes
      </a>

      <a
        href="/dashboard/teacher/class/students"
        class="btn"
        id="backStudentsBtn"
      >
        Students
      </a>

      <button
        id="logoutBtn"
        class="btn danger-btn"
      >
        Logout
      </button>

    </div>

  </div>

  <!-- STUDENT BANNER -->

  <div class="student-banner">

    <h1 id="studentName">
      Loading Student...
    </h1>

    <p id="studentMeta">
      Loading student information...
    </p>

  </div>

  <!-- DOCUMENTS -->

  <div class="card">

    <div class="section-title">
      Documents
    </div>

    <!-- SEARCH -->

    <div class="filters">

      <input
        type="text"
        id="searchInput"
        placeholder="Search documents..."
      />

    </div>

    <!-- GRID -->

    <div id="documentsContainer">

      <div class="loading">
        Loading documents...
      </div>

    </div>

  </div>

  <script>

    // ==================================================
    // TEACHER SUPABASE
    // ==================================================

    const TEACHER_SUPABASE_URL =
      "https://uzbhtvaorqqmzhivmlpx.supabase.co";

    const TEACHER_SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6Ymh0dmFvcnFxbXpoaXZtbHB4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzOTYzMDEsImV4cCI6MjA5Mzk3MjMwMX0._BWxANGJgvvJZKxvuC_LWMpP4mgTh3Chr3WqIQuLRn0";

    // ==================================================
    // STUDENT SUPABASE
    // ==================================================

    const STUDENT_SUPABASE_URL =
      "https://ebzcflngssljyqieizws.supabase.co";

    const STUDENT_SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViemNmbG5nc3NsanlxaWVpendzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MDQ3NDEsImV4cCI6MjA5Mzk4MDc0MX0.ZnPi4jKEtkr0iUN_ymVrhUI7A_OMkhWjRn3shA2D9yk";

    // ==================================================
    // CLIENTS
    // ==================================================

    const teacherSupabase =
      supabase.createClient(
        TEACHER_SUPABASE_URL,
        TEACHER_SUPABASE_ANON_KEY,
        {
          auth: {

            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true

          }
        }
      );

    const studentSupabase =
      supabase.createClient(
        STUDENT_SUPABASE_URL,
        STUDENT_SUPABASE_ANON_KEY
      );

    // ==================================================
    // URL PARAMS
    // ==================================================

    const params =
      new URLSearchParams(
        window.location.search
      );

    const studentId =
      params.get("id");

    const classId =
      params.get("class");

    console.log(
      "Student ID:",
      studentId
    );

    // ==================================================
    // ELEMENTS
    // ==================================================

    const teacherInfo =
      document.getElementById(
        "teacherInfo"
      );

    const studentName =
      document.getElementById(
        "studentName"
      );

    const studentMeta =
      document.getElementById(
        "studentMeta"
      );

    const documentsContainer =
      document.getElementById(
        "documentsContainer"
      );

    const searchInput =
      document.getElementById(
        "searchInput"
      );

    const backStudentsBtn =
      document.getElementById(
        "backStudentsBtn"
      );

    let currentTeacher = null;

    let currentStudent = null;

    let allDocuments = [];

    // ==================================================
    // AUTH
    // ==================================================

    async function initializeAuth() {

      const {
        data: {
          session
        }
      } = await teacherSupabase
        .auth
        .getSession();

      // NO SESSION

      if (!session) {

        window.location.href =
          "/login/teacher";

        return;

      }

      currentTeacher =
        session.user;

      teacherInfo.textContent =
        `${currentTeacher.user_metadata.full_name} • ${currentTeacher.email}`;

      // BACK BUTTON

      if (classId) {

        backStudentsBtn.href =
          `/dashboard/teacher/class/students?id=${classId}`;

      }

      // LOAD

      await loadStudent();

      await loadDocuments();

    }

    // ==================================================
    // LOAD STUDENT
    // ==================================================

    async function loadStudent() {

      const {
        data,
        error
      } = await studentSupabase
        .from("students")
        .select("*")
        .eq(
          "id",
          String(studentId)
        )
        .maybeSingle();

      // ERROR

      if (error || !data) {

        console.error(error);

        studentName.textContent =
          "Student Not Found";

        studentMeta.textContent =
          "Could not load student information.";

        return;

      }

      currentStudent =
        data;

      // UI

      studentName.textContent =
        currentStudent.full_name;

      studentMeta.innerHTML = `

        📧 ${currentStudent.email}

        <br>

        🎓 ${currentStudent.keystage || "Unknown"}

        <br>

        🆔 ${currentStudent.id}

      `;

    }

    // ==================================================
    // LOAD DOCUMENTS
    // ==================================================

    async function loadDocuments() {

      const {
        data,
        error
      } = await studentSupabase
        .from("student_documents")
        .select("*")
        .eq(
          "student_id",
          String(studentId)
        )
        .order(
          "updated_at",
          {
            ascending: false
          }
        );

      // ERROR

      if (error) {

        console.error(error);

        documentsContainer.innerHTML = `
          <div class="empty-state">

            <h2>
              Failed To Load Documents
            </h2>

            <p>
              ${error.message}
            </p>

          </div>
        `;

        return;

      }

      allDocuments =
        data || [];

      renderDocuments();

    }

    // ==================================================
    // RENDER DOCUMENTS
    // ==================================================

    function renderDocuments() {

      const search =
        searchInput.value
        .toLowerCase();

      const filtered =
        allDocuments.filter(doc => {

          return (
            doc.title
            .toLowerCase()
            .includes(search)
          );

        });

      // EMPTY

      if (filtered.length === 0) {

        documentsContainer.innerHTML = `
          <div class="empty-state">

            <h2>
              No Documents Found
            </h2>

            <p>
              This student has not
              created any documents yet.
            </p>

          </div>
        `;

        return;

      }

      // GRID

      let html =
        `<div class="document-grid">`;

      filtered.forEach(doc => {

        html += `

          <div class="document-card">

            <div class="document-title">

              ${doc.title}

            </div>

            <div class="document-meta">

              📅 Last Updated:
              ${new Date(
                doc.updated_at
              ).toLocaleString()}

              <br>

              👨‍🎓 ${doc.student_name}

              <br>

              🆔 ${doc.student_id}

            </div>

            <div class="document-actions">

              <!-- OPEN -->

              <button
                class="btn primary-btn"
                onclick="
                  window.location.href=
                  '/dashboard/student/apps/plum-academy-writer/document?id=${doc.id}'
                "
              >
                Open
              </button>

              <!-- DOWNLOAD -->

              <button
                class="btn"
                onclick="
                  downloadDocument(
                    '${doc.id}'
                  )
                "
              >
                Download
              </button>

              <!-- DELETE -->

              <button
                class="btn danger-btn"
                onclick="
                  deleteDocument(
                    '${doc.id}'
                  )
                "
              >
                Delete
              </button>

            </div>

          </div>

        `;

      });

      html += `</div>`;

      documentsContainer.innerHTML =
        html;

    }

    // ==================================================
    // DOWNLOAD
    // ==================================================

    function downloadDocument(
      id
    ) {

      const doc =
        allDocuments.find(
          d => d.id === id
        );

      if (!doc) {
        return;
      }

      const pawdocx = {

        title:
          doc.title,

        student_name:
          doc.student_name,

        student_email:
          doc.student_email,

        student_id:
          doc.student_id,

        content:
          doc.content,

        updated_at:
          doc.updated_at

      };

      const blob =
        new Blob(
          [
            JSON.stringify(
              pawdocx,
              null,
              2
            )
          ],
          {
            type:
              "application/pawdocx"
          }
        );

      const url =
        URL.createObjectURL(
          blob
        );

      const a =
        document.createElement(
          "a"
        );

      a.href = url;

      a.download =
        `${doc.title}.pawdocx`;

      a.click();

      URL.revokeObjectURL(
        url
      );

    }

    // ==================================================
    // DELETE
    // ==================================================

    async function deleteDocument(
      id
    ) {

      const confirmed =
        confirm(
          "Delete this document?"
        );

      if (!confirmed) {
        return;
      }

      const {
        error
      } = await studentSupabase
        .from("student_documents")
        .delete()
        .eq(
          "id",
          id
        );

      // ERROR

      if (error) {

        console.error(error);

        alert(
          error.message
        );

        return;

      }

      // RELOAD

      await loadDocuments();

    }

    // ==================================================
    // SEARCH
    // ==================================================

    searchInput.addEventListener(
      "input",
      renderDocuments
    );

    // ==================================================
    // LOGOUT
    // ==================================================

    document.getElementById(
      "logoutBtn"
    ).addEventListener(
      "click",
      async () => {

        await teacherSupabase
          .auth
          .signOut();

        window.location.href =
          "/login/teacher";

      }
    );

    // ==================================================
    // START
    // ==================================================

    window.addEventListener(
      "load",
      () => {

        setTimeout(() => {

          initializeAuth();

        }, 500);

      }
    );

  </script>

</body>
</html>
