<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Class Students
  </title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    * {

      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, Arial, sans-serif;

    }

    body {

      background: #f5f7fb;

      min-height: 100vh;

      padding: 30px;

      color: #111827;

    }

    .topbar {

      display: flex;

      justify-content: space-between;

      align-items: center;

      flex-wrap: wrap;

      gap: 20px;

      margin-bottom: 30px;

    }

    .topbar h1 {

      font-size: 34px;

      font-weight: 700;

    }

    .topbar p {

      color: #6b7280;

      margin-top: 6px;

    }

    .topbar-buttons {

      display: flex;

      gap: 12px;

      flex-wrap: wrap;

    }

    .btn {

      padding: 13px 18px;

      border-radius: 12px;

      border: 1px solid #dbe1ea;

      background: white;

      color: #111827;

      text-decoration: none;

      cursor: pointer;

      font-weight: 600;

      transition: 0.15s;

    }

    .btn:hover {

      background: #f3f4f6;

    }

    .primary-btn {

      background: #6366f1;

      color: white;

      border: none;

    }

    .primary-btn:hover {

      background: #4f46e5;

    }

    .danger-btn {

      background: #ef4444;

      color: white;

      border: none;

    }

    .danger-btn:hover {

      background: #dc2626;

    }

    .class-banner {

      border-radius: 18px;

      padding: 30px;

      color: white;

      margin-bottom: 30px;

    }

    .class-banner h1 {

      font-size: 36px;

      margin-bottom: 10px;

    }

    .class-banner p {

      opacity: 0.92;

      line-height: 1.8;

    }

    .card {

      background: white;

      border-radius: 18px;

      border: 1px solid #e5e7eb;

      padding: 24px;

    }

    .section-title {

      font-size: 26px;

      font-weight: 700;

      margin-bottom: 20px;

    }

    .filters {

      display: flex;

      gap: 15px;

      flex-wrap: wrap;

      margin-bottom: 25px;

    }

    .filters input,
    .filters select {

      padding: 12px 14px;

      border-radius: 12px;

      border: 1px solid #d1d5db;

      font-size: 14px;

      background: white;

    }

    .student-grid {

      display: grid;

      grid-template-columns:
        repeat(
          auto-fit,
          minmax(320px, 1fr)
        );

      gap: 20px;

    }

    .student-card {

      background: white;

      border: 1px solid #e5e7eb;

      border-radius: 18px;

      padding: 22px;

      transition: 0.15s;

    }

    .student-card:hover {

      transform: translateY(-2px);

    }

    .student-name {

      font-size: 24px;

      font-weight: 700;

      margin-bottom: 12px;

    }

    .student-meta {

      color: #6b7280;

      line-height: 1.8;

      font-size: 14px;

      margin-bottom: 20px;

    }

    .student-actions {

      display: flex;

      gap: 10px;

      flex-wrap: wrap;

    }

    .loading,
    .empty-state {

      text-align: center;

      padding: 60px 20px;

      color: #6b7280;

    }

    .empty-state h2 {

      color: #111827;

      margin-bottom: 10px;

    }

    .modal-overlay {

      position: fixed;

      inset: 0;

      background: rgba(0,0,0,0.4);

      display: none;

      justify-content: center;

      align-items: center;

      z-index: 999;

      padding: 20px;

    }

    .modal {

      background: white;

      width: 100%;

      max-width: 550px;

      border-radius: 22px;

      padding: 30px;

    }

    .modal h2 {

      font-size: 28px;

      margin-bottom: 20px;

    }

    .form-group {

      margin-bottom: 18px;

    }

    .form-group label {

      display: block;

      margin-bottom: 8px;

      font-weight: 600;

    }

    .form-group select {

      width: 100%;

      padding: 14px;

      border-radius: 12px;

      border: 1px solid #d1d5db;

      font-size: 14px;

    }

    .modal-buttons {

      display: flex;

      gap: 12px;

      flex-wrap: wrap;

      margin-top: 20px;

    }

  </style>

</head>
<body>

  <!-- TOPBAR -->

  <div class="topbar">

    <div>

      <h1>
        👨‍🎓 Class Students
      </h1>

      <p id="teacherInfo">
        Loading...
      </p>

    </div>

    <div class="topbar-buttons">

      <button
        class="btn primary-btn"
        onclick="openModal()"
      >
        + Add Student
      </button>

      <a
        href="/dashboard/teacher/classes"
        class="btn"
      >
        Back To Classes
      </a>

      <button
        id="logoutBtn"
        class="btn danger-btn"
      >
        Logout
      </button>

    </div>

  </div>

  <!-- CLASS BANNER -->

  <div
    class="class-banner"
    id="classBanner"
    style="background:#6366f1;"
  >

    <h1 id="className">
      Loading Class...
    </h1>

    <p id="classDescription">
      Loading description...
    </p>

  </div>

  <!-- STUDENTS -->

  <div class="card">

    <div class="section-title">
      Students
    </div>

    <!-- FILTERS -->

    <div class="filters">

      <input
        type="text"
        id="searchInput"
        placeholder="Search students..."
      />

      <select id="keystageFilter">

        <option value="">
          All Keystages
        </option>

      </select>

    </div>

    <!-- STUDENTS -->

    <div id="studentsContainer">

      <div class="loading">
        Loading students...
      </div>

    </div>

  </div>

  <!-- MODAL -->

  <div
    class="modal-overlay"
    id="modalOverlay"
  >

    <div class="modal">

      <h2>
        Add Student To Class
      </h2>

      <div class="form-group">

        <label>
          Student
        </label>

        <select id="studentSelect">

          <option>
            Loading students...
          </option>

        </select>

      </div>

      <div class="modal-buttons">

        <button
          class="btn primary-btn"
          onclick="addStudentToClass()"
        >
          Add Student
        </button>

        <button
          class="btn"
          onclick="closeModal()"
        >
          Cancel
        </button>

      </div>

    </div>

  </div>

  <script>

    // ==================================================
    // SUPABASE
    // ==================================================

    const TEACHER_SUPABASE_URL =
      "https://uzbhtvaorqqmzhivmlpx.supabase.co";

    const TEACHER_SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6Ymh0dmFvcnFxbXpoaXZtbHB4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzOTYzMDEsImV4cCI6MjA5Mzk3MjMwMX0._BWxANGJgvvJZKxvuC_LWMpP4mgTh3Chr3WqIQuLRn0";

    const STUDENT_SUPABASE_URL =
      "https://ebzcflngssljyqieizws.supabase.co";

    const STUDENT_SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViemNmbG5nc3NsanlxaWVpendzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MDQ3NDEsImV4cCI6MjA5Mzk4MDc0MX0.ZnPi4jKEtkr0iUN_ymVrhUI7A_OMkhWjRn3shA2D9yk";

    // ==================================================
    // CLIENTS
    // ==================================================

    const teacherSupabase =
      supabase.createClient(
        TEACHER_SUPABASE_URL,
        TEACHER_SUPABASE_ANON_KEY,
        {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true
          }
        }
      );

    const studentSupabase =
      supabase.createClient(
        STUDENT_SUPABASE_URL,
        STUDENT_SUPABASE_ANON_KEY
      );

    // ==================================================
    // URL PARAMS
    // ==================================================

    const params =
      new URLSearchParams(
        window.location.search
      );

    const classId =
      params.get("id");

    console.log(
      "CLASS ID:",
      classId
    );

    // ==================================================
    // ELEMENTS
    // ==================================================

    const studentsContainer =
      document.getElementById(
        "studentsContainer"
      );

    const teacherInfo =
      document.getElementById(
        "teacherInfo"
      );

    const classBanner =
      document.getElementById(
        "classBanner"
      );

    const className =
      document.getElementById(
        "className"
      );

    const classDescription =
      document.getElementById(
        "classDescription"
      );

    const searchInput =
      document.getElementById(
        "searchInput"
      );

    const keystageFilter =
      document.getElementById(
        "keystageFilter"
      );

    let currentTeacher = null;

    let currentClass = null;

    let allStudents = [];

    let classStudents = [];

    // ==================================================
    // AUTH
    // ==================================================

    async function initializeAuth() {

      const {
        data: {
          session
        }
      } = await teacherSupabase
        .auth
        .getSession();

      // NO SESSION

      if (!session) {

        window.location.href =
          "/login/teacher";

        return;

      }

      currentTeacher =
        session.user;

      teacherInfo.textContent =
        `${currentTeacher.user_metadata.full_name} • ${currentTeacher.email}`;

      // LOAD EVERYTHING

      await loadClass();

      await loadStudents();

      await loadClassStudents();

    }

    // ==================================================
    // LOAD CLASS
    // ==================================================

    async function loadClass() {

      console.log(
        "Loading class:",
        classId
      );

      const {
        data,
        error
      } = await teacherSupabase
        .from("classes")
        .select("*")
        .eq(
          "id",
          String(classId)
        )
        .maybeSingle();

      console.log(
        "Class response:",
        data
      );

      console.error(error);

      // ERROR

      if (error || !data) {

        className.textContent =
          "Class Not Found";

        classDescription.textContent =
          "Could not load class information.";

        return;

      }

      currentClass =
        data;

      // UPDATE UI

      className.textContent =
        currentClass.class_name;

      classDescription.textContent =
        currentClass.description
        || "No class description.";

      classBanner.style.background =
        currentClass.theme_color
        || "#6366f1";

    }

    // ==================================================
    // LOAD STUDENTS
    // ==================================================

    async function loadStudents() {

      const {
        data,
        error
      } = await studentSupabase
        .from("students")
        .select("*")
        .eq(
          "school_name",
          currentTeacher.user_metadata
          .school_name
        )
        .order(
          "full_name",
          {
            ascending: true
          }
        );

      // ERROR

      if (error) {

        console.error(error);

        return;

      }

      allStudents =
        data || [];

      // BUILD SELECT

      const studentSelect =
        document.getElementById(
          "studentSelect"
        );

      studentSelect.innerHTML = "";

      allStudents.forEach(student => {

        studentSelect.innerHTML += `

          <option value="${student.id}">

            ${student.full_name}
            (${student.email})

          </option>

        `;

      });

    }

    // ==================================================
    // LOAD CLASS STUDENTS
    // ==================================================

    async function loadClassStudents() {

      const {
        data,
        error
      } = await teacherSupabase
        .from("class_students")
        .select("*")
        .eq(
          "class_id",
          String(classId)
        );

      // ERROR

      if (error) {

        console.error(error);

        return;

      }

      classStudents =
        data || [];

      renderStudents();

      updateKeystageFilter();

    }

    // ==================================================
    // RENDER STUDENTS
    // ==================================================

    function renderStudents() {

      const search =
        searchInput.value
        .toLowerCase();

      const keystage =
        keystageFilter.value;

      const matchedStudents =
        allStudents.filter(student => {

          const exists =
            classStudents.some(
              cls =>
                cls.student_id
                === student.id
            );

          if (!exists) {
            return false;
          }

          const matchesSearch =

            student.full_name
            .toLowerCase()
            .includes(search)

            ||

            student.email
            .toLowerCase()
            .includes(search);

          const matchesKeystage =

            !keystage
            ||

            student.keystage === keystage;

          return (
            matchesSearch &&
            matchesKeystage
          );

        });

      // EMPTY

      if (matchedStudents.length === 0) {

        studentsContainer.innerHTML = `
          <div class="empty-state">

            <h2>
              No Students In Class
            </h2>

            <p>
              Add students to this class.
            </p>

          </div>
        `;

        return;

      }

      // GRID

      let html =
        `<div class="student-grid">`;

      matchedStudents.forEach(student => {

        html += `

          <div class="student-card">

            <div class="student-name">

              ${student.full_name}

            </div>

            <div class="student-meta">

              📧
              ${student.email}

              <br>

              🎓
              ${student.keystage || "Unknown"}

              <br>

              🆔
              ${student.id}

            </div>

            <div class="student-actions">

              <button
                class="btn primary-btn"
                onclick="
                  window.location.href=
                  '/dashboard/teacher/student-documents?id=${student.id}'
                "
              >
                Documents
              </button>

              <button
                class="btn"
                onclick="
                  removeStudent(
                    '${student.id}'
                  )
                "
              >
                Remove
              </button>

            </div>

          </div>

        `;

      });

      html += `</div>`;

      studentsContainer.innerHTML =
        html;

    }

    // ==================================================
    // ADD STUDENT
    // ==================================================

    async function addStudentToClass() {

      const studentId =
        document.getElementById(
          "studentSelect"
        ).value;

      // INSERT

      const {
        error
      } = await teacherSupabase
        .from("class_students")
        .insert([{

          class_id:
            String(classId),

          student_id:
            studentId

        }]);

      // ERROR

      if (error) {

        console.error(error);

        alert(
          error.message
        );

        return;

      }

      closeModal();

      await loadClassStudents();

    }

    // ==================================================
    // REMOVE STUDENT
    // ==================================================

    async function removeStudent(
      studentId
    ) {

      const confirmed =
        confirm(
          "Remove student from class?"
        );

      if (!confirmed) {
        return;
      }

      const {
        error
      } = await teacherSupabase
        .from("class_students")
        .delete()
        .eq(
          "class_id",
          String(classId)
        )
        .eq(
          "student_id",
          studentId
        );

      // ERROR

      if (error) {

        console.error(error);

        return;

      }

      await loadClassStudents();

    }

    // ==================================================
    // FILTER
    // ==================================================

    function updateKeystageFilter() {

      const stages =
        [
          ...new Set(
            allStudents.map(
              s => s.keystage
            )
          )
        ];

      keystageFilter.innerHTML = `
        <option value="">
          All Keystages
        </option>
      `;

      stages.forEach(stage => {

        keystageFilter.innerHTML += `
          <option value="${stage}">
            ${stage}
          </option>
        `;

      });

    }

    // ==================================================
    // MODAL
    // ==================================================

    function openModal() {

      document.getElementById(
        "modalOverlay"
      ).style.display =
        "flex";

    }

    function closeModal() {

      document.getElementById(
        "modalOverlay"
      ).style.display =
        "none";

    }

    // ==================================================
    // FILTER EVENTS
    // ==================================================

    searchInput.addEventListener(
      "input",
      renderStudents
    );

    keystageFilter.addEventListener(
      "change",
      renderStudents
    );

    // ==================================================
    // LOGOUT
    // ==================================================

    document.getElementById(
      "logoutBtn"
    ).addEventListener(
      "click",
      async () => {

        await teacherSupabase
          .auth
          .signOut();

        window.location.href =
          "/login/teacher";

      }
    );

    // ==================================================
    // START
    // ==================================================

    window.addEventListener(
      "load",
      () => {

        setTimeout(() => {

          initializeAuth();

        }, 500);

      }
    );

  </script>

</body>
</html>
