<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Student Management</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f7fb;
      min-height: 100vh;
      color: #222;
      padding: 30px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 20px;
    }

    .teacher-info h1 {
      font-size: 34px;
      margin-bottom: 8px;
    }

    .teacher-info p {
      color: #666;
    }

    .button-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 14px 18px;
      border-radius: 12px;
      border: none;
      background: #4f46e5;
      color: white;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn:hover {
      background: #4338ca;
    }

    .logout-btn {
      background: #dc2626;
    }

    .logout-btn:hover {
      background: #b91c1c;
    }

    .create-btn {
      background: #059669;
    }

    .create-btn:hover {
      background: #047857;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.06);
      margin-bottom: 25px;
    }

    .card h2 {
      margin-bottom: 12px;
    }

    .card p {
      color: #666;
      line-height: 1.6;
    }

    .nav-links {
      display: flex;
      gap: 12px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    .nav-link {
      background: white;
      padding: 12px 16px;
      border-radius: 12px;
      text-decoration: none;
      color: #222;
      font-weight: bold;
      box-shadow: 0 5px 20px rgba(0,0,0,0.06);
      transition: 0.2s;
    }

    .nav-link:hover {
      background: #f2f2f2;
    }

    .nav-link.active {
      background: #4f46e5;
      color: white;
    }

    .student-actions {
      display: flex;
      gap: 15px;
      margin-top: 25px;
      flex-wrap: wrap;
    }

    /* MODAL */

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      width: 100%;
      max-width: 500px;
      background: white;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .modal-content h2 {
      margin-bottom: 20px;
    }

    .modal-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    input,
    select {
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 10px;
    }

    .cancel-btn {
      background: #e5e7eb;
      color: #222;
    }

    .cancel-btn:hover {
      background: #d1d5db;
    }

    .message {
      margin-top: 15px;
      font-size: 14px;
      text-align: center;
    }

  </style>
</head>
<body>

  <!-- TOPBAR -->

  <div class="topbar">

    <div class="teacher-info">

      <h1>
        👨‍🎓 Student Management
      </h1>

      <p id="teacherDetails">
        Checking login session...
      </p>

    </div>

    <div class="button-group">

      <a
        href="/dashboard/teacher/index.html"
        class="btn"
      >
        Back To Dashboard
      </a>

      <button
        id="logoutBtn"
        class="btn logout-btn"
      >
        Logout
      </button>

    </div>

  </div>

  <!-- NAVIGATION -->

  <div class="nav-links">

    <a
      href="/dashboard/teacher/index.html"
      class="nav-link"
    >
      Dashboard
    </a>

    <a
      href="/dashboard/teacher/student-management.html"
      class="nav-link active"
    >
      Students
    </a>

  </div>

  <!-- MAIN CONTENT -->

  <div class="card">

    <h2>
      Student Accounts
    </h2>

    <p>
      Create and manage student accounts
      for your school.
    </p>

    <div class="student-actions">

      <button
        id="createStudentBtn"
        class="btn create-btn"
      >
        ➕ Create Student
      </button>

    </div>

  </div>

  <!-- STATUS -->

  <div class="card">

    <h2>
      Current Status
    </h2>

    <p id="statusText">
      Waiting for authentication check...
    </p>

  </div>

  <!-- MODAL -->

  <div
    class="modal"
    id="studentModal"
  >

    <div class="modal-content">

      <h2>
        Create Student
      </h2>

      <form
        id="studentForm"
        class="modal-form"
      >

        <!-- SCHOOL EMAIL -->

        <input
          type="email"
          id="studentEmail"
          placeholder="School Email"
          required
        />

        <!-- FULL NAME -->

        <input
          type="text"
          id="studentName"
          placeholder="Full Name"
          required
        />

        <!-- KEYSTAGE -->

        <select
          id="studentKeystage"
          required
        >

          <option value="">
            Select Keystage
          </option>

          <option value="KS1">
            KS1
          </option>

          <option value="KS2">
            KS2
          </option>

          <option value="KS3">
            KS3
          </option>

          <option value="KS4">
            KS4
          </option>

          <option value="KS5">
            KS5
          </option>

        </select>

        <!-- BUTTONS -->

        <div class="modal-buttons">

          <button
            type="submit"
            class="btn create-btn"
          >
            Create Student
          </button>

          <button
            type="button"
            id="closeModalBtn"
            class="btn cancel-btn"
          >
            Cancel
          </button>

        </div>

      </form>

      <div
        id="studentMessage"
        class="message"
      ></div>

    </div>

  </div>

  <script>

    // ==================================================
    // 🔑 TEACHER SUPABASE
    // ==================================================

    const SUPABASE_URL =
      "https://uzbhtvaorqqmzhivmlpx.supabase.co";

    const SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6Ymh0dmFvcnFxbXpoaXZtbHB4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzOTYzMDEsImV4cCI6MjA5Mzk3MjMwMX0._BWxANGJgvvJZKxvuC_LWMpP4mgTh3Chr3WqIQuLRn0";

    // ==================================================
    // 🔑 STUDENT SUPABASE
    // ==================================================

    const STUDENT_SUPABASE_URL =
      "https://ebzcflngssljyqieizws.supabase.co";

    const STUDENT_SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViemNmbG5nc3NsanlxaWVpendzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MDQ3NDEsImV4cCI6MjA5Mzk4MDc0MX0.ZnPi4jKEtkr0iUN_ymVrhUI7A_OMkhWjRn3shA2D9yk";

    // ==================================================
    // CREATE CLIENTS
    // ==================================================

    // TEACHER AUTH SYSTEM

    const supabaseClient =
      supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
        {
          auth: {

            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true

          }
        }
      );

    // STUDENT DATABASE SYSTEM

    const studentSupabase =
      supabase.createClient(
        STUDENT_SUPABASE_URL,
        STUDENT_SUPABASE_ANON_KEY
      );

    // ==================================================
    // ELEMENTS
    // ==================================================

    const teacherDetails =
      document.getElementById(
        "teacherDetails"
      );

    const statusText =
      document.getElementById(
        "statusText"
      );

    const createStudentBtn =
      document.getElementById(
        "createStudentBtn"
      );

    const studentModal =
      document.getElementById(
        "studentModal"
      );

    const closeModalBtn =
      document.getElementById(
        "closeModalBtn"
      );

    const studentForm =
      document.getElementById(
        "studentForm"
      );

    const studentMessage =
      document.getElementById(
        "studentMessage"
      );

    // ==================================================
    // CHECK LOGIN
    // ==================================================

    async function checkLogin() {

      statusText.textContent =
        "Checking teacher authentication...";

      await new Promise(resolve =>
        setTimeout(resolve, 1000)
      );

      const {
        data,
        error
      } = await supabaseClient
        .auth
        .getUser();

      const user =
        data?.user;

      // NOT LOGGED IN

      if (!user || error) {

        window.location.href =
          "/login/teacher";

        return;

      }

      // LOGGED IN

      const fullName =
        user.user_metadata.full_name
        || "Teacher";

      const schoolName =
        user.user_metadata.school_name
        || "Unknown School";

      teacherDetails.textContent =
        `${fullName} • ${schoolName}`;

      statusText.textContent =
        `Authenticated as ${user.email}`;

    }

    // ==================================================
    // AUTH LISTENER
    // ==================================================

    supabaseClient.auth
      .onAuthStateChange(
        (event) => {

          if (
            event === "SIGNED_OUT"
          ) {

            window.location.href =
              "/login/teacher";

          }

        }
      );

    // ==================================================
    // LOGOUT
    // ==================================================

    document.getElementById(
      "logoutBtn"
    ).addEventListener(
      "click",
      async () => {

        await supabaseClient
          .auth
          .signOut();

      }
    );

    // ==================================================
    // OPEN MODAL
    // ==================================================

    createStudentBtn.addEventListener(
      "click",
      () => {

        studentModal.classList.add(
          "active"
        );

      }
    );

    // ==================================================
    // CLOSE MODAL
    // ==================================================

    closeModalBtn.addEventListener(
      "click",
      () => {

        studentModal.classList.remove(
          "active"
        );

        studentForm.reset();

        studentMessage.textContent = "";

      }
    );

    // ==================================================
    // CREATE STUDENT
    // ==================================================

    studentForm.addEventListener(
      "submit",
      async (e) => {

        e.preventDefault();

        const email =
          document.getElementById(
            "studentEmail"
          ).value;

        const fullName =
          document.getElementById(
            "studentName"
          ).value;

        const keystage =
          document.getElementById(
            "studentKeystage"
          ).value;

        studentMessage.textContent =
          "Creating student...";

        studentMessage.style.color =
          "#333";

        // RANDOM TEMP PASSWORD

        const tempPassword =
          Math.random()
          .toString(36)
          .slice(-10);

        // ==================================================
        // CREATE STUDENT ACCOUNT
        // IN STUDENT SUPABASE
        // ==================================================

        const {
          data,
          error
        } = await studentSupabase
          .auth
          .signUp({

            email,

            password:
              tempPassword,

            options: {

              data: {

                full_name:
                  fullName,

                keystage:
                  keystage,

                role:
                  "student"

              }

            }

          });

        // ERROR

        if (error) {

          studentMessage.textContent =
            error.message;

          studentMessage.style.color =
            "red";

          return;

        }

        // ==================================================
        // SAVE EXTRA STUDENT DATA
        // ==================================================

        const {
          error: insertError
        } = await studentSupabase
          .from("students")
          .insert([{

            email:
              email,

            full_name:
              fullName,

            keystage:
              keystage,

            created_at:
              new Date()

          }]);

        // INSERT ERROR

        if (insertError) {

          console.error(
            insertError
          );

        }

        // SUCCESS

        studentMessage.textContent =
          "Student account created successfully!";

        studentMessage.style.color =
          "green";

        console.log(
          "Student created:",
          data
        );

        // RESET

        setTimeout(() => {

          studentForm.reset();

          studentModal.classList.remove(
            "active"
          );

          studentMessage.textContent = "";

        }, 1500);

      }
    );

    // ==================================================
    // START
    // ==================================================

    window.addEventListener(
      "load",
      () => {

        checkLogin();

      }
    );

  </script>

</body>
</html>
