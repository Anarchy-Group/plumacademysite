<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Plum Academy Sheets
  </title>

  <!-- SUPABASE -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- CHART.JS -->

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    * {

      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, Arial, sans-serif;

    }

    body {

      background: #f3f6fb;

      min-height: 100vh;

      display: flex;

      flex-direction: column;

      color: #111827;

    }

    /* TOPBAR */

    .topbar {

      background: white;

      border-bottom: 1px solid #e5e7eb;

      padding: 20px 30px;

      display: flex;

      justify-content: space-between;

      align-items: center;

      flex-wrap: wrap;

      gap: 20px;

    }

    .topbar h1 {

      font-size: 34px;

      color: #15803d;

      margin-bottom: 5px;

    }

    .topbar p {

      color: #6b7280;

    }

    .topbar-buttons {

      display: flex;

      gap: 12px;

      flex-wrap: wrap;

    }

    /* BUTTONS */

    .btn {

      padding: 12px 18px;

      border-radius: 12px;

      border: none;

      cursor: pointer;

      font-weight: 600;

      transition: 0.15s;

      text-decoration: none;

    }

    .primary-btn {

      background: #22c55e;

      color: white;

    }

    .primary-btn:hover {

      background: #16a34a;

    }

    .secondary-btn {

      background: white;

      border: 1px solid #d1d5db;

      color: #111827;

    }

    .secondary-btn:hover {

      background: #f3f4f6;

    }

    /* TOOLBAR */

    .toolbar {

      background: white;

      padding: 18px 25px;

      border-bottom: 1px solid #e5e7eb;

      display: flex;

      gap: 12px;

      flex-wrap: wrap;

      align-items: center;

    }

    .toolbar button,
    .toolbar input {

      padding: 10px 14px;

      border-radius: 12px;

      border: 1px solid #d1d5db;

      background: white;

    }

    .toolbar button {

      cursor: pointer;

      font-weight: 600;

    }

    .toolbar button:hover {

      background: #f3f4f6;

    }

    /* SHEET AREA */

    .sheet-wrapper {

      flex: 1;

      overflow: auto;

      padding: 25px;

    }

    .sheet {

      background: white;

      border-radius: 24px;

      border: 1px solid #e5e7eb;

      overflow: auto;

      box-shadow:
        0 6px 24px rgba(0,0,0,0.05);

    }

    table {

      border-collapse: collapse;

      width: max-content;

    }

    th {

      background: #f9fafb;

      border: 1px solid #e5e7eb;

      min-width: 120px;

      height: 42px;

      text-align: center;

      color: #6b7280;

      font-weight: 600;

      position: sticky;

      top: 0;

      z-index: 2;

    }

    td {

      border: 1px solid #e5e7eb;

      min-width: 120px;

      width: 120px;

      height: 40px;

      padding: 8px;

      outline: none;

      cursor: text;

      position: relative;

    }

    td.selected {

      background: #dbeafe;

      outline: 2px solid #3b82f6;

    }

    td:focus {

      outline: 2px solid #3b82f6;

    }

    .row-number {

      position: sticky;

      left: 0;

      z-index: 1;

      background: #f9fafb;

      color: #6b7280;

      font-weight: 600;

      min-width: 60px;

      width: 60px;

    }

    /* TABS */

    .sheet-tabs {

      display: flex;

      gap: 10px;

      padding: 15px 25px;

      background: white;

      border-top: 1px solid #e5e7eb;

      overflow-x: auto;

    }

    .sheet-tab {

      padding: 10px 16px;

      border-radius: 12px;

      background: #f3f4f6;

      cursor: pointer;

      white-space: nowrap;

      font-weight: 600;

    }

    .sheet-tab.active {

      background: #22c55e;

      color: white;

    }

    /* STATUSBAR */

    .statusbar {

      background: white;

      border-top: 1px solid #e5e7eb;

      padding: 15px 25px;

      display: flex;

      justify-content: space-between;

      color: #6b7280;

      font-size: 14px;

      flex-wrap: wrap;

      gap: 10px;

    }

    /* CHART */

    .chart-card {

      background: white;

      border-radius: 24px;

      border: 1px solid #e5e7eb;

      margin: 25px;

      padding: 25px;

      box-shadow:
        0 6px 24px rgba(0,0,0,0.05);

    }

    .chart-card h2 {

      margin-bottom: 20px;

    }

    .hidden {

      display: none;

    }

  </style>

</head>
<body>

  <!-- TOPBAR -->

  <div class="topbar">

    <div>

      <h1>
        📊 Plum Academy Sheets
      </h1>

      <p id="studentInfo">
        Loading...
      </p>

    </div>

    <div class="topbar-buttons">

      <a
        href="/dashboard/student"
        class="btn secondary-btn"
      >
        Dashboard
      </a>

      <button
        class="btn secondary-btn"
        onclick="newSheet()"
      >
        + New Sheet
      </button>

      <button
        class="btn secondary-btn"
        onclick="
          document
          .getElementById(
            'importFile'
          )
          .click()
        "
      >
        Open .pawsheets
      </button>

      <button
        class="btn secondary-btn"
        onclick="exportSheet()"
      >
        Export
      </button>

      <button
        class="btn primary-btn"
        onclick="saveWorkbook()"
      >
        Save Workbook
      </button>

    </div>

  </div>

  <!-- TOOLBAR -->

  <div class="toolbar">

    <input
      type="text"
      id="sheetTitle"
      placeholder="Spreadsheet Title"
    />

    <!-- BACKGROUND -->

    <input
      type="color"
      id="bgColor"
    />

    <button onclick="applyBackground()">
      Cell Colour
    </button>

    <!-- TEXT -->

    <input
      type="color"
      id="textColor"
    />

    <button onclick="applyTextColor()">
      Text Colour
    </button>

    <!-- BOLD -->

    <button onclick="toggleBold()">
      Bold
    </button>

    <!-- MERGE -->

    <button onclick="mergeCells()">
      Merge Cells
    </button>

    <!-- CHART -->

    <button onclick="generateChart()">
      Generate Chart
    </button>

  </div>

  <!-- SHEET -->

  <div class="sheet-wrapper">

    <div class="sheet">

      <table id="spreadsheet"></table>

    </div>

  </div>

  <!-- TABS -->

  <div
    class="sheet-tabs"
    id="sheetTabs"
  ></div>

  <!-- CHART -->

  <div class="chart-card">

    <h2>
      📈 Charts
    </h2>

    <canvas id="chartCanvas"></canvas>

  </div>

  <!-- STATUS -->

  <div class="statusbar">

    <div id="saveStatus">
      Ready
    </div>

    <div id="selectedInfo">
      No Cell Selected
    </div>

  </div>

  <!-- IMPORT -->

  <input
    type="file"
    id="importFile"
    class="hidden"
    accept=".pawsheets"
  />

  <script>

    // ==================================================
    // SUPABASE
    // ==================================================

    const STUDENT_SUPABASE_URL =
      "https://ebzcflngssljyqieizws.supabase.co";

    const STUDENT_SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViemNmbG5nc3NsanlxaWVpendzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MDQ3NDEsImV4cCI6MjA5Mzk4MDc0MX0.ZnPi4jKEtkr0iUN_ymVrhUI7A_OMkhWjRn3shA2D9yk";

    // ==================================================

    const studentSupabase =
      supabase.createClient(
        STUDENT_SUPABASE_URL,
        STUDENT_SUPABASE_ANON_KEY
      );

    // ==================================================
    // GLOBALS
    // ==================================================

    let currentStudent = null;

    let workbook = {

      sheets: {

        Sheet1: {}

      }

    };

    let currentSheet =
      "Sheet1";

    let selectedCells = [];

    let chart = null;

    // ==================================================
    // AUTH
    // ==================================================

    async function initializeAuth() {

      const {
        data: {
          session
        }
      } = await studentSupabase
        .auth
        .getSession();

      if (!session) {

        window.location.href =
          "/login/student";

        return;

      }

      currentStudent =
        session.user;

      document.getElementById(
        "studentInfo"
      ).textContent =

        `${currentStudent.user_metadata.full_name} • ${currentStudent.email}`;

      renderSheet();

      renderTabs();

    }

    // ==================================================
    // RENDER SHEET
    // ==================================================

    function renderSheet() {

      const table =
        document.getElementById(
          "spreadsheet"
        );

      table.innerHTML = "";

      // HEADER

      const header =
        document.createElement(
          "tr"
        );

      header.innerHTML =
        `<th></th>`;

      for (
        let col = 0;
        col < 20;
        col++
      ) {

        const letter =
          String.fromCharCode(
            65 + col
          );

        header.innerHTML +=

          `<th>${letter}</th>`;

      }

      table.appendChild(
        header
      );

      // ROWS

      for (
        let row = 1;
        row <= 50;
        row++
      ) {

        const tr =
          document.createElement(
            "tr"
          );

        tr.innerHTML =

          `<th class="row-number">${row}</th>`;

        for (
          let col = 0;
          col < 20;
          col++
        ) {

          const letter =
            String.fromCharCode(
              65 + col
            );

          const cellId =
            `${letter}${row}`;

          const cellData =
            workbook.sheets[
              currentSheet
            ][cellId] || {};

          const td =
            document.createElement(
              "td"
            );

          td.contentEditable =
            true;

          td.dataset.cell =
            cellId;

          td.innerHTML =
            cellData.value || "";

          // STYLES

          if (
            cellData.style
          ) {

            Object.assign(
              td.style,
              cellData.style
            );

          }

          // EVENTS

          td.addEventListener(
            "focus",
            () => {

              selectedCells = [
                td
              ];

              updateSelection();

            }
          );

          td.addEventListener(
            "input",
            () => {

              updateCell(
                cellId,
                td.innerHTML
              );

            }
          );

          tr.appendChild(td);

        }

        table.appendChild(
          tr
        );

      }

    }

    // ==================================================
    // UPDATE CELL
    // ==================================================

    function updateCell(
      cellId,
      value
    ) {

      // FORMULAS

      if (
        value.startsWith("=")
      ) {

        value =
          calculateFormula(
            value
          );

      }

      workbook.sheets[
        currentSheet
      ][cellId] = {

        ...workbook.sheets[
          currentSheet
        ][cellId],

        value: value

      };

      document.getElementById(
        "saveStatus"
      ).textContent =
        "Unsaved changes";

    }

    // ==================================================
    // FORMULAS
    // ==================================================

    function calculateFormula(
      formula
    ) {

      try {

        // SUM

        if (
          formula.startsWith(
            "=SUM("
          )
        ) {

          const range =
            formula
            .replace(
              "=SUM(",
              ""
            )
            .replace(
              ")",
              ""
            );

          const [
            start,
            end
          ] = range.split(":");

          let total = 0;

          const startRow =
            parseInt(
              start.slice(1)
            );

          const endRow =
            parseInt(
              end.slice(1)
            );

          const col =
            start[0];

          for (
            let i = startRow;
            i <= endRow;
            i++
          ) {

            const value =
              parseFloat(

                workbook.sheets[
                  currentSheet
                ][`${col}${i}`]
                ?.value || 0

              );

            total += value;

          }

          return total;

        }

      }

      catch {

        return "ERROR";

      }

      return formula;

    }

    // ==================================================
    // SELECTION
    // ==================================================

    function updateSelection() {

      document
        .querySelectorAll("td")
        .forEach(td => {

          td.classList.remove(
            "selected"
          );

        });

      selectedCells.forEach(
        td => {

          td.classList.add(
            "selected"
          );

        }
      );

      if (
        selectedCells[0]
      ) {

        document.getElementById(
          "selectedInfo"
        ).textContent =

          `Selected: ${selectedCells[0].dataset.cell}`;

      }

    }

    // ==================================================
    // BACKGROUND
    // ==================================================

    function applyBackground() {

      const color =
        document.getElementById(
          "bgColor"
        ).value;

      selectedCells.forEach(
        td => {

          td.style.background =
            color;

          saveStyle(
            td.dataset.cell,
            {
              background: color
            }
          );

        }
      );

    }

    // ==================================================
    // TEXT COLOR
    // ==================================================

    function applyTextColor() {

      const color =
        document.getElementById(
          "textColor"
        ).value;

      selectedCells.forEach(
        td => {

          td.style.color =
            color;

          saveStyle(
            td.dataset.cell,
            {
              color: color
            }
          );

        }
      );

    }

    // ==================================================
    // BOLD
    // ==================================================

    function toggleBold() {

      selectedCells.forEach(
        td => {

          const isBold =
            td.style.fontWeight
            === "bold";

          td.style.fontWeight =
            isBold
            ? "normal"
            : "bold";

          saveStyle(
            td.dataset.cell,
            {
              fontWeight:
                td.style.fontWeight
            }
          );

        }
      );

    }

    // ==================================================
    // SAVE STYLE
    // ==================================================

    function saveStyle(
      cellId,
      style
    ) {

      workbook.sheets[
        currentSheet
      ][cellId] = {

        ...workbook.sheets[
          currentSheet
        ][cellId],

        style: {

          ...workbook.sheets[
            currentSheet
          ][cellId]
          ?.style,

          ...style

        }

      };

    }

    // ==================================================
    // MERGE
    // ==================================================

    function mergeCells() {

      if (
        selectedCells.length < 2
      ) {

        alert(
          "Select multiple cells first."
        );

        return;

      }

      const first =
        selectedCells[0];

      first.colSpan =
        selectedCells.length;

      for (
        let i = 1;
        i < selectedCells.length;
        i++
      ) {

        selectedCells[
          i
        ].style.display =
          "none";

      }

    }

    // ==================================================
    // NEW SHEET
    // ==================================================

    function newSheet() {

      const name =
        prompt(
          "Sheet name?"
        );

      if (!name) {
        return;
      }

      workbook.sheets[
        name
      ] = {};

      currentSheet =
        name;

      renderTabs();

      renderSheet();

    }

    // ==================================================
    // TABS
    // ==================================================

    function renderTabs() {

      const tabs =
        document.getElementById(
          "sheetTabs"
        );

      tabs.innerHTML = "";

      Object.keys(
        workbook.sheets
      ).forEach(name => {

        const tab =
          document.createElement(
            "div"
          );

        tab.className =
          "sheet-tab";

        if (
          name === currentSheet
        ) {

          tab.classList.add(
            "active"
          );

        }

        tab.textContent =
          name;

        tab.onclick =
          () => {

            currentSheet =
              name;

            renderTabs();

            renderSheet();

          };

        tabs.appendChild(
          tab
        );

      });

    }

    // ==================================================
    // CHARTS
    // ==================================================

    function generateChart() {

      const labels = [];

      const values = [];

      Object.entries(
        workbook.sheets[
          currentSheet
        ]
      ).forEach(
        ([key, value]) => {

          if (
            !isNaN(
              parseFloat(
                value.value
              )
            )
          ) {

            labels.push(key);

            values.push(
              parseFloat(
                value.value
              )
            );

          }

        }
      );

      if (chart) {

        chart.destroy();

      }

      chart =
        new Chart(

          document.getElementById(
            "chartCanvas"
          ),

          {

            type: "bar",

            data: {

              labels,

              datasets: [

                {

                  label:
                    "Spreadsheet Data",

                  data: values

                }

              ]

            }

          }

        );

    }

    // ==================================================
    // SAVE
    // ==================================================

    async function saveWorkbook() {

      document.getElementById(
        "saveStatus"
      ).textContent =
        "Saving workbook...";

      const {
        error
      } = await studentSupabase
        .from("student_sheets")
        .insert([{

          student_id:
            currentStudent.id,

          student_name:
            currentStudent.user_metadata
            .full_name,

          student_email:
            currentStudent.email,

          title:
            document.getElementById(
              "sheetTitle"
            ).value
            || "Untitled Workbook",

          workbook:
            workbook,

          updated_at:
            new Date().toISOString()

        }]);

      console.error(error);

      if (error) {

        document.getElementById(
          "saveStatus"
        ).textContent =
          "Failed to save.";

        return;

      }

      document.getElementById(
        "saveStatus"
      ).textContent =
        "Workbook saved successfully!";

    }

    // ==================================================
    // EXPORT
    // ==================================================

    function exportSheet() {

      const exportData = {

        workbook,

        title:
          document.getElementById(
            "sheetTitle"
          ).value,

        exported_at:
          new Date().toISOString()

      };

      const blob =
        new Blob(

          [
            JSON.stringify(
              exportData,
              null,
              2
            )
          ],

          {
            type:
              "application/pawsheets"
          }

        );

      const url =
        URL.createObjectURL(
          blob
        );

      const a =
        document.createElement(
          "a"
        );

      a.href = url;

      a.download =
        `${exportData.title || "spreadsheet"}.pawsheets`;

      a.click();

      URL.revokeObjectURL(
        url
      );

    }

    // ==================================================
    // IMPORT
    // ==================================================

    document.getElementById(
      "importFile"
    ).addEventListener(
      "change",
      async (event) => {

        const file =
          event.target.files[0];

        if (!file) {
          return;
        }

        try {

          const text =
            await file.text();

          const imported =
            JSON.parse(text);

          workbook =
            imported.workbook;

          document.getElementById(
            "sheetTitle"
          ).value =
            imported.title;

          currentSheet =
            Object.keys(
              workbook.sheets
            )[0];

          renderTabs();

          renderSheet();

          document.getElementById(
            "saveStatus"
          ).textContent =
            "Spreadsheet imported.";

        }

        catch {

          alert(
            "Invalid .pawsheets file."
          );

        }

      }
    );

    // ==================================================
    // START
    // ==================================================

    window.addEventListener(
      "load",
      () => {

        initializeAuth();

      }
    );

  </script>

</body>
</html>
