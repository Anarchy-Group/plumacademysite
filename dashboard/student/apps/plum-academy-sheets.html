<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Plum Academy Sheets
  </title>

  <!-- JSPREADSHEET -->

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/jspreadsheet-ce@4.15.0/dist/jspreadsheet.css"
  />

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/jsuites@4.9.10/dist/jsuites.css"
  />

  <script src="https://cdn.jsdelivr.net/npm/jsuites@4.9.10/dist/jsuites.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/jspreadsheet-ce@4.15.0/dist/index.js"></script>

  <!-- CHART.JS -->

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- SUPABASE -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    * {

      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, Arial, sans-serif;

    }

    body {

      background: #f5f7fb;

      min-height: 100vh;

      display: flex;

      flex-direction: column;

      color: #111827;

    }

    /* TOPBAR */

    .topbar {

      background: white;

      border-bottom: 1px solid #e5e7eb;

      padding: 20px 25px;

      display: flex;

      justify-content: space-between;

      align-items: center;

      flex-wrap: wrap;

      gap: 20px;

    }

    .topbar h1 {

      font-size: 32px;

      margin-bottom: 5px;

    }

    .topbar p {

      color: #6b7280;

      font-size: 14px;

    }

    .topbar-buttons {

      display: flex;

      gap: 12px;

      flex-wrap: wrap;

    }

    /* BUTTONS */

    .btn {

      padding: 13px 18px;

      border-radius: 12px;

      border: none;

      cursor: pointer;

      font-weight: 600;

      transition: 0.15s;

      text-decoration: none;

    }

    .primary-btn {

      background: #22c55e;

      color: white;

    }

    .primary-btn:hover {

      background: #16a34a;

    }

    .secondary-btn {

      background: white;

      border: 1px solid #d1d5db;

      color: #111827;

    }

    .secondary-btn:hover {

      background: #f3f4f6;

    }

    /* TOOLBAR */

    .toolbar {

      background: white;

      border-bottom: 1px solid #e5e7eb;

      padding: 18px 25px;

      display: flex;

      gap: 12px;

      flex-wrap: wrap;

      align-items: center;

    }

    .toolbar input,
    .toolbar select {

      padding: 10px;

      border-radius: 10px;

      border: 1px solid #d1d5db;

    }

    /* SPREADSHEET */

    .sheet-container {

      flex: 1;

      overflow: auto;

      padding: 25px;

    }

    #spreadsheet {

      background: white;

      border-radius: 20px;

      overflow: hidden;

      border: 1px solid #e5e7eb;

    }

    /* CHART AREA */

    .chart-area {

      background: white;

      margin: 25px;

      border-radius: 20px;

      border: 1px solid #e5e7eb;

      padding: 25px;

    }

    .chart-area h2 {

      margin-bottom: 20px;

    }

    /* STATUSBAR */

    .statusbar {

      background: white;

      border-top: 1px solid #e5e7eb;

      padding: 15px 25px;

      color: #6b7280;

      display: flex;

      justify-content: space-between;

      flex-wrap: wrap;

      gap: 10px;

    }

    .hidden {

      display: none;

    }

  </style>

</head>
<body>

  <!-- TOPBAR -->

  <div class="topbar">

    <div>

      <h1>
        📊 Plum Academy Sheets
      </h1>

      <p id="studentInfo">
        Loading...
      </p>

    </div>

    <div class="topbar-buttons">

      <!-- DASHBOARD -->

      <a
        href="/dashboard/student"
        class="btn secondary-btn"
      >
        Dashboard
      </a>

      <!-- NEW SHEET -->

      <button
        class="btn secondary-btn"
        onclick="createNewWorksheet()"
      >
        + New Sheet
      </button>

      <!-- IMPORT -->

      <button
        class="btn secondary-btn"
        onclick="
          document
          .getElementById(
            'sheetImport'
          )
          .click()
        "
      >
        📂 Open .pawsheets
      </button>

      <!-- EXPORT -->

      <button
        class="btn secondary-btn"
        onclick="exportSheet()"
      >
        Export .pawsheets
      </button>

      <!-- SAVE -->

      <button
        class="btn primary-btn"
        onclick="saveSheet()"
      >
        Save Spreadsheet
      </button>

    </div>

  </div>

  <!-- TOOLBAR -->

  <div class="toolbar">

    <!-- TITLE -->

    <input
      type="text"
      id="sheetTitle"
      placeholder="Spreadsheet Title"
    />

    <!-- COLORS -->

    <input
      type="color"
      id="backgroundColor"
    />

    <button
      onclick="setCellBackground()"
    >
      Cell Colour
    </button>

    <!-- TEXT COLOR -->

    <input
      type="color"
      id="textColor"
    />

    <button
      onclick="setTextColor()"
    >
      Text Colour
    </button>

    <!-- MERGE -->

    <button
      onclick="mergeSelectedCells()"
    >
      Merge Cells
    </button>

    <!-- CHART -->

    <button
      onclick="generateChart()"
    >
      Generate Chart
    </button>

  </div>

  <!-- SPREADSHEET -->

  <div class="sheet-container">

    <div id="spreadsheet"></div>

  </div>

  <!-- CHARTS -->

  <div class="chart-area">

    <h2>
      📈 Charts & Graphs
    </h2>

    <canvas id="chartCanvas"></canvas>

  </div>

  <!-- STATUSBAR -->

  <div class="statusbar">

    <div id="saveStatus">
      Ready
    </div>

    <div id="selectedCell">
      Selected Cell: None
    </div>

  </div>

  <!-- IMPORT -->

  <input
    type="file"
    id="sheetImport"
    class="hidden"
    accept=".pawsheets"
  />

  <script>

    // ==================================================
    // SUPABASE
    // ==================================================

    const STUDENT_SUPABASE_URL =
      "https://ebzcflngssljyqieizws.supabase.co";

    const STUDENT_SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViemNmbG5nc3NsanlxaWVpendzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MDQ3NDEsImV4cCI6MjA5Mzk4MDc0MX0.ZnPi4jKEtkr0iUN_ymVrhUI7A_OMkhWjRn3shA2D9yk";

    // ==================================================
    // CLIENT
    // ==================================================

    const studentSupabase =
      supabase.createClient(
        STUDENT_SUPABASE_URL,
        STUDENT_SUPABASE_ANON_KEY
      );

    // ==================================================
    // GLOBALS
    // ==================================================

    let currentStudent = null;

    let spreadsheet = null;

    let chart = null;

    // ==================================================
    // AUTH
    // ==================================================

    async function initializeAuth() {

      const {
        data: {
          session
        }
      } = await studentSupabase
        .auth
        .getSession();

      // NO SESSION

      if (!session) {

        window.location.href =
          "/login/student";

        return;

      }

      currentStudent =
        session.user;

      // UI

      document.getElementById(
        "studentInfo"
      ).textContent =
        `${currentStudent.user_metadata.full_name} • ${currentStudent.email}`;

      // LOAD

      initializeSpreadsheet();

    }

    // ==================================================
    // SPREADSHEET
    // ==================================================

    function initializeSpreadsheet() {

      spreadsheet =
        jspreadsheet(
          document.getElementById(
            "spreadsheet"
          ),
          {

            worksheets: [

              {

                worksheetName:
                  "Sheet1",

                minDimensions:
                  [20, 50],

                tableOverflow: true,

                tableWidth:
                  "100%",

                allowComments: true,

                allowInsertColumn: true,

                allowManualInsertColumn: true,

                allowInsertRow: true,

                allowManualInsertRow: true,

                allowDeleteColumn: true,

                allowDeleteRow: true,

                allowRenameWorksheet: true,

                allowMoveWorksheet: true,

                allowCreateWorksheet: true,

                allowDeleteWorksheet: true,

                columns: [

                  {
                    type: "text",
                    width: 140
                  }

                ]

              }

            ],

            onselection:
              function(
                instance,
                x1,
                y1,
                x2,
                y2
              ) {

                document.getElementById(
                  "selectedCell"
                ).textContent =

                  `Selected: (${x1}, ${y1}) → (${x2}, ${y2})`;

              }

          }
        );

    }

    // ==================================================
    // CREATE NEW SHEET
    // ==================================================

    function createNewWorksheet() {

      spreadsheet[0]
        .parent
        .createWorksheet();

    }

    // ==================================================
    // CELL BACKGROUND
    // ==================================================

    function setCellBackground() {

      const color =
        document.getElementById(
          "backgroundColor"
        ).value;

      const selected =
        spreadsheet[0]
        .getSelected();

      if (!selected) {
        return;
      }

      spreadsheet[0]
        .setStyle(

          selected.x1,
          selected.y1,

          "background-color",
          color

        );

    }

    // ==================================================
    // TEXT COLOR
    // ==================================================

    function setTextColor() {

      const color =
        document.getElementById(
          "textColor"
        ).value;

      const selected =
        spreadsheet[0]
        .getSelected();

      if (!selected) {
        return;
      }

      spreadsheet[0]
        .setStyle(

          selected.x1,
          selected.y1,

          "color",
          color

        );

    }

    // ==================================================
    // MERGE CELLS
    // ==================================================

    function mergeSelectedCells() {

      const selected =
        spreadsheet[0]
        .getSelected();

      if (!selected) {
        return;
      }

      spreadsheet[0]
        .setMerge(

          `${jspreadsheet.helpers.getColumnNameFromCoords(
            selected.x1,
            selected.y1
          )}:${jspreadsheet.helpers.getColumnNameFromCoords(
            selected.x2,
            selected.y2
          )}`

        );

    }

    // ==================================================
    // CHARTS
    // ==================================================

    function generateChart() {

      const worksheet =
        spreadsheet[0];

      const data =
        worksheet.getData();

      const labels = [];

      const values = [];

      // USE COLUMN A/B

      for (
        let i = 0;
        i < data.length;
        i++
      ) {

        if (
          data[i][0]
          && data[i][1]
        ) {

          labels.push(
            data[i][0]
          );

          values.push(
            parseFloat(
              data[i][1]
            )
          );

        }

      }

      // DESTROY OLD

      if (chart) {

        chart.destroy();

      }

      // CREATE

      chart =
        new Chart(

          document.getElementById(
            "chartCanvas"
          ),

          {

            type: "bar",

            data: {

              labels: labels,

              datasets: [

                {

                  label:
                    "Data",

                  data: values

                }

              ]

            }

          }

        );

    }

    // ==================================================
    // SAVE
    // ==================================================

    async function saveSheet() {

      document.getElementById(
        "saveStatus"
      ).textContent =
        "Saving spreadsheet...";

      const worksheets =
        spreadsheet.map(
          sheet => ({

            name:
              sheet.options
              .worksheetName,

            data:
              sheet.getJson(),

            styles:
              sheet.getStyle(),

            merges:
              sheet.getMerge()

          })
        );

      const {
        error
      } = await studentSupabase
        .from("student_sheets")
        .insert([{

          student_id:
            currentStudent.id,

          student_name:
            currentStudent.user_metadata
            .full_name,

          student_email:
            currentStudent.email,

          title:
            document.getElementById(
              "sheetTitle"
            ).value
            || "Untitled Spreadsheet",

          worksheets:
            worksheets,

          updated_at:
            new Date().toISOString()

        }]);

      console.error(error);

      if (error) {

        document.getElementById(
          "saveStatus"
        ).textContent =
          "Failed to save.";

        return;

      }

      document.getElementById(
        "saveStatus"
      ).textContent =
        "Spreadsheet saved successfully!";

    }

    // ==================================================
    // EXPORT
    // ==================================================

    function exportSheet() {

      const worksheets =
        spreadsheet.map(
          sheet => ({

            name:
              sheet.options
              .worksheetName,

            data:
              sheet.getJson(),

            styles:
              sheet.getStyle(),

            merges:
              sheet.getMerge()

          })
        );

      const pawsheets = {

        title:
          document.getElementById(
            "sheetTitle"
          ).value,

        student_name:
          currentStudent.user_metadata
          .full_name,

        student_email:
          currentStudent.email,

        worksheets:
          worksheets,

        exported_at:
          new Date().toISOString()

      };

      const blob =
        new Blob(
          [
            JSON.stringify(
              pawsheets,
              null,
              2
            )
          ],
          {
            type:
              "application/pawsheets"
          }
        );

      const url =
        URL.createObjectURL(
          blob
        );

      const a =
        document.createElement(
          "a"
        );

      a.href = url;

      a.download =
        `${pawsheets.title || "spreadsheet"}.pawsheets`;

      a.click();

      URL.revokeObjectURL(
        url
      );

    }

    // ==================================================
    // IMPORT
    // ==================================================

    document.getElementById(
      "sheetImport"
    ).addEventListener(
      "change",
      async (event) => {

        const file =
          event.target.files[0];

        if (!file) {
          return;
        }

        try {

          const text =
            await file.text();

          const imported =
            JSON.parse(text);

          // TITLE

          document.getElementById(
            "sheetTitle"
          ).value =
            imported.title;

          // DESTROY

          document.getElementById(
            "spreadsheet"
          ).innerHTML = "";

          // RELOAD

          spreadsheet =
            jspreadsheet(
              document.getElementById(
                "spreadsheet"
              ),
              {

                worksheets:
                  imported.worksheets

              }
            );

          document.getElementById(
            "saveStatus"
          ).textContent =
            "Spreadsheet imported.";

        }

        catch (err) {

          console.error(err);

          alert(
            "Invalid .pawsheets file."
          );

        }

      }
    );

    // ==================================================
    // AUTOSAVE
    // ==================================================

    setInterval(() => {

      if (currentStudent) {

        saveSheet();

      }

    }, 30000);

    // ==================================================
    // START
    // ==================================================

    window.addEventListener(
      "load",
      () => {

        initializeAuth();

      }
    );

  </script>

</body>
</html>
