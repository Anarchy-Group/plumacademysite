<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Plum Academy Sheets
  </title>

  <!-- SUPABASE -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- CHART.JS -->

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    * {

      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, Arial, sans-serif;

    }

    body {

      background: #f3f6fb;

      min-height: 100vh;

      display: flex;

      flex-direction: column;

      color: #111827;

    }

    /* TOPBAR */

    .topbar {

      background: white;

      border-bottom: 1px solid #e5e7eb;

      padding: 18px 24px;

      display: flex;

      justify-content: space-between;

      align-items: center;

      flex-wrap: wrap;

      gap: 16px;

    }

    .topbar h1 {

      font-size: 30px;

      color: #15803d;

      margin-bottom: 4px;

    }

    .topbar p {

      color: #6b7280;

      font-size: 14px;

    }

    .topbar-buttons {

      display: flex;

      gap: 10px;

      flex-wrap: wrap;

    }

    /* BUTTONS */

    .btn {

      padding: 10px 16px;

      border-radius: 12px;

      border: none;

      cursor: pointer;

      font-weight: 600;

      transition: 0.15s;

      text-decoration: none;

      font-size: 14px;

    }

    .primary-btn {

      background: #22c55e;

      color: white;

    }

    .primary-btn:hover {

      background: #16a34a;

    }

    .secondary-btn {

      background: white;

      border: 1px solid #d1d5db;

      color: #111827;

    }

    .secondary-btn:hover {

      background: #f3f4f6;

    }

    /* TOOLBAR */

    .toolbar {

      background: white;

      border-bottom: 1px solid #e5e7eb;

      padding: 16px 24px;

      display: flex;

      flex-wrap: wrap;

      gap: 10px;

      align-items: center;

    }

    .toolbar button,
    .toolbar input {

      padding: 9px 12px;

      border-radius: 10px;

      border: 1px solid #d1d5db;

      background: white;

      font-size: 13px;

    }

    .toolbar button {

      cursor: pointer;

      font-weight: 600;

    }

    .toolbar button:hover {

      background: #f3f4f6;

    }

    /* SHEET */

    .sheet-wrapper {

      flex: 1;

      overflow: auto;

      padding: 24px;

    }

    .sheet {

      background: white;

      border-radius: 20px;

      border: 1px solid #e5e7eb;

      overflow: auto;

      box-shadow:
        0 6px 24px rgba(0,0,0,0.05);

    }

    table {

      border-collapse: collapse;

      width: max-content;

    }

    th {

      background: #f9fafb;

      border: 1px solid #e5e7eb;

      min-width: 90px;

      width: 90px;

      height: 32px;

      text-align: center;

      color: #6b7280;

      font-size: 12px;

      position: sticky;

      top: 0;

      z-index: 2;

      user-select: none;

    }

    td {

      border: 1px solid #e5e7eb;

      min-width: 90px;

      width: 90px;

      height: 28px;

      min-height: 28px;

      padding: 4px 6px;

      outline: none;

      cursor: text;

      position: relative;

      font-size: 13px;

      overflow: hidden;

    }

    td.selected {

      background: #dbeafe;

      outline: 2px solid #3b82f6;

      z-index: 1;

    }

    td:focus {

      outline: 2px solid #3b82f6;

    }

    .row-number {

      position: sticky;

      left: 0;

      z-index: 1;

      background: #f9fafb;

      min-width: 45px;

      width: 45px;

      font-size: 12px;

      color: #6b7280;

    }

    /* RESIZE HANDLE */

    .resize-handle {

      position: absolute;

      right: 0;

      top: 0;

      width: 5px;

      height: 100%;

      cursor: col-resize;

      z-index: 10;

    }

    /* TABS */

    .sheet-tabs {

      display: flex;

      gap: 10px;

      padding: 14px 24px;

      background: white;

      border-top: 1px solid #e5e7eb;

      overflow-x: auto;

    }

    .sheet-tab {

      padding: 9px 14px;

      border-radius: 10px;

      background: #f3f4f6;

      cursor: pointer;

      font-weight: 600;

      white-space: nowrap;

      font-size: 13px;

    }

    .sheet-tab.active {

      background: #22c55e;

      color: white;

    }

    /* STATUSBAR */

    .statusbar {

      background: white;

      border-top: 1px solid #e5e7eb;

      padding: 12px 24px;

      display: flex;

      justify-content: space-between;

      flex-wrap: wrap;

      gap: 10px;

      color: #6b7280;

      font-size: 13px;

    }

    /* CHART */

    .chart-card {

      background: white;

      border-radius: 20px;

      border: 1px solid #e5e7eb;

      margin: 24px;

      padding: 24px;

      box-shadow:
        0 6px 24px rgba(0,0,0,0.05);

    }

    .chart-card h2 {

      margin-bottom: 16px;

    }

    .hidden {

      display: none;

    }

  </style>

</head>
<body>

  <!-- TOPBAR -->

  <div class="topbar">

    <div>

      <h1>
        📊 Plum Academy Sheets
      </h1>

      <p id="studentInfo">
        Loading...
      </p>

    </div>

    <div class="topbar-buttons">

      <a
        href="/dashboard/student"
        class="btn secondary-btn"
      >
        Dashboard
      </a>

      <button
        class="btn secondary-btn"
        onclick="newSheet()"
      >
        + New Sheet
      </button>

      <button
        class="btn secondary-btn"
        onclick="
          document
          .getElementById(
            'importFile'
          )
          .click()
        "
      >
        Open .pawsheets
      </button>

      <button
        class="btn secondary-btn"
        onclick="exportSheet()"
      >
        Export
      </button>

      <button
        class="btn primary-btn"
        onclick="saveWorkbook()"
      >
        Save Workbook
      </button>

    </div>

  </div>

  <!-- TOOLBAR -->

  <div class="toolbar">

    <input
      type="text"
      id="sheetTitle"
      placeholder="Spreadsheet Title"
    />

    <input
      type="color"
      id="bgColor"
    />

    <button onclick="applyBackground()">
      Fill
    </button>

    <input
      type="color"
      id="textColor"
    />

    <button onclick="applyTextColor()">
      Text
    </button>

    <button onclick="toggleBold()">
      Bold
    </button>

    <button onclick="mergeCells()">
      Merge
    </button>

    <button onclick="generateChart()">
      Chart
    </button>

  </div>

  <!-- SHEET -->

  <div class="sheet-wrapper">

    <div class="sheet">

      <table id="spreadsheet"></table>

    </div>

  </div>

  <!-- TABS -->

  <div
    class="sheet-tabs"
    id="sheetTabs"
  ></div>

  <!-- CHART -->

  <div class="chart-card">

    <h2>
      📈 Charts
    </h2>

    <canvas id="chartCanvas"></canvas>

  </div>

  <!-- STATUS -->

  <div class="statusbar">

    <div id="saveStatus">
      Ready
    </div>

    <div id="selectedInfo">
      No Cell Selected
    </div>

  </div>

  <!-- IMPORT -->

  <input
    type="file"
    id="importFile"
    class="hidden"
    accept=".pawsheets"
  />

  <script>

    // ==================================================
    // SUPABASE
    // ==================================================

    const STUDENT_SUPABASE_URL =
      "https://ebzcflngssljyqieizws.supabase.co";

    const STUDENT_SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViemNmbG5nc3NsanlxaWVpendzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MDQ3NDEsImV4cCI6MjA5Mzk4MDc0MX0.ZnPi4jKEtkr0iUN_ymVrhUI7A_OMkhWjRn3shA2D9yk";

    const studentSupabase =
      supabase.createClient(
        STUDENT_SUPABASE_URL,
        STUDENT_SUPABASE_ANON_KEY
      );

    // ==================================================
    // GLOBALS
    // ==================================================

    let currentStudent = null;

    let workbook = {

      sheets: {

        Sheet1: {}

      }

    };

    let currentSheet =
      "Sheet1";

    let selectedCells = [];

    let isSelecting = false;

    let startCell = null;

    let endCell = null;

    let chart = null;

    // ==================================================
    // AUTH
    // ==================================================

    async function initializeAuth() {

      const {
        data: {
          session
        }
      } = await studentSupabase
        .auth
        .getSession();

      if (!session) {

        window.location.href =
          "/login/student";

        return;

      }

      currentStudent =
        session.user;

      document.getElementById(
        "studentInfo"
      ).textContent =

        `${currentStudent.user_metadata.full_name} • ${currentStudent.email}`;

      renderTabs();

      renderSheet();

    }

    // ==================================================
    // RENDER SHEET
    // ==================================================

    function renderSheet() {

      const table =
        document.getElementById(
          "spreadsheet"
        );

      table.innerHTML = "";

      // HEADER

      const header =
        document.createElement(
          "tr"
        );

      header.innerHTML =
        `<th></th>`;

      for (
        let col = 0;
        col < 20;
        col++
      ) {

        const letter =
          String.fromCharCode(
            65 + col
          );

        const th =
          document.createElement(
            "th"
          );

        th.innerHTML =
          letter;

        // RESIZE HANDLE

        const resize =
          document.createElement(
            "div"
          );

        resize.className =
          "resize-handle";

        resize.addEventListener(
          "mousedown",
          initResize
        );

        th.appendChild(
          resize
        );

        header.appendChild(
          th
        );

      }

      table.appendChild(
        header
      );

      // ROWS

      for (
        let row = 1;
        row <= 50;
        row++
      ) {

        const tr =
          document.createElement(
            "tr"
          );

        tr.innerHTML =
          `<th class="row-number">${row}</th>`;

        for (
          let col = 0;
          col < 20;
          col++
        ) {

          const letter =
            String.fromCharCode(
              65 + col
            );

          const cellId =
            `${letter}${row}`;

          const cellData =
            workbook.sheets[
              currentSheet
            ][cellId] || {};

          const td =
            document.createElement(
              "td"
            );

          td.dataset.cell =
            cellId;

          td.contentEditable =
            false;

          td.innerHTML =
            cellData.value || "";

          // STYLES

          if (
            cellData.style
          ) {

            Object.assign(
              td.style,
              cellData.style
            );

          }

          // EVENTS

          td.addEventListener(
            "mousedown",
            (e) => {

              e.preventDefault();

              isSelecting = true;

              startCell = td;

              endCell = td;

              selectRange(
                startCell,
                endCell
              );

            }
          );

          td.addEventListener(
            "mouseover",
            () => {

              if (
                !isSelecting
              ) {
                return;
              }

              endCell = td;

              selectRange(
                startCell,
                endCell
              );

            }
          );

          td.addEventListener(
            "dblclick",
            () => {

              td.contentEditable =
                true;

              td.focus();

            }
          );

          td.addEventListener(
            "blur",
            () => {

              td.contentEditable =
                false;

              updateCell(
                cellId,
                td.innerHTML
              );

            }
          );

          tr.appendChild(td);

        }

        table.appendChild(
          tr
        );

      }

    }

    // ==================================================
    // MOUSE UP
    // ==================================================

    document.addEventListener(
      "mouseup",
      () => {

        isSelecting = false;

      }
    );

    // ==================================================
    // GET POSITION
    // ==================================================

    function getCellPosition(
      td
    ) {

      const id =
        td.dataset.cell;

      const col =
        id.charCodeAt(0) - 65;

      const row =
        parseInt(
          id.slice(1)
        );

      return {
        row,
        col
      };

    }

    // ==================================================
    // SELECT RANGE
    // ==================================================

    function selectRange(
      start,
      end
    ) {

      clearSelection();

      const s =
        getCellPosition(
          start
        );

      const e =
        getCellPosition(
          end
        );

      const minRow =
        Math.min(
          s.row,
          e.row
        );

      const maxRow =
        Math.max(
          s.row,
          e.row
        );

      const minCol =
        Math.min(
          s.col,
          e.col
        );

      const maxCol =
        Math.max(
          s.col,
          e.col
        );

      document
        .querySelectorAll("td")
        .forEach(td => {

          const p =
            getCellPosition(
              td
            );

          if (

            p.row >= minRow
            && p.row <= maxRow

            &&

            p.col >= minCol
            && p.col <= maxCol

          ) {

            td.classList.add(
              "selected"
            );

            selectedCells.push(
              td
            );

          }

        });

      document.getElementById(
        "selectedInfo"
      ).textContent =

        `${selectedCells.length} cells selected`;

    }

    // ==================================================
    // CLEAR
    // ==================================================

    function clearSelection() {

      document
        .querySelectorAll("td")
        .forEach(td => {

          td.classList.remove(
            "selected"
          );

        });

      selectedCells = [];

    }

    // ==================================================
    // UPDATE CELL
    // ==================================================

    function updateCell(
      cellId,
      value
    ) {

      // FORMULAS

      if (
        value.startsWith("=")
      ) {

        value =
          calculateFormula(
            value
          );

      }

      workbook.sheets[
        currentSheet
      ][cellId] = {

        ...workbook.sheets[
          currentSheet
        ][cellId],

        value

      };

      document.getElementById(
        "saveStatus"
      ).textContent =
        "Unsaved changes";

    }

    // ==================================================
    // FORMULAS
    // ==================================================

    function calculateFormula(
      formula
    ) {

      try {

        // SUM

        if (
          formula.startsWith(
            "=SUM("
          )
        ) {

          const range =
            formula
            .replace(
              "=SUM(",
              ""
            )
            .replace(
              ")",
              ""
            );

          const [
            start,
            end
          ] = range.split(":");

          const col =
            start[0];

          const startRow =
            parseInt(
              start.slice(1)
            );

          const endRow =
            parseInt(
              end.slice(1)
            );

          let total = 0;

          for (
            let i = startRow;
            i <= endRow;
            i++
          ) {

            total += parseFloat(

              workbook.sheets[
                currentSheet
              ][`${col}${i}`]
              ?.value || 0

            );

          }

          return total;

        }

      }

      catch {

        return "ERROR";

      }

      return formula;

    }

    // ==================================================
    // STYLE HELPERS
    // ==================================================

    function saveStyle(
      cellId,
      style
    ) {

      workbook.sheets[
        currentSheet
      ][cellId] = {

        ...workbook.sheets[
          currentSheet
        ][cellId],

        style: {

          ...workbook.sheets[
            currentSheet
          ][cellId]
          ?.style,

          ...style

        }

      };

    }

    // ==================================================
    // BACKGROUND
    // ==================================================

    function applyBackground() {

      const color =
        document.getElementById(
          "bgColor"
        ).value;

      selectedCells.forEach(
        td => {

          td.style.background =
            color;

          saveStyle(
            td.dataset.cell,
            {
              background: color
            }
          );

        }
      );

    }

    // ==================================================
    // TEXT
    // ==================================================

    function applyTextColor() {

      const color =
        document.getElementById(
          "textColor"
        ).value;

      selectedCells.forEach(
        td => {

          td.style.color =
            color;

          saveStyle(
            td.dataset.cell,
            {
              color
            }
          );

        }
      );

    }

    // ==================================================
    // BOLD
    // ==================================================

    function toggleBold() {

      selectedCells.forEach(
        td => {

          const isBold =
            td.style.fontWeight
            === "bold";

          td.style.fontWeight =
            isBold
            ? "normal"
            : "bold";

          saveStyle(
            td.dataset.cell,
            {
              fontWeight:
                td.style.fontWeight
            }
          );

        }
      );

    }

    // ==================================================
    // MERGE
    // ==================================================

    function mergeCells() {

      if (
        selectedCells.length < 2
      ) {

        alert(
          "Select multiple cells first."
        );

        return;

      }

      const first =
        selectedCells[0];

      first.colSpan =
        selectedCells.length;

      for (
        let i = 1;
        i < selectedCells.length;
        i++
      ) {

        selectedCells[
          i
        ].style.display =
          "none";

      }

    }

    // ==================================================
    // RESIZE
    // ==================================================

    let currentResize = null;

    function initResize(
      e
    ) {

      currentResize =
        e.target.parentElement;

      document.addEventListener(
        "mousemove",
        resizeColumn
      );

      document.addEventListener(
        "mouseup",
        stopResize
      );

    }

    function resizeColumn(
      e
    ) {

      if (
        !currentResize
      ) {
        return;
      }

      const width =
        e.pageX
        - currentResize.offsetLeft;

      currentResize.style.width =
        width + "px";

      const index =
        Array.from(
          currentResize.parentElement.children
        ).indexOf(
          currentResize
        );

      document
        .querySelectorAll(
          `tr td:nth-child(${index + 1})`
        )
        .forEach(td => {

          td.style.width =
            width + "px";

          td.style.minWidth =
            width + "px";

        });

    }

    function stopResize() {

      currentResize = null;

      document.removeEventListener(
        "mousemove",
        resizeColumn
      );

      document.removeEventListener(
        "mouseup",
        stopResize
      );

    }

    // ==================================================
    // NEW SHEET
    // ==================================================

    function newSheet() {

      const name =
        prompt(
          "Sheet name?"
        );

      if (!name) {
        return;
      }

      workbook.sheets[
        name
      ] = {};

      currentSheet =
        name;

      renderTabs();

      renderSheet();

    }

    // ==================================================
    // TABS
    // ==================================================

    function renderTabs() {

      const tabs =
        document.getElementById(
          "sheetTabs"
        );

      tabs.innerHTML = "";

      Object.keys(
        workbook.sheets
      ).forEach(name => {

        const tab =
          document.createElement(
            "div"
          );

        tab.className =
          "sheet-tab";

        if (
          name === currentSheet
        ) {

          tab.classList.add(
            "active"
          );

        }

        tab.textContent =
          name;

        tab.onclick =
          () => {

            currentSheet =
              name;

            renderTabs();

            renderSheet();

          };

        tabs.appendChild(
          tab
        );

      });

    }

    // ==================================================
    // CHARTS
    // ==================================================

    function generateChart() {

      const labels = [];

      const values = [];

      Object.entries(
        workbook.sheets[
          currentSheet
        ]
      ).forEach(
        ([key, value]) => {

          if (
            !isNaN(
              parseFloat(
                value.value
              )
            )
          ) {

            labels.push(key);

            values.push(
              parseFloat(
                value.value
              )
            );

          }

        }
      );

      if (chart) {

        chart.destroy();

      }

      chart =
        new Chart(

          document.getElementById(
            "chartCanvas"
          ),

          {

            type: "bar",

            data: {

              labels,

              datasets: [

                {

                  label:
                    "Spreadsheet Data",

                  data: values

                }

              ]

            }

          }

        );

    }

    // ==================================================
    // SAVE
    // ==================================================

    async function saveWorkbook() {

      document.getElementById(
        "saveStatus"
      ).textContent =
        "Saving workbook...";

      const {
        error
      } = await studentSupabase
        .from("student_sheets")
        .insert([{

          student_id:
            currentStudent.id,

          student_name:
            currentStudent.user_metadata
            .full_name,

          student_email:
            currentStudent.email,

          title:
            document.getElementById(
              "sheetTitle"
            ).value
            || "Untitled Workbook",

          workbook,

          updated_at:
            new Date().toISOString()

        }]);

      console.error(error);

      if (error) {

        document.getElementById(
          "saveStatus"
        ).textContent =
          "Failed to save.";

        return;

      }

      document.getElementById(
        "saveStatus"
      ).textContent =
        "Workbook saved successfully!";

    }

    // ==================================================
    // EXPORT
    // ==================================================

    function exportSheet() {

      const exportData = {

        workbook,

        title:
          document.getElementById(
            "sheetTitle"
          ).value,

        exported_at:
          new Date().toISOString()

      };

      const blob =
        new Blob(

          [
            JSON.stringify(
              exportData,
              null,
              2
            )
          ],

          {
            type:
              "application/pawsheets"
          }

        );

      const url =
        URL.createObjectURL(
          blob
        );

      const a =
        document.createElement(
          "a"
        );

      a.href = url;

      a.download =
        `${exportData.title || "spreadsheet"}.pawsheets`;

      a.click();

      URL.revokeObjectURL(
        url
      );

    }

    // ==================================================
    // IMPORT
    // ==================================================

    document.getElementById(
      "importFile"
    ).addEventListener(
      "change",
      async (event) => {

        const file =
          event.target.files[0];

        if (!file) {
          return;
        }

        try {

          const text =
            await file.text();

          const imported =
            JSON.parse(text);

          workbook =
            imported.workbook;

          document.getElementById(
            "sheetTitle"
          ).value =
            imported.title;

          currentSheet =
            Object.keys(
              workbook.sheets
            )[0];

          renderTabs();

          renderSheet();

          document.getElementById(
            "saveStatus"
          ).textContent =
            "Spreadsheet imported.";

        }

        catch {

          alert(
            "Invalid .pawsheets file."
          );

        }

      }
    );

    // ==================================================
    // START
    // ==================================================

    window.addEventListener(
      "load",
      () => {

        initializeAuth();

      }
    );

  </script>

</body>
</html>
