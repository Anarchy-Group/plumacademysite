<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Magic Academy Writer
  </title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, Arial, sans-serif;
    }

    body {

      background: #f5f7fb;

      min-height: 100vh;

      color: #1f2937;

      padding: 30px;

    }

    .topbar {

      display: flex;

      justify-content: space-between;

      align-items: center;

      margin-bottom: 25px;

      flex-wrap: wrap;

      gap: 15px;

    }

    .topbar h1 {

      font-size: 30px;

      font-weight: 700;

    }

    .topbar p {

      color: #6b7280;

      margin-top: 6px;

    }

    .btn {

      padding: 13px 18px;

      border: 1px solid #dbe1ea;

      border-radius: 12px;

      background: white;

      color: #111827;

      cursor: pointer;

      font-weight: 600;

      text-decoration: none;

      transition: 0.15s;

    }

    .btn:hover {

      background: #f3f4f6;

    }

    .logout-btn {

      background: #ef4444;

      border: none;

      color: white;

    }

    .logout-btn:hover {

      background: #dc2626;

    }

    .save-btn {

      background: #6366f1;

      border: none;

      color: white;

    }

    .save-btn:hover {

      background: #4f46e5;

    }

    .card {

      background: white;

      border-radius: 18px;

      padding: 24px;

      border: 1px solid #e5e7eb;

      margin-bottom: 25px;

    }

    input {

      width: 100%;

      padding: 14px;

      border-radius: 12px;

      border: 1px solid #d1d5db;

      margin-bottom: 20px;

      font-size: 15px;

      background: white;

    }

    input:focus {

      outline: none;

      border-color: #6366f1;

    }

    #editorWrapper {

      border: 1px solid #d1d5db;

      border-radius: 16px;

      overflow: hidden;

      background: white;

    }

    #documentHeader {

      background: #f9fafb;

      border-bottom: 1px solid #e5e7eb;

      padding: 18px;

    }

    .header-row {

      margin-bottom: 10px;

      font-size: 14px;

      color: #4b5563;

    }

    .header-row:last-child {

      margin-bottom: 0;

    }

    #editor {

      width: 100%;

      min-height: 500px;

      padding: 24px;

      font-size: 16px;

      line-height: 1.8;

      outline: none;

      overflow-y: auto;

      background: white;

    }

    .status {

      margin-top: 15px;

      color: #6b7280;

      font-size: 14px;

    }

    .toolbar {

      display: flex;

      gap: 10px;

      flex-wrap: wrap;

      margin-top: 20px;

      margin-bottom: 20px;

    }

    .toolbar button {

      padding: 11px 14px;

      border: 1px solid #dbe1ea;

      border-radius: 10px;

      background: white;

      cursor: pointer;

      font-weight: 600;

      transition: 0.15s;

    }

    .toolbar button:hover {

      background: #f3f4f6;

    }

    .toolbar select {

      padding: 11px 14px;

      border-radius: 10px;

      border: 1px solid #dbe1ea;

      background: white;

      cursor: pointer;

      font-weight: 600;

    }

    .action-buttons {

      display: flex;

      gap: 12px;

      flex-wrap: wrap;

      margin-top: 20px;

    }

  </style>
</head>
<body>

  <div class="topbar">

    <div>

      <h1>
        ✨ Magic Academy Writer
      </h1>

      <p id="studentInfo">
        Loading...
      </p>

    </div>

    <div
      style="
        display:flex;
        gap:12px;
        flex-wrap:wrap;
      "
    >

      <a
        href="/dashboard/student/plum-academy-writer"
        class="btn"
      >
        My Documents
      </a>

      <a
        href="/dashboard/student"
        class="btn"
      >
        Dashboard
      </a>

      <button
        id="logoutBtn"
        class="btn logout-btn"
      >
        Logout
      </button>

    </div>

  </div>

  <div class="card">

    <input
      type="text"
      id="documentTitle"
      placeholder="Document Title"
    />

    <div class="toolbar">

      <button onclick="makeBold()">
        Bold
      </button>

      <button onclick="makeItalic()">
        Italic
      </button>

      <button onclick="underlineText()">
        Underline
      </button>

      <button onclick="heading()">
        Heading
      </button>

      <button onclick="bulletList()">
        Bullet List
      </button>

      <button onclick="highlightText()">
        Highlight
      </button>

      <select id="highlightColor">

        <option value="yellow">
          Yellow
        </option>

        <option value="#90ee90">
          Green
        </option>

        <option value="#87cefa">
          Blue
        </option>

        <option value="#ffb6c1">
          Pink
        </option>

      </select>

      <select
        id="fontSelector"
        onchange="changeFont()"
      >

        <option value="Arial">
          Arial
        </option>

        <option value="Times New Roman">
          Times New Roman
        </option>

        <option value="Georgia">
          Georgia
        </option>

        <option value="Verdana">
          Verdana
        </option>

      </select>

    </div>

    <div id="editorWrapper">

      <div id="documentHeader">

        <div class="header-row">

          <strong>
            Student ID:
          </strong>

          <span id="headerStudentId">
            Loading...
          </span>

        </div>

        <div class="header-row">

          <strong>
            Student Name:
          </strong>

          <span id="headerStudentName">
            Loading...
          </span>

        </div>

        <div class="header-row">

          <strong>
            Email Address:
          </strong>

          <span id="headerStudentEmail">
            Loading...
          </span>

        </div>

        <div class="header-row">

          <strong>
            Last Updated:
          </strong>

          <span id="headerDocumentDate">
            Loading...
          </span>

        </div>

      </div>

      <div
        id="editor"
        contenteditable="true"
      ></div>

    </div>

    <div
      class="status"
      id="saveStatus"
    >
      Ready
    </div>

    <div class="action-buttons">

      <button
        class="btn save-btn"
        id="saveBtn"
      >
        Save Document
      </button>

      <button
        class="btn"
        onclick="printDocument()"
      >
        Print Document
      </button>

    </div>

  </div>

  <script>

    // ==================================================
    // SUPABASE
    // ==================================================

    const STUDENT_SUPABASE_URL =
      "https://ebzcflngssljyqieizws.supabase.co";

    const STUDENT_SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViemNmbG5nc3NsanlxaWVpendzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MDQ3NDEsImV4cCI6MjA5Mzk4MDc0MX0.ZnPi4jKEtkr0iUN_ymVrhUI7A_OMkhWjRn3shA2D9yk";

    const studentSupabase =
      supabase.createClient(
        STUDENT_SUPABASE_URL,
        STUDENT_SUPABASE_ANON_KEY,
        {
          auth: {

            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true

          }
        }
      );

    // ==================================================
    // URL PARAMETERS
    // ==================================================

    const params =
      new URLSearchParams(
        window.location.search
      );

    const documentId =
      params.get("id");

    // ==================================================
    // ELEMENTS
    // ==================================================

    const editor =
      document.getElementById(
        "editor"
      );

    const documentTitle =
      document.getElementById(
        "documentTitle"
      );

    const saveStatus =
      document.getElementById(
        "saveStatus"
      );

    const studentInfo =
      document.getElementById(
        "studentInfo"
      );

    const saveBtn =
      document.getElementById(
        "saveBtn"
      );

    const headerStudentId =
      document.getElementById(
        "headerStudentId"
      );

    const headerStudentName =
      document.getElementById(
        "headerStudentName"
      );

    const headerStudentEmail =
      document.getElementById(
        "headerStudentEmail"
      );

    const headerDocumentDate =
      document.getElementById(
        "headerDocumentDate"
      );

    let currentStudent = null;

    // ==================================================
    // AUTH INITIALIZATION
    // ==================================================

    async function initializeAuth() {

      const {
        data: {
          session
        }
      } = await studentSupabase
        .auth
        .getSession();

      // NO SESSION

      if (!session) {

        window.location.href =
          "/login/student";

        return;

      }

      // USER

      const user =
        session.user;

      currentStudent = user;

      // UPDATE UI

      studentInfo.textContent =
        `${user.user_metadata.full_name} • ${user.email}`;

      headerStudentId.textContent =
        user.id;

      headerStudentName.textContent =
        user.user_metadata.full_name
        || "Student";

      headerStudentEmail.textContent =
        user.email;

      headerDocumentDate.textContent =
        new Date().toLocaleString();

      // LOAD DOCUMENT

      await loadDocument();

    }

    // ==================================================
    // LOAD DOCUMENT
    // ==================================================

    async function loadDocument() {

      if (!documentId) {

        saveStatus.textContent =
          "New document ready.";

        return;

      }

      saveStatus.textContent =
        "Loading document...";

      const {
        data,
        error
      } = await studentSupabase
        .from("student_documents")
        .select("*")
        .eq("id", documentId)
        .single();

      if (error) {

        console.error(error);

        saveStatus.textContent =
          error.message;

        return;

      }

      // SECURITY CHECK

      if (
        data.student_id !==
        currentStudent.id
      ) {

        saveStatus.textContent =
          "Access denied.";

        return;

      }

      documentTitle.value =
        data.title;

      editor.innerHTML =
        data.content;

      headerDocumentDate.textContent =
        new Date(
          data.updated_at
        ).toLocaleString();

      saveStatus.textContent =
        "Document loaded.";

    }

    // ==================================================
    // SAVE DOCUMENT
    // ==================================================

    async function saveDocument() {

      const title =
        documentTitle.value.trim();

      const content =
        editor.innerHTML.trim();

      if (!title || !content) {

        saveStatus.textContent =
          "Please enter a title and content.";

        return;

      }

      saveStatus.textContent =
        "Saving document...";

      let saveError = null;

      // UPDATE

      if (documentId) {

        const {
          error
        } = await studentSupabase
          .from("student_documents")
          .update({

            title:
              title,

            content:
              content,

            updated_at:
              new Date().toISOString()

          })
          .eq(
            "id",
            documentId
          );

        saveError = error;

      }

      // CREATE

      else {

        const {
          data,
          error
        } = await studentSupabase
          .from("student_documents")
          .insert([{

            student_id:
              currentStudent.id,

            student_email:
              currentStudent.email,

            student_name:
              currentStudent.user_metadata
              .full_name,

            teacher_id:
              currentStudent.user_metadata
              .teacher_id,

            title:
              title,

            content:
              content,

            updated_at:
              new Date().toISOString()

          }])
          .select()
          .single();

        saveError = error;

        // REDIRECT TO NEW URL

        if (!error && data) {

          window.history.replaceState(
            {},
            "",
            `/dashboard/student/apps/plum-academy-writer/document?id=${data.id}`
          );

        }

      }

      // ERROR

      if (saveError) {

        console.error(saveError);

        saveStatus.textContent =
          saveError.message;

        return;

      }

      saveStatus.textContent =
        "Document saved successfully!";

    }

    // ==================================================
    // FORMATTING
    // ==================================================

    function format(command, value = null) {

      document.execCommand(
        command,
        false,
        value
      );

      editor.focus();

    }

    function makeBold() {
      format("bold");
    }

    function makeItalic() {
      format("italic");
    }

    function underlineText() {
      format("underline");
    }

    function bulletList() {
      format("insertUnorderedList");
    }

    function heading() {
      format(
        "formatBlock",
        "<h1>"
      );
    }

    function highlightText() {

      const color =
        document.getElementById(
          "highlightColor"
        ).value;

      format(
        "hiliteColor",
        color
      );

    }

    function changeFont() {

      const font =
        document.getElementById(
          "fontSelector"
        ).value;

      format(
        "fontName",
        font
      );

    }

    // ==================================================
    // PRINT
    // ==================================================

    function printDocument() {

      window.print();

    }

    // ==================================================
    // SAVE BUTTON
    // ==================================================

    saveBtn.addEventListener(
      "click",
      saveDocument
    );

    // ==================================================
    // AUTOSAVE
    // ==================================================

    let autosaveTimeout;

    editor.addEventListener(
      "input",
      () => {

        clearTimeout(
          autosaveTimeout
        );

        saveStatus.textContent =
          "Typing...";

        autosaveTimeout =
          setTimeout(() => {

            saveDocument();

          }, 4000);

      }
    );

    // ==================================================
    // LOGOUT
    // ==================================================

    document.getElementById(
      "logoutBtn"
    ).addEventListener(
      "click",
      async () => {

        await studentSupabase
          .auth
          .signOut();

        window.location.href =
          "/login/student";

      }
    );

    // ==================================================
    // START
    // ==================================================

    window.addEventListener(
      "load",
      async () => {

        // WAIT FOR SESSION RESTORE

        setTimeout(() => {

          initializeAuth();

        }, 500);

      }
    );

  </script>

</body>
</html>
