<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Plum Academy Writer | Document
  </title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, Arial, sans-serif;
    }

    body {

      background: #f5f7fb;

      min-height: 100vh;

      color: #1f2937;

      padding: 20px;

    }

    .topbar {

      display: flex;

      justify-content: space-between;

      align-items: center;

      gap: 15px;

      flex-wrap: wrap;

      margin-bottom: 20px;

    }

    .topbar h1 {

      font-size: 32px;

      font-weight: 700;

    }

    .topbar p {

      color: #6b7280;

      margin-top: 6px;

    }

    .topbar-buttons {

      display: flex;

      gap: 12px;

      flex-wrap: wrap;

    }

    .btn {

      padding: 12px 18px;

      border-radius: 12px;

      border: 1px solid #dbe1ea;

      background: white;

      color: #111827;

      font-weight: 600;

      cursor: pointer;

      text-decoration: none;

      transition: 0.15s;

    }

    .btn:hover {

      background: #f3f4f6;

    }

    .save-btn {

      background: #6366f1;

      color: white;

      border: none;

    }

    .save-btn:hover {

      background: #4f46e5;

    }

    .logout-btn {

      background: #ef4444;

      color: white;

      border: none;

    }

    .logout-btn:hover {

      background: #dc2626;

    }

    .card {

      background: white;

      border: 1px solid #e5e7eb;

      border-radius: 18px;

      padding: 24px;

    }

    #documentTitle {

      width: 100%;

      padding: 14px;

      border-radius: 12px;

      border: 1px solid #d1d5db;

      font-size: 16px;

      margin-bottom: 20px;

    }

    #documentTitle:focus {

      outline: none;

      border-color: #6366f1;

    }

    .toolbar {

      display: flex;

      gap: 10px;

      flex-wrap: wrap;

      margin-bottom: 20px;

    }

    .toolbar button,
    .toolbar select {

      padding: 11px 14px;

      border-radius: 10px;

      border: 1px solid #dbe1ea;

      background: white;

      font-weight: 600;

      cursor: pointer;

    }

    #editorWrapper {

      border: 1px solid #d1d5db;

      border-radius: 16px;

      overflow: hidden;

      background: white;

    }

    #documentHeader {

      background: #f9fafb;

      border-bottom: 1px solid #e5e7eb;

      padding: 18px;

    }

    .header-row {

      margin-bottom: 8px;

      color: #4b5563;

      font-size: 14px;

    }

    .header-row:last-child {

      margin-bottom: 0;

    }

    #editor {

      min-height: 600px;

      padding: 24px;

      outline: none;

      font-size: 16px;

      line-height: 1.8;

    }

    .status {

      margin-top: 15px;

      color: #6b7280;

      font-size: 14px;

    }

    .action-buttons {

      display: flex;

      gap: 12px;

      flex-wrap: wrap;

      margin-top: 20px;

    }

    @media print {

      body {

        background: white;

        padding: 0;

      }

      .topbar,
      .toolbar,
      .action-buttons,
      .status {

        display: none;

      }

      .card {

        border: none;

        padding: 0;

      }

      #editorWrapper {

        border: none;

      }

    }

  </style>
</head>
<body>

  <!-- TOPBAR -->

  <div class="topbar">

    <div>

      <h1>
        ✨ Plum Academy Writer
      </h1>

      <p id="studentInfo">
        Loading...
      </p>

    </div>

    <div class="topbar-buttons">

      <a
        href="/dashboard/student/documents"
        class="btn"
      >
        My Documents
      </a>

      <a
        href="/dashboard/student"
        class="btn"
      >
        Dashboard
      </a>

      <button
        id="logoutBtn"
        class="btn logout-btn"
      >
        Logout
      </button>

    </div>

  </div>

  <!-- MAIN CARD -->

  <div class="card">

    <!-- TITLE -->

    <input
      type="text"
      id="documentTitle"
      placeholder="Document Title"
    />

    <!-- TOOLBAR -->

    <div class="toolbar">

      <button onclick="makeBold()">
        Bold
      </button>

      <button onclick="makeItalic()">
        Italic
      </button>

      <button onclick="underlineText()">
        Underline
      </button>

      <button onclick="heading()">
        Heading
      </button>

      <button onclick="bulletList()">
        Bullet List
      </button>

      <button onclick="highlightText()">
        Highlight
      </button>

      <select id="highlightColor">

        <option value="yellow">
          Yellow
        </option>

        <option value="#90ee90">
          Green
        </option>

        <option value="#87cefa">
          Blue
        </option>

        <option value="#ffb6c1">
          Pink
        </option>

      </select>

      <select
        id="fontSelector"
        onchange="changeFont()"
      >

        <option value="Arial">
          Arial
        </option>

        <option value="Times New Roman">
          Times New Roman
        </option>

        <option value="Georgia">
          Georgia
        </option>

        <option value="Verdana">
          Verdana
        </option>

      </select>

    </div>

    <!-- EDITOR -->

    <div id="editorWrapper">

      <div id="documentHeader">

        <div class="header-row">

          <strong>
            Student ID:
          </strong>

          <span id="headerStudentId">
            Loading...
          </span>

        </div>

        <div class="header-row">

          <strong>
            Student Name:
          </strong>

          <span id="headerStudentName">
            Loading...
          </span>

        </div>

        <div class="header-row">

          <strong>
            Email Address:
          </strong>

          <span id="headerStudentEmail">
            Loading...
          </span>

        </div>

        <div class="header-row">

          <strong>
            Last Updated:
          </strong>

          <span id="headerDocumentDate">
            Loading...
          </span>

        </div>

      </div>

      <div
        id="editor"
        contenteditable="true"
      ></div>

    </div>

    <!-- STATUS -->

    <div
      class="status"
      id="saveStatus"
    >
      Ready
    </div>

    <!-- ACTION BUTTONS -->

    <div class="action-buttons">

      <button
        class="btn save-btn"
        id="saveBtn"
      >
        Save Document
      </button>

      <button
        class="btn"
        onclick="printDocument()"
      >
        Print Document
      </button>

      <button
        class="btn"
        onclick="exportPawDocx()"
      >
        Export .pawdocx
      </button>

      <button
        class="btn"
        onclick="
          document.getElementById(
            'pawdocxInput'
          ).click()
        "
      >
        Open .pawdocx
      </button>

      <!-- FILE INPUT -->

      <input
        type="file"
        id="pawdocxInput"
        accept=".pawdocx"
        style="display:none"
      />

    </div>

  </div>

  <script>

    // ==================================================
    // SUPABASE
    // ==================================================

    const STUDENT_SUPABASE_URL =
      "https://ebzcflngssljyqieizws.supabase.co";

    const STUDENT_SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViemNmbG5nc3NsanlxaWVpendzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MDQ3NDEsImV4cCI6MjA5Mzk4MDc0MX0.ZnPi4jKEtkr0iUN_ymVrhUI7A_OMkhWjRn3shA2D9yk";

    const studentSupabase =
      supabase.createClient(
        STUDENT_SUPABASE_URL,
        STUDENT_SUPABASE_ANON_KEY,
        {
          auth: {

            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true

          }
        }
      );

    // ==================================================
    // URL PARAMETERS
    // ==================================================

    const params =
      new URLSearchParams(
        window.location.search
      );

    const documentId =
      params.get("id");

    // ==================================================
    // ELEMENTS
    // ==================================================

    const editor =
      document.getElementById(
        "editor"
      );

    const documentTitle =
      document.getElementById(
        "documentTitle"
      );

    const saveStatus =
      document.getElementById(
        "saveStatus"
      );

    const studentInfo =
      document.getElementById(
        "studentInfo"
      );

    const headerStudentId =
      document.getElementById(
        "headerStudentId"
      );

    const headerStudentName =
      document.getElementById(
        "headerStudentName"
      );

    const headerStudentEmail =
      document.getElementById(
        "headerStudentEmail"
      );

    const headerDocumentDate =
      document.getElementById(
        "headerDocumentDate"
      );

    const saveBtn =
      document.getElementById(
        "saveBtn"
      );

    let currentStudent = null;

    // ==================================================
    // AUTH
    // ==================================================

    async function initializeAuth() {

      const {
        data: {
          session
        }
      } = await studentSupabase
        .auth
        .getSession();

      console.log(
        "Session:",
        session
      );

      if (!session) {

        window.location.href =
          "/login/student";

        return;

      }

      currentStudent =
        session.user;

      console.log(
        "Current Student:",
        currentStudent
      );

      console.log(
        "Document ID:",
        documentId
      );

      // UPDATE UI

      studentInfo.textContent =
        `${currentStudent.user_metadata.full_name} • ${currentStudent.email}`;

      headerStudentId.textContent =
        currentStudent.id;

      headerStudentName.textContent =
        currentStudent.user_metadata.full_name
        || "Student";

      headerStudentEmail.textContent =
        currentStudent.email;

      headerDocumentDate.textContent =
        new Date().toLocaleString();

      // LOAD DOCUMENT

      try {

        await loadDocument();

      }

      catch (error) {

        console.error(error);

        saveStatus.textContent =
          "Failed to load document.";

      }

      // IMPORT CHECK

      checkImportedPawdocx();

    }

    // ==================================================
    // LOAD DOCUMENT
    // ==================================================

    async function loadDocument() {

      console.log(
        "Loading document..."
      );

      if (!documentId) {

        saveStatus.textContent =
          "New document ready.";

        return;

      }

      saveStatus.textContent =
        "Loading document...";

      const {
        data,
        error
      } = await studentSupabase
        .from("student_documents")
        .select("*")
        .eq(
          "id",
          documentId
        )
        .single();

      console.log(
        "Document Data:",
        data
      );

      console.log(
        "Document Error:",
        error
      );

      if (error) {

        console.error(error);

        saveStatus.textContent =
          error.message;

        return;

      }

      // SECURITY CHECK

      if (
        !data ||
        data.student_id !==
        currentStudent.id
      ) {

        saveStatus.textContent =
          "Access denied.";

        return;

      }

      // LOAD CONTENT

      documentTitle.value =
        data.title;

      editor.innerHTML =
        data.content;

      headerDocumentDate.textContent =
        new Date(
          data.updated_at
        ).toLocaleString();

      saveStatus.textContent =
        "Document loaded.";

    }

    // ==================================================
    // IMPORT CHECK
    // ==================================================

    function checkImportedPawdocx() {

      const imported =
        localStorage.getItem(
          "pawdocx_import"
        );

      if (!imported) {
        return;
      }

      try {

        const data =
          JSON.parse(imported);

        documentTitle.value =
          data.title || "";

        editor.innerHTML =
          data.content || "";

        headerStudentId.textContent =
          data.student_id || "-";

        headerStudentName.textContent =
          data.student_name || "-";

        headerStudentEmail.textContent =
          data.student_email || "-";

        headerDocumentDate.textContent =
          new Date(
            data.updated_at
          ).toLocaleString();

        saveStatus.textContent =
          ".pawdocx imported successfully!";

        localStorage.removeItem(
          "pawdocx_import"
        );

      }

      catch (error) {

        console.error(error);

      }

    }

    // ==================================================
    // SAVE DOCUMENT
    // ==================================================

    async function saveDocument() {

      const title =
        documentTitle.value.trim();

      const content =
        editor.innerHTML.trim();

      if (!title || !content) {

        saveStatus.textContent =
          "Please enter a title and content.";

        return;

      }

      saveStatus.textContent =
        "Saving document...";

      let saveError = null;

      // UPDATE

      if (documentId) {

        const {
          error
        } = await studentSupabase
          .from("student_documents")
          .update({

            title:
              title,

            content:
              content,

            updated_at:
              new Date().toISOString()

          })
          .eq(
            "id",
            documentId
          );

        saveError = error;

      }

      // CREATE

      else {

        const {
          data,
          error
        } = await studentSupabase
          .from("student_documents")
          .insert([{

            student_id:
              currentStudent.id,

            student_email:
              currentStudent.email,

            student_name:
              currentStudent.user_metadata
              .full_name,

            student_keystage:
              currentStudent.user_metadata
              .keystage,

            teacher_id:
              currentStudent.user_metadata
              .teacher_id,

            title:
              title,

            content:
              content,

            updated_at:
              new Date().toISOString()

          }])
          .select()
          .single();

        saveError = error;

        if (!error && data) {

          window.history.replaceState(
            {},
            "",
            `/dashboard/student/apps/plum-academy-writer/document?id=${data.id}`
          );

        }

      }

      // ERROR

      if (saveError) {

        console.error(saveError);

        saveStatus.textContent =
          saveError.message;

        return;

      }

      saveStatus.textContent =
        "Document saved successfully!";

    }

    // ==================================================
    // EXPORT
    // ==================================================

    function exportPawDocx() {

      const title =
        documentTitle.value.trim();

      const content =
        editor.innerHTML.trim();

      if (!title || !content) {

        saveStatus.textContent =
          "Nothing to export.";

        return;

      }

      const pawdocxData = {

        title:
          title,

        content:
          content,

        student_name:
          currentStudent.user_metadata
          .full_name,

        student_email:
          currentStudent.email,

        student_id:
          currentStudent.id,

        keystage:
          currentStudent.user_metadata
          .keystage,

        updated_at:
          new Date().toISOString()

      };

      const blob =
        new Blob(
          [
            JSON.stringify(
              pawdocxData,
              null,
              2
            )
          ],
          {
            type:
              "application/pawdocx"
          }
        );

      const url =
        URL.createObjectURL(blob);

      const a =
        document.createElement("a");

      a.href = url;

      a.download =
        `${title}.pawdocx`;

      a.click();

      URL.revokeObjectURL(url);

      saveStatus.textContent =
        ".pawdocx exported successfully!";

    }

    // ==================================================
    // IMPORT
    // ==================================================

    document.getElementById(
      "pawdocxInput"
    ).addEventListener(
      "change",
      async (event) => {

        const file =
          event.target.files[0];

        if (!file) {
          return;
        }

        if (
          !file.name.endsWith(
            ".pawdocx"
          )
        ) {

          saveStatus.textContent =
            "Invalid file type.";

          return;

        }

        try {

          const text =
            await file.text();

          const data =
            JSON.parse(text);

          documentTitle.value =
            data.title || "";

          editor.innerHTML =
            data.content || "";

          headerStudentId.textContent =
            data.student_id || "-";

          headerStudentName.textContent =
            data.student_name || "-";

          headerStudentEmail.textContent =
            data.student_email || "-";

          headerDocumentDate.textContent =
            new Date(
              data.updated_at
            ).toLocaleString();

          saveStatus.textContent =
            ".pawdocx imported successfully!";

        }

        catch (error) {

          console.error(error);

          saveStatus.textContent =
            "Failed to open .pawdocx file.";

        }

      }
    );

    // ==================================================
    // FORMATTING
    // ==================================================

    function format(command, value = null) {

      document.execCommand(
        command,
        false,
        value
      );

      editor.focus();

    }

    function makeBold() {
      format("bold");
    }

    function makeItalic() {
      format("italic");
    }

    function underlineText() {
      format("underline");
    }

    function bulletList() {
      format("insertUnorderedList");
    }

    function heading() {
      format(
        "formatBlock",
        "<h1>"
      );
    }

    function highlightText() {

      const color =
        document.getElementById(
          "highlightColor"
        ).value;

      format(
        "hiliteColor",
        color
      );

    }

    function changeFont() {

      const font =
        document.getElementById(
          "fontSelector"
        ).value;

      format(
        "fontName",
        font
      );

    }

    // ==================================================
    // PRINT
    // ==================================================

    function printDocument() {

      window.print();

    }

    // ==================================================
    // SAVE BUTTON
    // ==================================================

    saveBtn.addEventListener(
      "click",
      saveDocument
    );

    // ==================================================
    // AUTOSAVE
    // ==================================================

    let autosaveTimeout;

    editor.addEventListener(
      "input",
      () => {

        clearTimeout(
          autosaveTimeout
        );

        saveStatus.textContent =
          "Typing...";

        autosaveTimeout =
          setTimeout(() => {

            saveDocument();

          }, 4000);

      }
    );

    // ==================================================
    // LOGOUT
    // ==================================================

    document.getElementById(
      "logoutBtn"
    ).addEventListener(
      "click",
      async () => {

        await studentSupabase
          .auth
          .signOut();

        window.location.href =
          "/login/student";

      }
    );

    // ==================================================
    // START
    // ==================================================

    window.addEventListener(
      "load",
      () => {

        setTimeout(() => {

          initializeAuth();

        }, 500);

      }
    );

  </script>

</body>
</html>
