<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Student Password Setup</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(
        135deg,
        #6c63ff,
        #4f46e5
      );

      min-height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 450px;

      background: white;

      border-radius: 20px;

      padding: 30px;

      box-shadow:
        0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      color: #222;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 25px;
      line-height: 1.5;
    }

    .student-info {
      background: #f4f7fb;
      border-radius: 14px;
      padding: 15px;
      margin-bottom: 20px;
    }

    .student-info p {
      margin-bottom: 8px;
      color: #444;
      font-size: 14px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    input {
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    button {
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #4f46e5;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #4338ca;
    }

    .message {
      margin-top: 18px;
      text-align: center;
      font-size: 14px;
    }

    .success {
      color: green;
    }

    .error {
      color: red;
    }

    /* PASSWORD STRENGTH */

    .strength-wrapper {
      margin-top: -5px;
    }

    .strength-bar {
      width: 100%;
      height: 10px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      width: 0%;
      transition: 0.3s;
      border-radius: 999px;
    }

    .strength-text {
      margin-top: 8px;
      font-size: 13px;
      color: #666;
    }

  </style>
</head>
<body>

  <div class="container">

    <h1>
      🎓 Student Account Setup
    </h1>

    <p class="subtitle">
      Create your password to finish
      setting up your student account.
    </p>

    <div
      class="student-info"
      id="studentInfo"
    >

      <p>
        Loading student information...
      </p>

    </div>

    <form id="passwordForm">

      <!-- PASSWORD -->

      <input
        type="password"
        id="password"
        placeholder="Create Password"
        required
      />

      <!-- PASSWORD STRENGTH -->

      <div
        class="strength-wrapper"
      >

        <div
          class="strength-bar"
        >

          <div
            id="strengthFill"
            class="strength-fill"
          ></div>

        </div>

        <p
          id="strengthText"
          class="strength-text"
        >
          Password strength
        </p>

      </div>

      <!-- CONFIRM -->

      <input
        type="password"
        id="confirmPassword"
        placeholder="Confirm Password"
        required
      />

      <button type="submit">
        Create Password
      </button>

    </form>

    <div
      class="message"
      id="message"
    ></div>

  </div>

  <script>

    // ==================================================
    // 🔑 STUDENT SUPABASE ONLY
    // ==================================================

    const STUDENT_SUPABASE_URL =
      "https://ebzcflngssljyqieizws.supabase.co";

    const STUDENT_SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViemNmbG5nc3NsanlxaWVpendzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MDQ3NDEsImV4cCI6MjA5Mzk4MDc0MX0.ZnPi4jKEtkr0iUN_ymVrhUI7A_OMkhWjRn3shA2D9yk";

    // ==================================================
    // CREATE CLIENT
    // ==================================================

    const studentSupabase =
      supabase.createClient(
        STUDENT_SUPABASE_URL,
        STUDENT_SUPABASE_ANON_KEY,
        {
          auth: {

            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true

          }
        }
      );

    // ==================================================
    // ELEMENTS
    // ==================================================

    const studentInfo =
      document.getElementById(
        "studentInfo"
      );

    const passwordForm =
      document.getElementById(
        "passwordForm"
      );

    const message =
      document.getElementById(
        "message"
      );

    const passwordInput =
      document.getElementById(
        "password"
      );

    const strengthFill =
      document.getElementById(
        "strengthFill"
      );

    const strengthText =
      document.getElementById(
        "strengthText"
      );

    let currentStudent = null;

    // ==================================================
    // LOAD STUDENT
    // ==================================================

    async function loadStudent() {

      const {
        data,
        error
      } = await studentSupabase
        .auth
        .getUser();

      const user =
        data?.user;

      if (!user || error) {

        studentInfo.innerHTML = `
          <p>
            Invalid or expired setup link.
          </p>
        `;

        return;

      }

      currentStudent = user;

      const fullName =
        user.user_metadata.full_name
        || "Student";

      const keystage =
        user.user_metadata.keystage
        || "Unknown";

      studentInfo.innerHTML = `
        <p>
          <strong>Name:</strong>
          ${fullName}
        </p>

        <p>
          <strong>Email:</strong>
          ${user.email}
        </p>

        <p>
          <strong>Keystage:</strong>
          ${keystage}
        </p>
      `;

    }

    // ==================================================
    // PASSWORD STRENGTH
    // ==================================================

    passwordInput.addEventListener(
      "input",
      () => {

        const password =
          passwordInput.value;

        let strength = 0;

        // LENGTH

        if (
          password.length >= 8
        ) {
          strength++;
        }

        // LOWER + UPPER

        if (
          /[a-z]/.test(password) &&
          /[A-Z]/.test(password)
        ) {
          strength++;
        }

        // NUMBER

        if (
          /[0-9]/.test(password)
        ) {
          strength++;
        }

        // SPECIAL

        if (
          /[^A-Za-z0-9]/.test(password)
        ) {
          strength++;
        }

        // UPDATE UI

        if (strength === 0) {

          strengthFill.style.width =
            "0%";

          strengthFill.style.background =
            "#e5e7eb";

          strengthText.textContent =
            "Password strength";

        }

        else if (strength === 1) {

          strengthFill.style.width =
            "25%";

          strengthFill.style.background =
            "#dc2626";

          strengthText.textContent =
            "Weak password";

        }

        else if (strength === 2) {

          strengthFill.style.width =
            "50%";

          strengthFill.style.background =
            "#f59e0b";

          strengthText.textContent =
            "Fair password";

        }

        else if (strength === 3) {

          strengthFill.style.width =
            "75%";

          strengthFill.style.background =
            "#3b82f6";

          strengthText.textContent =
            "Strong password";

        }

        else {

          strengthFill.style.width =
            "100%";

          strengthFill.style.background =
            "#059669";

          strengthText.textContent =
            "Very strong password";

        }

      }
    );

    // ==================================================
    // PASSWORD SETUP
    // ==================================================

    passwordForm.addEventListener(
      "submit",
      async (e) => {

        e.preventDefault();

        const password =
          document.getElementById(
            "password"
          ).value;

        const confirmPassword =
          document.getElementById(
            "confirmPassword"
          ).value;

        // PASSWORD MATCH

        if (
          password !==
          confirmPassword
        ) {

          message.textContent =
            "Passwords do not match.";

          message.className =
            "message error";

          return;

        }

        // UPDATE PASSWORD

        const {
          error
        } = await studentSupabase
          .auth
          .updateUser({

            password:
              password

          });

        // ERROR

        if (error) {

          message.textContent =
            error.message;

          message.className =
            "message error";

          return;

        }

        // SUCCESS

        message.textContent =
          "Password created successfully! Redirecting...";

        message.className =
          "message success";

        // REDIRECT

        setTimeout(() => {

          window.location.href =
            "/login/student";

        }, 2000);

      }
    );

    // ==================================================
    // START
    // ==================================================

    window.addEventListener(
      "load",
      () => {

        loadStudent();

      }
    );

  </script>

</body>
</html>
